 "约2年", "significance": "生命的终点，隋朝统治实质上终结的标志。", "works": [], "quoteLines": ["《幸江都作》：“求归不得去，真成遭个春。鸟声争劝酒，梅花笑杀人。”（传说为临终前诗）"]}], "mapStyle": {"pathColor": "#1e40af", "markers": {"normal": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：**隋朝**结束了自西晋末年以来近300年的分裂局面，实现了全国统一。\n- **关键事件**：**隋炀帝**下令开凿**大运河**，以**洛阳**为中心，北达**涿郡**（今北京），南至**余杭**（今杭州），全长两千多公里。\n- **关键贡献**：**隋炀帝**时，正式设置**进士科**，标志着**科举制度**正式确立。\n- **代表工程**：**大运河**是古代世界上最长的运河，加强了南北地区政治、经济和文化交流。\n- **统治特点**：好大喜功，不恤民力，奢侈无度，如多次巡游**江都**。\n- **历史结果**：暴政导致农民起义爆发，**隋朝**在农民战争中迅速灭亡。\n- **常见易混点**：区分**隋文帝**（开皇之治）与**隋炀帝**的统治政策与结果。\n\n### 高中阶段\n- **制度创新**：**隋炀帝**创立**进士科**，是**科举制**形成的标志，将读书、考试与做官紧密联系起来，扩大了官吏选拔范围。\n- **经济战略**：**大运河**的开凿，沟通了海河、黄河、淮河、长江、钱塘江五大水系，适应了当时南北经济交流和国家统一的需要。\n- **军事外交**：**三征高句丽**是隋朝由盛转衰的直接导火索，消耗了巨大国力，引发国内矛盾总爆发。\n- **历史评价的复杂性**：需辩证看待其功过。工程（运河、东都）具有长远价值，但实施方式（急政、暴政）导致速亡。\n- **对比点**：常与**秦始皇**进行对比，二者皆结束分裂、开创制度、大兴工程、严刑峻法，且都二世而亡。\n- **思想文化**：本人具有较高文学造诣，推动了南北文风融合。\n- **易错点**：**科举制**的**创立**是隋炀帝，而**完善**是在唐朝（唐太宗、武则天、唐玄宗）。\n\n---", "examPoints": "### 初中阶段考点\n1.  隋朝的建立者：**隋文帝杨坚**（581年），统一时间：**589年**。\n2.  **大运河**的开通者：**隋炀帝**。\n3.  大运河的中心：**洛阳**；北端：**涿郡**（今北京）；南端：**余杭**（今杭州）。\n4.  大运河四段（自北向南）：**永济渠**、**通济渠**、**邗沟**、**江南河**。\n5.  **科举制**正式诞生的标志：**隋炀帝时设立进士科**。\n6.  隋朝灭亡的主要原因：**隋炀帝的暴政**（滥用民力、穷奢极欲、三征高句丽）。\n7.  隋朝灭亡的标志：**618年，隋炀帝在江都被杀**。\n\n### 高中阶段考点\n1.  **大运河开凿的背景**：巩固统一，加强对南方的控制；适应经济重心南移趋势，满足南北物资运输（如南粮北运）需要。\n2.  **大运河的影响**：积极方面——成为南北交通大动脉，促进沿岸城市发展和南北经济文化交流；消极方面——当时过度役使民力，激化社会矛盾。\n3.  **科举制的发展脉络**：**隋文帝**开始分科考试→**隋炀帝**设**进士科**（标志正式确立）→唐太宗增加科目，以进士、明经为主→武则天首创殿试、武举→唐玄宗任用高官主持考试。\n4.  **三征高句丽的影响**：军事失败，损失惨重；消耗国力，财政空虚；民夫、士兵死伤逃亡严重，成为全国农民起义的导火索。\n5.  **对隋炀帝的评价**：需运用辩证唯物主义和历史唯物主义观点，既肯定其在统一、制度创新、大型工程建设方面的历史贡献，也要批判其统治后期急功近利、不恤民力导致社会崩溃的严重过失。\n6.  **隋朝速亡与秦朝速亡的对比**（存疑/说法不一）：通常认为二者在“大兴工程、严刑峻法、赋役繁重、二世而亡”等方面有相似性，但具体背景和表现形式不同。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：杨广，一名英，小字阿撌，庙号世祖，谥号炀帝\n- **时代**：隋朝\n- **出生**：公元569年，出生地存疑，一说长安（今陕西西安），一说弘农华阴（今陕西华阴）\n- **去世**：公元618年，江都（今江苏扬州）\n- **享年**：50岁\n- **主要身份**：皇帝、军事统帅、诗人\n- **历史地位**：隋朝第二位皇帝，亦是亡国之君，其统治深刻影响了中国历史进程，是功过极具争议的帝王。\n- **主要成就**：修建贯通南北的大运河；创立进士科，完善科举制度；营建东都洛阳；西巡张掖，经营西域；三征高句丽。\n\n### 生平概述\n隋炀帝杨广是隋文帝杨坚次子，早年以平定陈朝统一天下之功崭露头角。公元604年继位后，他凭借隋初积累的雄厚国力，启动了一系列规模空前的国家工程与军事行动。他营建东都洛阳，开凿以洛阳为中心、北抵涿郡（今北京）南至余杭（今杭州）的大运河，并创立进士科，为后世选官制度奠定基础。同时，他频繁巡游，西至张掖，三下江都，并三次大举征伐高句丽。这些举措虽有其宏大的战略与经济考量，但过度役使民力，导致社会矛盾急剧激化，最终引发全国性民变。公元618年，他在江都死于兵变，隋朝随之灭亡。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：足迹遍布大半个中国，从西北的张掖到东南的江都，从北方的涿郡到南方的江南。\n- ⏱️ **时间跨度**：公元569年—公元618年，共50年。\n- 📍 **地理范围**：东至辽东，西达张掖（今甘肃张掖），南抵江都（今江苏扬州），北达涿郡（今北京）。\n- 🌟 **重要节点数量**：10个\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：长安/弘农（存疑）\n- **公元纪年**：公元569年\n- **停留时间**：幼年时期\n- **位置**：长安（今陕西西安）或弘农华阴（今陕西华阴）\n- **事迹**：出生于北周贵族家庭，父亲杨坚时任北周重臣。\n- **意义**：其人生与政治生涯的起点。\n\n### 📍 重要地点：江都（今江苏扬州）\n- **公元纪年**：公元590年-591年；公元616年-618年\n- **停留时间**：首次约1-2年（任扬州总管）；末次约2年（直至去世）\n- **位置**：古称江都（今江苏扬州）\n- **事迹**：早年任扬州总管，平定江南叛乱；晚年三下江都，沉湎酒色，不理朝政，最终在此被杀。\n- **意义**：既是其政治生涯的重要起点，也是其人生的终点，见证了其统治从强盛到覆灭的转折。\n- **名篇名句**：《春江花月夜》：“暮江平不动，春花满正开。”；《泛龙舟》：“舳舻千里泛归舟，言旋旧镇下扬州。”\n\n### 📍 重要地点：大兴城/长安（今陕西西安）\n- **公元纪年**：公元604年-605年（及之前）\n- **停留时间**：长期居住，公元604年在此继位\n- **位置**：古称大兴城（今陕西西安）\n- **事迹**：隋朝京师，在此接受禅位，登基为帝，并策划营建东都与开凿运河。\n- **意义**：隋朝政治中心，其统治的起点。\n\n### 📍 重要地点：东都洛阳（今河南洛阳）\n- **公元纪年**：公元605年-616年间多次往返\n- **停留时间**：断断续续数年\n- **位置**：古称东都洛阳（今河南洛阳）\n- **事迹**：下令大规模营建东都洛阳，使其成为新的政治、经济中心；在此接见万国使者，举办盛大庆典。\n- **意义**：为加强对关东和江南的控制而建，是其统治时期的核心都城之一。\n- **名篇名句**：《还京师》：“东都礼仪举，西京冠盖归。”\n\n### 📍 重要地点：涿郡（今北京）\n- **公元纪年**：公元612年\n- **停留时间**：数月\n- **位置**：古称涿郡（今北京西南）\n- **事迹**：作为征伐高句丽的后方基地，在此集结天下兵马，号称百万。\n- **意义**：其军事扩张战略的北方指挥中心。\n\n### 📍 重要地点：辽东（今辽宁辽阳一带）\n- **公元纪年**：公元612年、613年\n- **停留时间**：数月\n- **位置**：古称辽东城（今辽宁辽阳）\n- **事迹**：亲征高句丽，指挥大军围攻辽东城，但均遭挫败。\n- **意义**：其军事生涯的重大挫折地，战争的巨大消耗直接动摇了隋朝统治根基。\n\n### 📍 重要地点：张掖（今甘肃张掖）\n- **公元纪年**：公元609年\n- **停留时间**：数月\n- **位置**：古称张掖（今甘肃张掖）\n- **事迹**：西巡河右，在此接见西域二十七国君主与使者，举办万国博览会。\n- **意义**：中国古代皇帝西行最远之地，彰显了隋朝极盛时期的声威与对丝绸之路的经营。\n\n### 📍 重要地点：邗沟/通济渠沿线\n- **公元纪年**：公元605年、610年等\n- **停留时间**：巡游途中\n- **位置**：连接黄河与淮河、淮河与长江的运河段（流经今河南、安徽、江苏）\n- **事迹**：多次乘龙舟巡游江都，沿途耗费巨大。\n- **意义**：大运河的核心河段，既是其功业的体现，也是其奢靡生活与民力凋敝的象征。\n- **名篇名句**：《早渡淮》：“平淮既淼淼，晓雾复霏霏。”\n\n### 📍 重要地点：晋阳（今山西太原）\n- **公元纪年**：公元615年\n- **停留时间**：短暂\n- **位置**：古称晋阳（今山西太原西南）\n- **事迹**：北巡时被突厥始毕可汗围困于附近的雁门，后解围。\n- **意义**：遭遇重大军事危机，显示其统治后期边疆形势的恶化。\n\n### 🔴 去世地：江都（今江苏扬州）\n- **公元纪年**：公元618年\n- **停留时间**：约2年\n- **位置**：古称江都（今江苏扬州）\n- **经过**：天下大乱，禁军将领宇文化及等发动兵变，将其缢杀于江都宫。\n- **意义**：生命的终点，隋朝统治实质上终结的标志。\n- **名篇名句**：《幸江都作》：“求归不得去，真成遭个春。鸟声争劝酒，梅花笑杀人。”（传说为临终前诗）\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 公元569年 | 0岁 | 出生于北周贵族家庭。 |\n| 公元581年 | 12岁 | 父亲杨坚代周建隋，被封为晋王。 |\n| 公元589年 | 20岁 | 作为行军元帅，统率大军平定南陈，完成统一。 |\n| 公元600年 | 31岁 | 通过一系列运作，取代兄长杨勇成为皇太子。 |\n| 公元604年 | 35岁 | 隋文帝去世，杨广继位，是为隋炀帝。 |\n| 公元605年 | 36岁 | 下令营建东都洛阳，同时开凿通济渠，启动大运河工程。 |\n| 公元607年 | 38岁 | 改革官制，创立进士科，初步确立科举制度。 |\n| 公元608年 | 39岁 | 开凿永济渠，北通涿郡。 |\n| 公元609年 | 40岁 | 西巡河右，抵达张掖，会见西域诸国使者。 |\n| 公元610年 | 41岁 | 开凿江南河，大运河全线贯通。 |\n| 公元612年 | 43岁 | 第一次征伐高句丽，大败而归。 |\n| 公元613年 | 44岁 | 第二次征伐高句丽，因杨玄感叛乱而退兵。 |\n| 公元614年 | 45岁 | 第三次征伐高句丽，无功而返。 |\n| 公元616年 | 47岁 | 不顾局势危殆，第三次巡游江都。 |\n| 公元618年 | 50岁 | 江都兵变，被宇文化及所杀，隋朝名实俱亡。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n隋炀帝的统治在短期内集中了全国的人力物力，完成了大运河、东都洛阳等具有长远战略意义的大型工程，并试图通过军事行动开疆拓土。然而，其急功近利、滥用民力，严重超出了社会承受极限，导致“天下死于役而家伤于财”，迅速激化了社会矛盾，引发了席卷全国的农民起义，最终导致了隋王朝的崩溃，并为唐朝的建立与“贞观之治”提供了深刻的历史教训。\n\n### 对后世的影响\n1.  **大运河泽被后世**：贯通南北的大运河成为后世中国经济、文化交流的大动脉，对巩固统一、促进南北经济融合起到了不可估量的作用。\n2.  **科举制度影响深远**：其创立的进士科，经唐朝完善，成为此后一千三百余年选拔人才的主要制度，深刻改变了中国的社会结构。\n3.  **暴政的反面教材**：其统治成为后世帝王引以为戒的典型，与秦始皇并论，警示统治者需爱惜民力，施行仁政。\n\n### 历史评价\n1.  **《隋书·炀帝纪》**：“负其富强之资，思逞无厌之欲……骄怒之兵屡动，土木之功不息……海内骚然，无聊生矣。”\n2.  **唐太宗李世民**：“隋炀帝承文帝余业，海内殷阜，若能常处关中，岂有倾败？遂不顾百姓，行幸无期，径往江都，不纳董纯、崔象等谏诤，身戮国灭，为天下笑。”\n3.  **晚唐皮日休《汴河怀古》**：“尽道隋亡为此河，至今千里赖通波。若无水殿龙舟事，共禹论功不较多。”\n4.  **现代史家观点（说法不一）**：有观点认为他是极具魄力但操之过急的改革家与战略家；也有观点坚持其为好大喜功、残暴荒淫的亡国之君。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**隋朝**结束了自西晋末年以来近300年的分裂局面，实现了全国统一。\n- **关键事件**：**隋炀帝**下令开凿**大运河**，以**洛阳**为中心，北达**涿郡**（今北京），南至**余杭**（今杭州），全长两千多公里。\n- **关键贡献**：**隋炀帝**时，正式设置**进士科**，标志着**科举制度**正式确立。\n- **代表工程**：**大运河**是古代世界上最长的运河，加强了南北地区政治、经济和文化交流。\n- **统治特点**：好大喜功，不恤民力，奢侈无度，如多次巡游**江都**。\n- **历史结果**：暴政导致农民起义爆发，**隋朝**在农民战争中迅速灭亡。\n- **常见易混点**：区分**隋文帝**（开皇之治）与**隋炀帝**的统治政策与结果。\n\n### 高中阶段\n- **制度创新**：**隋炀帝**创立**进士科**，是**科举制**形成的标志，将读书、考试与做官紧密联系起来，扩大了官吏选拔范围。\n- **经济战略**：**大运河**的开凿，沟通了海河、黄河、淮河、长江、钱塘江五大水系，适应了当时南北经济交流和国家统一的需要。\n- **军事外交**：**三征高句丽**是隋朝由盛转衰的直接导火索，消耗了巨大国力，引发国内矛盾总爆发。\n- **历史评价的复杂性**：需辩证看待其功过。工程（运河、东都）具有长远价值，但实施方式（急政、暴政）导致速亡。\n- **对比点**：常与**秦始皇**进行对比，二者皆结束分裂、开创制度、大兴工程、严刑峻法，且都二世而亡。\n- **思想文化**：本人具有较高文学造诣，推动了南北文风融合。\n- **易错点**：**科举制**的**创立**是隋炀帝，而**完善**是在唐朝（唐太宗、武则天、唐玄宗）。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  隋朝的建立者：**隋文帝杨坚**（581年），统一时间：**589年**。\n2.  **大运河**的开通者：**隋炀帝**。\n3.  大运河的中心：**洛阳**；北端：**涿郡**（今北京）；南端：**余杭**（今杭州）。\n4.  大运河四段（自北向南）：**永济渠**、**通济渠**、**邗沟**、**江南河**。\n5.  **科举制**正式诞生的标志：**隋炀帝时设立进士科**。\n6.  隋朝灭亡的主要原因：**隋炀帝的暴政**（滥用民力、穷奢极欲、三征高句丽）。\n7.  隋朝灭亡的标志：**618年，隋炀帝在江都被杀**。\n\n### 高中阶段考点\n1.  **大运河开凿的背景**：巩固统一，加强对南方的控制；适应经济重心南移趋势，满足南北物资运输（如南粮北运）需要。\n2.  **大运河的影响**：积极方面——成为南北交通大动脉，促进沿岸城市发展和南北经济文化交流；消极方面——当时过度役使民力，激化社会矛盾。\n3.  **科举制的发展脉络**：**隋文帝**开始分科考试→**隋炀帝**设**进士科**（标志正式确立）→唐太宗增加科目，以进士、明经为主→武则天首创殿试、武举→唐玄宗任用高官主持考试。\n4.  **三征高句丽的影响**：军事失败，损失惨重；消耗国力，财政空虚；民夫、士兵死伤逃亡严重，成为全国农民起义的导火索。\n5.  **对隋炀帝的评价**：需运用辩证唯物主义和历史唯物主义观点，既肯定其在统一、制度创新、大型工程建设方面的历史贡献，也要批判其统治后期急功近利、不恤民力导致社会崩溃的严重过失。\n6.  **隋朝速亡与秦朝速亡的对比**（存疑/说法不一）：通常认为二者在“大兴工程、严刑峻法、赋役繁重、二世而亡”等方面有相似性，但具体背景和表现形式不同。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 隋文帝去世，杨广继位，是为隋炀帝。 | 隋文帝去世，杨广继位，是为隋炀帝。 | 34.288034 | 108.022742 |\n| 下令营建东都洛阳，同时开凿通济渠，启动大运河工程。 | 下令营建东都洛阳，同时开凿通济渠，启动大运河工程。 | 34.617890 | 112.379576 |\n| 改革官制，创立进士科，初步确立科举制度。 | 改革官制，创立进士科，初步确立科举制度。 | 33.365172 | 104.610505 |\n| 开凿永济渠，北通涿郡。 | 开凿永济渠，北通涿郡。 | 28.486826 | 113.148556 const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

        locations[i+1].lat, locations[i+1].lng

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
