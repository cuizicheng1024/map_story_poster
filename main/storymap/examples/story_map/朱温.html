      const { useState, useEffect, useRef, useMemo } = React;
      const data = {"person": {"name": "朱温", "title": "", "description": "朱温出身贫寒，于唐末乱世中投身黄巢起义军，因战功升任将领。后审时度势，归降唐朝，被赐名“全忠”，委以重任。他凭借卓越的军事才能和政治手腕，在藩镇混战中击败秦宗权、朱瑄、朱瑾等强敌，控制了中原核心地区，进封梁王。天祐四年（907年），他逼迫唐哀帝禅让，建立后梁，定都开封（汴州），唐朝正式灭亡。在位期间，他与晋王李克用、李存勖父子长期征战，晚年因皇位继承问题引发内乱，最终被亲子朱友珪所弑。其一生充满背叛与征伐，是唐末五代武人政治的典型代表。", "quote": "无直接文学作品。相关历史记载见《旧五代史·梁书·太祖纪》。", "dynasty": "唐末五代", "birthplace": "宋州砀山（今安徽省砀山县）", "avatar": "", "birth": {"date": "852年", "location": "宋州砀山（今安徽省砀山县）", "lat": 34.4418972, "lng": 116.4717068}, "death": {"date": "912年", "location": "洛阳（今河南省洛阳市）", "lat": 34.6196539, "lng": 112.4477046}, "lifespan": "61岁", "highlights": {"honor": "", "status": "五代十国时期第一个朝代后梁的建立者，终结了唐朝近三百年的统治。", "identities": "农民军将领、唐朝节度使、后梁开国皇帝", "achievements": "参加并领导唐末农民起义；投降唐朝后逐步壮大，成为最强大的藩镇；篡唐建梁，开启五代十国时期；在位期间试图削弱藩镇、整顿吏治。", "works": [], "reviews": ["**《旧五代史》**：“太祖（朱温）肇基王迹，奄有中原，实由天资，非假人力。然猜忌宿将，诛戮功臣，失驭下之道矣。”", "**《新五代史》（欧阳修）**：“呜呼，天下之恶梁久矣！自后唐以来，皆以为伪也。” 欧阳修从儒家正统观出发，视后梁为“伪”朝。", "**现代史学观点**：多认为朱温是唐末乱世中能力超群的枭雄，其成功在于审时度势的决断力和强大的军事组织能力。他的统治结束了唐朝的腐朽统治，但未能建立稳定的新秩序，其个人品行的缺陷也加速了王朝的动荡。"]}}, "locations": [{"name": "宋州砀山", "ancientName": "宋州砀山", "modernName": "唐宋州砀山县（今安徽省宿州市砀山县）", "lat": 34.4418972, "lng": 116.4717068, "type": "birth", "event": "出生并成长于贫苦家庭，早年丧父，随母寄居萧县刘崇家，不事生产，以雄勇自负。", "time": "852年", "duration": "青少年时期（约至877年）", "significance": "其早年卑微的出身和经历，塑造了他强悍、投机的性格，是其日后投身乱世的起点。", "works": [], "quoteLines": []}, {"name": "黄巢军中（长安等地）", "ancientName": "黄巢军中（长安等地）", "modernName": "活动于中原、关中地区，核心为长安（今陕西省西安市）", "lat": 34.285821, "lng": 108.9479051, "type": "normal", "event": "与兄朱存一同投奔黄巢起义军。因作战勇敢，屡立战功，黄巢攻占长安后，朱温被任命为东南面行营先锋使、同州防御使等职。", "time": "877年—882年", "duration": "约5年", "significance": "从平民跻身军事将领的关键阶段，积累了军事经验和声望，也目睹了起义军由盛转衰的过程。", "works": [], "quoteLines": ["无直接文学作品。相关历史记载见《旧五代史·梁书·太祖纪》。"]}, {"name": "汴州（开封）", "ancientName": "汴州（开封）", "modernName": "唐汴州宣武军治所（今河南省开封市）", "lat": 34.604167, "lng": 114.497222, "type": "normal", "event": "投降唐朝后，被任命为宣武军节度使，以此为根据地。在此招兵买马，联合周边藩镇，击败黄巢余部及秦宗权等强大对手，逐步统一河南。开平元年（907年）在此篡唐建梁，定为东都。 color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：**唐朝末年**，**藩镇割据**严重，**黄巢起义**沉重打击了唐朝统治。\n- **关键事件**：**朱温投降唐朝**，被封为节度使；逐渐控制朝政；**907年，朱温建立后梁**，**唐朝灭亡**。\n- **代表作品/思想**：无。\n- **常见易混点/对比点**：区分**安史之乱**（唐朝由盛转衰）与**藩镇割据**（唐朝衰亡的重要原因）；注意**五代（北方中原）** 与**十国（南方及山西）** 的并存局面。\n\n### 高中阶段\n- **时代背景**：**唐末农民起义**后，中央权威彻底崩溃，进入**五代十国**的**大分裂时期**，实质是**唐末藩镇割据局面的延续和扩大**。\n- **关键事件**：朱温从**农民军将领**到**唐朝节度使**再到**开国皇帝**的身份转变，体现了**武人政治**和**政权更迭的无序性**。\n- **代表作品/思想**：无。其政治举措主要是军事征伐和权术运用。\n- **历史评价与影响**：作为**五代第一代君主**，其行为模式（以军权夺皇权）为后续朝代所效仿；**后梁与晋（后唐）的战争**是五代前期主线。\n- **对比点**：与同时期的**李克用/李存勖**集团对比，理解梁晋争霸；与后来的**宋太祖赵匡胤**对比，同为武将夺权，但赵匡胤成功建立了长期稳定的文治政府。\n\n---", "examPoints": "### 初中阶段考点\n1.  **唐朝灭亡的标志**：907年，朱温建立后梁。\n2.  **五代十国的开端**：后梁建立，标志着五代十国（北方五代更迭，南方多国并立）时期的开始。\n3.  **朱温的身份变化**：黄巢起义将领 → 唐朝节度使 → 后梁开国皇帝。\n4.  **时代特征**：藩镇割据延续，武将掌权，政权更迭频繁。\n\n### 高中阶段考点\n1.  **朱温代唐的性质**：是唐末藩镇节度使权力膨胀至顶峰，最终颠覆中央政权的典型事件，非简单的个人篡位。\n2.  **五代十国的历史定位**：是唐末方镇割据局面的继续和发展，是统一趋势中的重大回旋，经济重心南移在此时期加速。\n3.  **梁晋争霸**：朱温建立的后梁与李克用/李存勖的河东集团（后发展为后唐）之间的长期战争，是理解五代前期历史的核心线索。\n4.  **历史评价的复杂性**：一方面，他结束了腐朽的唐朝；另一方面，他未能建立新秩序，且个人品行恶劣，导致其政权短命且评价极低。需结合**时代背景**和**历史作用**进行辩证分析。\n5.  **存疑/说法不一**：关于朱温在**上源驿事件**中是否蓄意谋杀李克用，以及其晚年**私生活混乱**的具体程度，史料记载有夸张和妖魔化成分，需审慎看待。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：朱温（后赐名朱全忠，称帝后改名朱晃）\n- **时代**：唐末五代\n- **出生**：唐大中六年（852年），宋州砀山（今安徽省砀山县）\n- **去世**：后梁乾化二年（912年），洛阳（今河南省洛阳市）\n- **享年**：61岁\n- **主要身份**：农民军将领、唐朝节度使、后梁开国皇帝\n- **历史地位**：五代十国时期第一个朝代后梁的建立者，终结了唐朝近三百年的统治。\n- **主要成就**：参加并领导唐末农民起义；投降唐朝后逐步壮大，成为最强大的藩镇；篡唐建梁，开启五代十国时期；在位期间试图削弱藩镇、整顿吏治。\n\n### 生平概述\n朱温出身贫寒，于唐末乱世中投身黄巢起义军，因战功升任将领。后审时度势，归降唐朝，被赐名“全忠”，委以重任。他凭借卓越的军事才能和政治手腕，在藩镇混战中击败秦宗权、朱瑄、朱瑾等强敌，控制了中原核心地区，进封梁王。天祐四年（907年），他逼迫唐哀帝禅让，建立后梁，定都开封（汴州），唐朝正式灭亡。在位期间，他与晋王李克用、李存勖父子长期征战，晚年因皇位继承问题引发内乱，最终被亲子朱友珪所弑。其一生充满背叛与征伐，是唐末五代武人政治的典型代表。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：以中原地区（今河南、山东、陕西为核心），北至河北，南至江淮，西至关中的广阔区域。\n- ⏱️ **时间跨度**：公元852年—912年，共61年。\n- 📍 **地理范围**：大致覆盖今安徽、河南、山东、陕西、河北、江苏等省。\n- 🌟 **重要节点数量**：核心地点约8个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：宋州砀山\n- **公元纪年**：852年\n- **停留时间**：青少年时期（约至877年）\n- **位置**：唐宋州砀山县（今安徽省宿州市砀山县）\n- **事迹**：出生并成长于贫苦家庭，早年丧父，随母寄居萧县刘崇家，不事生产，以雄勇自负。\n- **意义**：其早年卑微的出身和经历，塑造了他强悍、投机的性格，是其日后投身乱世的起点。\n\n### 📍 重要地点：黄巢军中（长安等地）\n- **公元纪年**：877年—882年\n- **停留时间**：约5年\n- **位置**：活动于中原、关中地区，核心为长安（今陕西省西安市）\n- **事迹**：与兄朱存一同投奔黄巢起义军。因作战勇敢，屡立战功，黄巢攻占长安后，朱温被任命为东南面行营先锋使、同州防御使等职。\n- **意义**：从平民跻身军事将领的关键阶段，积累了军事经验和声望，也目睹了起义军由盛转衰的过程。\n- **名篇名句**：无直接文学作品。相关历史记载见《旧五代史·梁书·太祖纪》。\n\n### 📍 重要地点：汴州（开封）\n- **公元纪年**：883年—907年（任节度使期间及称帝后）\n- **停留时间**：约24年，其政治生涯的核心阶段。\n- **位置**：唐汴州宣武军治所（今河南省开封市）\n- **事迹**：投降唐朝后，被任命为宣武军节度使，以此为根据地。在此招兵买马，联合周边藩镇，击败黄巢余部及秦宗权等强大对手，逐步统一河南。开平元年（907年）在此篡唐建梁，定为东都。\n- **意义**：朱温崛起和统治的权力中心，是其霸业的基石。\n- **名篇名句**：无直接文学作品。相关历史记载见《资治通鉴》。\n\n### 📍 重要地点：长安\n- **公元纪年**：883年（作为黄巢将领）、901-903年（控制朝廷时期）\n- **停留时间**：断断续续数年\n- **位置**：唐都城长安（今陕西省西安市）\n- **事迹**：前期作为黄巢将领攻入长安；后期在“藩镇乱政”时期，率军入关中，从凤翔李茂贞手中夺回唐昭宗，控制朝廷，大肆诛杀宦官和朝臣，并迁都洛阳。\n- **意义**：唐朝政治中心，朱温在此完成了对中央朝廷的实际控制，为篡位扫清障碍。\n- **名篇名句**：无直接文学作品。\n\n### 📍 重要地点：洛阳\n- **公元纪年**：904年—912年（迁都后至去世）\n- **停留时间**：约8年\n- **位置**：唐东都，后梁西都（今河南省洛阳市）\n- **事迹**：强迫唐昭宗迁都洛阳，并弑杀昭宗。后在此逼迫唐哀帝禅位。称帝后，因开封战事需要常驻洛阳，晚年在此宫中因继承人问题引发家庭矛盾。\n- **意义**：唐朝的终结地，后梁的另一个政治中心，也是朱温生命的终点。\n- **名篇名句**：无直接文学作品。\n\n### 📍 重要地点：魏州（魏博镇）\n- **公元纪年**：906年—907年\n- **停留时间**：数月\n- **位置**：唐魏博节度使治所（今河北省邯郸市大名县东北）\n- **事迹**：率军北上救援被李克用之子李存勖攻打的魏博镇，趁机干预魏博内政，试图控制该重要藩镇。\n- **意义**：体现了朱温晚年与河东李克用集团争夺河北霸权的关键战役地点。\n\n### 📍 重要地点：泽潞（潞州）\n- **公元纪年**：908年—910年（潞州之战期间）\n- **停留时间**：长期围困与征战\n- **位置**：唐昭义军节度使治所（今山西省长治市）\n- **事迹**：朱温称帝后，派大军围攻李克用死后由李存勖坚守的潞州，双方在此展开长期拉锯战，后梁军最终大败。\n- **意义**：朱温与李存勖争霸的关键战役地点，此战失利严重削弱了后梁的军事优势。\n- **名篇名句**：无直接文学作品。\n\n### 🔴 去世地：洛阳宫中\n- **公元纪年**：912年\n- **停留时间**：晚年常驻\n- **位置**：后梁西都洛阳皇宫（今河南省洛阳市）\n- **经过**：晚年荒淫无度，因欲传位养子朱友文，引发亲子朱友珪不满。乾化二年（912年），朱友珪率禁军发动政变，攻入宫中，将朱温杀死。\n- **意义**：其生命的终点，也因其非正常死亡引发了后梁的内部动荡，加速了后梁的衰亡。\n- **名篇名句**：无直接文学作品。\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 852年 | 0岁 | 出生于宋州砀山。 |\n| 877年 | 约25岁 | 与兄长朱存加入黄巢起义军。 |\n| 880年 | 约28岁 | 随黄巢军攻入长安。 |\n| 882年 | 30岁 | 任黄巢同州防御使，因战事不利，叛变降唐，被唐僖宗赐名“全忠”，授左金吾卫大将军、河中行营副招讨使。 |\n| 883年 | 31岁 | 任唐宣武军节度使，镇守汴州（开封），以此为根据地开始扩张。 |\n| 884年 | 32岁 | 联合各镇，在汴州上源驿袭击盟友李克用，结下深仇。 |\n| 887年 | 35岁 | 大败秦宗权，基本控制河南地区，成为中原最强藩镇。 |\n| 897年 | 45岁 | 攻灭郓州朱瑄、兖州朱瑾，尽有山东之地。 |\n| 901年 | 49岁 | 率军入关中，与凤翔李茂贞争夺对唐昭宗的控制权。 |\n| 903年 | 51岁 | 从凤翔迎回唐昭宗，尽诛宦官，受封梁王，完全控制朝廷。 |\n| 904年 | 52岁 | 弑杀唐昭宗，立哀帝，强迁都洛阳。 |\n| 907年 | 55岁 | 逼迫唐哀帝禅让，登基称帝，国号大梁（史称后梁），定都开封，唐朝灭亡。 |\n| 908年 | 56岁 | 潞州之战，被李存勖击败。 |\n| 912年 | 60岁 | 亲征河北，因病返洛阳。因传位问题，被亲子朱友珪发动政变杀死。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n朱温通过军事征伐和政治篡夺，正式终结了唐朝的统治，建立了五代第一个朝代后梁，标志着中国历史进入“五代十国”的大分裂时期。他的行为加剧了武将专权、藩镇割据的局面，其与河东李克用、李存勖父子的长期战争，构成了五代前期最主要的军事政治对抗主线。\n\n### 对后世的影响\n1.  **开启五代乱世**：其篡唐行为成为五代更迭的范式，此后五十余年间，中原王朝更替频繁，多以武将夺权方式完成。\n2.  **政治道德批判的典型**：因其反复无常（叛黄巢、叛唐）、弑君杀主、荒淫乱伦等行为，在后世史书和儒家伦理中成为负面典型，常与曹操并提。\n3.  **经济重心南移的催化剂**：中原长期战乱，客观上促使南方相对稳定的政权（如吴越、南唐）得以发展，加速了经济重心南移的进程。\n\n### 历史评价\n1.  **《旧五代史》**：“太祖（朱温）肇基王迹，奄有中原，实由天资，非假人力。然猜忌宿将，诛戮功臣，失驭下之道矣。”\n2.  **《新五代史》（欧阳修）**：“呜呼，天下之恶梁久矣！自后唐以来，皆以为伪也。” 欧阳修从儒家正统观出发，视后梁为“伪”朝。\n3.  **现代史学观点**：多认为朱温是唐末乱世中能力超群的枭雄，其成功在于审时度势的决断力和强大的军事组织能力。他的统治结束了唐朝的腐朽统治，但未能建立稳定的新秩序，其个人品行的缺陷也加速了王朝的动荡。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**唐朝末年**，**藩镇割据**严重，**黄巢起义**沉重打击了唐朝统治。\n- **关键事件**：**朱温投降唐朝**，被封为节度使；逐渐控制朝政；**907年，朱温建立后梁**，**唐朝灭亡**。\n- **代表作品/思想**：无。\n- **常见易混点/对比点**：区分**安史之乱**（唐朝由盛转衰）与**藩镇割据**（唐朝衰亡的重要原因）；注意**五代（北方中原）** 与**十国（南方及山西）** 的并存局面。\n\n### 高中阶段\n- **时代背景**：**唐末农民起义**后，中央权威彻底崩溃，进入**五代十国**的**大分裂时期**，实质是**唐末藩镇割据局面的延续和扩大**。\n- **关键事件**：朱温从**农民军将领**到**唐朝节度使**再到**开国皇帝**的身份转变，体现了**武人政治**和**政权更迭的无序性**。\n- **代表作品/思想**：无。其政治举措主要是军事征伐和权术运用。\n- **历史评价与影响**：作为**五代第一代君主**，其行为模式（以军权夺皇权）为后续朝代所效仿；**后梁与晋（后唐）的战争**是五代前期主线。\n- **对比点**：与同时期的**李克用/李存勖**集团对比，理解梁晋争霸；与后来的**宋太祖赵匡胤**对比，同为武将夺权，但赵匡胤成功建立了长期稳定的文治政府。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  **唐朝灭亡的标志**：907年，朱温建立后梁。\n2.  **五代十国的开端**：后梁建立，标志着五代十国（北方五代更迭，南方多国并立）时期的开始。\n3.  **朱温的身份变化**：黄巢起义将领 → 唐朝节度使 → 后梁开国皇帝。\n4.  **时代特征**：藩镇割据延续，武将掌权，政权更迭频繁。\n\n### 高中阶段考点\n1.  **朱温代唐的性质**：是唐末藩镇节度使权力膨胀至顶峰，最终颠覆中央政权的典型事件，非简单的个人篡位。\n2.  **五代十国的历史定位**：是唐末方镇割据局面的继续和发展，是统一趋势中的重大回旋，经济重心南移在此时期加速。\n3.  **梁晋争霸**：朱温建立的后梁与李克用/李存勖的河东集团（后发展为后唐）之间的长期战争，是理解五代前期历史的核心线索。\n4.  **历史评价的复杂性**：一方面，他结束了腐朽的唐朝；另一方面，他未能建立新秩序，且个人品行恶劣，导致其政权短命且评价极低。需结合**时代背景**和**历史作用**进行辩证分析。\n5.  **存疑/说法不一**：关于朱温在**上源驿事件**中是否蓄意谋杀李克用，以及其晚年**私生活混乱**的具体程度，史料记载有夸张和妖魔化成分，需审慎看待。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 出生于宋州砀山。 | 出生于宋州砀山。 | 30.272577 | 120.132510 |\n| 联合各镇，在汴州上源驿袭击盟友李克用，结下深仇。 | 联合各镇，在汴州上源驿袭击盟友李克用，结下深仇。 | 23.364376 | 112.456821 |\n| 率军入关中，与凤翔李茂贞争夺对唐昭宗的控制权。 | 率军入关中，与凤翔李茂贞争夺对唐昭宗的控制权。 | 31.908446 | 117.396142 |\n| 弑杀唐昭宗，立哀帝，强迁都洛阳。 | 弑杀唐昭宗，立哀帝，强迁都洛阳。 | 22.524045 | 113.965175 |\n| 潞州之战，被李存勖击败。 | 潞州之战，被李存勖击败。 | 24.309685 | 109.391801 |\n| 亲征河北，因病返洛阳。因传位问题，被亲子朱友珪发动政变杀死。 | 亲征河北，因病返洛阳。因传位问题，被亲子朱友珪发动政变杀死。 | 37.568797 | 115.911856 |"};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {
  if (!text) return null;
  const match = String(text).match(/(\d{3,4})\s*年/);
  return match ? parseInt(match[1], 10) : null;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-extrabold text-gray-900">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
