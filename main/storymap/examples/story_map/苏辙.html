"quoteLines": ["《雷州谢表》：“并鬼门而东骛，浮瘴海以南迁。”"]}, {"name": "颍昌府（许州）", "ancientName": "颍昌府", "modernName": "今河南省许昌市", "lat": 34.03139, "lng": 113.81975, "type": "death", "event": "徽宗即位后，苏辙曾短暂北归。崇宁元年（1102年）后，被列入“元祐党人”碑，被罢祠禄官。此后便定居颍昌，杜门谢客，不与外事，专心整理旧作，著《颍滨遗老传》，直至政和二年（1112年）病逝。", "time": "1102年-1112年", "duration": "约10年", "significance": "人生最后的归宿与隐居地，在此完成了对一生的总结与著述。", "works": ["颍滨遗老传"], "quoteLines": ["《秋社》：“明朝好时节，莫待鬓成丝。”"]}], "mapStyle": {"pathColor": "#1e40af", "markers": {"normal": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：生活在**北宋中期**，社会矛盾尖锐，面临**辽和西夏**的威胁。\n- **家庭关系**：**苏洵**之子，**苏轼**之弟，合称“**三苏**”，均被列入“**唐宋八大家**”。\n- **科举入仕**：与兄苏轼同科考中**进士**，传为佳话。\n- **政治立场**：在**王安石变法**期间，持**反对**态度，属于**旧党**阵营。\n- **代表作品**：散文《**上枢密韩太尉书**》（常作为古代书信体散文的典范）。\n- **常见易混点**：区分“三苏”的字号（苏洵-老泉，苏轼-子瞻/东坡，苏辙-子由/颍滨）；注意“唐宋八大家”中宋代的六位（欧阳修、王安石、曾巩、三苏）。\n\n### 高中阶段\n- **政治生涯**：深度参与**新旧党争**，元祐年间官至**门下侍郎**（副宰相），是“**元祐更化**”的重要执行者。\n- **贬谪经历**：因“**乌台诗案**”受苏轼牵连被贬；哲宗亲政后，作为旧党核心被远贬至**岭南**（循州、雷州）。\n- **文学成就**：散文以**政论**和**史论**见长，风格**汪洋澹泊**，如《**六国论**》（与苏洵同题异趣）；诗歌与苏轼唱和颇多。\n- **思想与学术**：晚年著述《**古史**》、《**颍滨遗老传**》，体现其**史学**和**哲学**思考。\n- **对比点**：与苏轼相比，苏辙性格更**沉静内敛**，仕途后期更为**显达**（官至宰执），但贬谪也更**偏远持久**；文风上，苏轼豪放飘逸，苏辙**醇厚深沉**。\n- **关键词**：**三苏**、**唐宋八大家**、**新旧党争**、**元祐更化**、**乌台诗案**、**门下侍郎**。\n\n---", "examPoints": "### 初中阶段\n1.  “三苏”指北宋的**苏洵、苏轼、苏辙**父子三人。\n2.  苏辙与父兄同列“**唐宋八大家**”。\n3.  苏辙与苏轼于**嘉祐二年**同榜考中**进士**。\n4.  苏辙在政治上反对**王安石变法**，属于旧党。\n5.  代表作《**上枢密韩太尉书**》提出了“**文气说**”的文学观点。\n6.  （存疑）苏辙是否直接参与了“乌台诗案”的营救？（答：他上书请求以官职为兄赎罪，因此被贬。）\n\n### 高中阶段\n1.  苏辙在**元祐年间**官至**门下侍郎**，达到政治顶峰。\n2.  其贬谪地包括**筠州**（江西）、**循州**（广东）、**雷州**（广东），反映了北宋党争的残酷性。\n3.  文学风格与苏轼的区别：苏轼**豪放旷达**，苏辙**沉稳含蓄**。\n4.  苏辙的史论文章，如《**六国论**》，借古讽今，议论精辟。\n5.  晚年定居**颍昌府**（今河南许昌），闭门著述，完成《**古史**》等。\n6.  （说法不一）苏辙在“元祐更化”中的具体作用和评价，有观点认为其政策较为**稳健务实**，也有观点认为其**党同伐异**。\n7.  与苏轼的兄弟情谊是理解其生平的重要线索，患难中“**友爱弥笃**”（《宋史》评）。\n8.  作为文学家，其散文成就主要体现在**议论文**和**书信杂记**中。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：苏辙（字子由，号颍滨遗老）\n- **时代**：北宋\n- **出生**：宋仁宗宝元二年二月二十日（1039年3月18日），眉州眉山（今四川省眉山市）\n- **去世**：宋徽宗政和二年十月三日（1112年10月25日），颍昌府（今河南省许昌市）\n- **享年**：74岁\n- **主要身份**：文学家、政治家、思想家、唐宋八大家之一\n- **历史地位**：北宋重要的文学家与政治家，与父苏洵、兄苏轼并称“三苏”，位列“唐宋八大家”，其散文成就卓著，政论深具洞察力。\n- **主要成就**：散文创作位列“唐宋八大家”；政论文章见解深刻，如《新论》、《六国论》；史学著作《古史》；诗歌创作自成一家。\n\n### 生平概述\n苏辙生于北宋仁宗时期，成长于文学世家，与兄苏轼自幼一同读书。嘉祐二年（1057年）兄弟同榜中进士，步入仕途。其政治生涯深受“新旧党争”影响，因反对王安石变法而屡遭外放贬谪。哲宗亲政后，更被远贬至岭南、雷州等地。晚年定居颍昌，闭门谢客，潜心著述。他一生宦海沉浮，足迹遍及大半个中国，但始终保持着对文学与学术的执着，其文章以稳健淡泊、论事精确著称，是北宋中期重要的文坛领袖之一。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：从四川眉山出发，辗转于京城开封、地方州县（如陈州、齐州、南京），晚年贬谪至岭南（广东、广西），最终定居于河南许昌。\n- ⏱️ **时间跨度**：1039年—1112年，共73年。\n- 📍 **地理范围**：大致覆盖今四川、河南、安徽、山东、江苏、浙江、江西、广东、广西等省区。\n- 🌟 **重要节点数量**：约10个核心地点。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：眉州眉山\n- **公元纪年**：1039年\n- **停留时间**：约18年（1039-1057）\n- **位置**：眉州眉山（今四川省眉山市）\n- **事迹**：与兄苏轼一同在家乡接受启蒙教育，深受父亲苏洵的教导和蜀地文化熏陶。\n- **意义**：人生与文学之路的起点，奠定了深厚的家学基础。\n\n### 📍 重要地点：京城开封\n- **公元纪年**：1057年，1061-1065年，1069-1070年等多次居留\n- **停留时间**：断续居留数年\n- **位置**：东京开封府（今河南省开封市）\n- **事迹**：嘉祐二年（1057年）与兄苏轼同中进士；嘉祐六年（1061年）参加制科考试，授商州军事推官；熙宁年间任制置三司条例司检详文字，因与王安石政见不合而出京。\n- **意义**：科举入仕、登上政治舞台的核心舞台，也是卷入新旧党争漩涡的中心。\n- **名篇名句**：《上枢密韩太尉书》：“以为文者气之所形，然文不可以学而能，气可以养而致。”\n\n### 📍 重要地点：陈州（宛丘）\n- **公元纪年**：1070年-1073年\n- **停留时间**：约3年\n- **位置**：陈州宛丘（今河南省周口市淮阳区）\n- **事迹**：因反对新法被贬，任陈州教授。期间与任陈州知州的张方平交往密切，并常与苏轼诗文唱和。\n- **意义**：首次离京外放的贬谪地，得以远离政治中心，潜心学术与文学。\n- **名篇名句**：《次韵子瞻感旧》：“还朝正三伏，一再趋未央。”\n\n### 📍 重要地点：齐州（济南）\n- **公元纪年**：1074年-1077年\n- **停留时间**：约3年\n- **位置**：齐州（今山东省济南市）\n- **事迹**：任齐州掌书记，协助知州处理政务，期间治理地方，颇有政绩。\n- **意义**：重要的地方任职经历，积累了实际政务经验。\n\n### 📍 重要地点：南京应天府（商丘）\n- **公元纪年**：1077年-1079年\n- **停留时间**：约2年\n- **位置**：南京应天府（今河南省商丘市）\n- **事迹**：任南京签书判官。元丰二年（1079年），“乌台诗案”爆发，苏轼下狱，苏辙上书请求以自己的官职为兄赎罪，结果被贬监筠州盐酒税。\n- **意义**：人生重大转折点，因兄长案受牵连，开启了更为艰难的贬谪生涯。\n- **名篇名句**：《为兄轼下狱上书》：“臣窃哀其志，不胜手足之情，故为冒死一言。”\n\n### 📍 重要地点：筠州（高安）\n- **公元纪年**：1080年-1084年\n- **停留时间**：约5年\n- **位置**：筠州高安（今江西省高安市）\n- **事迹**：因“乌台诗案”牵连被贬，任监筠州盐酒税，职位卑微，生活困顿。在此期间创作了大量诗文。\n- **意义**：政治生涯的低谷期，但文学创作进入一个高峰期。\n- **名篇名句**：《东轩记》：“余既以谴来此，虽知桎梏之害而势不得去。”\n\n### 📍 重要地点：歙州绩溪\n- **公元纪年**：1085年-1086年\n- **停留时间**：约1年\n- **位置**：歙州绩溪（今安徽省宣城市绩溪县）\n- **事迹**：哲宗即位，旧党执政，苏辙被召还朝，途中短暂任绩溪县令。\n- **意义**：政治生涯复苏的过渡点，预示即将重返权力中心。\n\n### 📍 重要地点：京城开封（元祐年间）\n- **公元纪年**：1086年-1093年\n- **停留时间**：约7年\n- **位置**：东京开封府（今河南省开封市）\n- **事迹**：元祐更化期间，苏辙被召回朝廷，历任右司谏、起居郎、中书舍人、户部侍郎，直至门下侍郎（副宰相），达到政治生涯的顶峰。他积极废除新法，参与高层决策。\n- **意义**：政治生涯的黄金时期，官至宰执，实现了政治抱负。\n- **名篇名句**：《乞诛窜吕惠卿状》：“惠卿……怀张汤之狡诈，兼卢杞之奸凶。”\n\n### 📍 重要地点：岭南（循州、雷州）\n- **公元纪年**：1094年-1100年\n- **停留时间**：约6年\n- **位置**：循州龙川（今广东省河源市龙川县）、雷州海康（今广东省湛江市雷州市）\n- **事迹**：哲宗亲政，新党得势，苏辙连遭贬谪，先贬知袁州，再贬至循州、雷州。在岭南度过艰难岁月，但仍坚持著述。\n- **意义**：人生最困顿的贬谪时期，但也磨练了意志，完成了部分学术著作。\n- **名篇名句**：《雷州谢表》：“并鬼门而东骛，浮瘴海以南迁。”\n\n### 🔴 去世地：颍昌府（许州）\n- **公元纪年**：1102年-1112年\n- **停留时间**：约10年\n- **位置**：颍昌府（今河南省许昌市）\n- **经过**：徽宗即位后，苏辙曾短暂北归。崇宁元年（1102年）后，被列入“元祐党人”碑，被罢祠禄官。此后便定居颍昌，杜门谢客，不与外事，专心整理旧作，著《颍滨遗老传》，直至政和二年（1112年）病逝。\n- **意义**：人生最后的归宿与隐居地，在此完成了对一生的总结与著述。\n- **名篇名句**：《秋社》：“明朝好时节，莫待鬓成丝。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| :--- | :--- | :--- |\n| 1039年 | 1岁 | 生于眉州眉山。 |\n| 1057年 | 19岁 | 与兄苏轼同榜中进士。 |\n| 1061年 | 23岁 | 参加制科考试，入第四等，授商州军事推官。 |\n| 1069年 | 31岁 | 回京，任制置三司条例司检详文字，参与变法讨论，因反对新法而出为河南推官。 |\n| 1070年 | 32岁 | 任陈州教授。 |\n| 1074年 | 36岁 | 任齐州掌书记。 |\n| 1077年 | 39岁 | 任南京签书判官。 |\n| 1079年 | 41岁 | 因“乌台诗案”受牵连，贬监筠州盐酒税。 |\n| 1085年 | 47岁 | 哲宗即位，旧党执政，被召还朝，任绩溪县令。 |\n| 1086年 | 48岁 | 回朝，任右司谏，后历任中书舍人、户部侍郎等职。 |\n| 1091年 | 53岁 | 官至门下侍郎（副宰相）。 |\n| 1094年 | 56岁 | 哲宗亲政，新党上台，被贬知袁州，再贬至岭南循州。 |\n| 1097年 | 59岁 | 再贬至雷州。 |\n| 1100年 | 62岁 | 徽宗即位，遇赦北归。 |\n| 1102年 | 64岁 | 被列入“元祐党人”碑，罢官，定居颍昌府。 |\n| 1112年 | 74岁 | 在颍昌府病逝。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n苏辙是北宋中后期重要的政治家和文坛领袖。在元祐年间官至宰执，其政治主张深刻影响了“元祐更化”的政策走向。作为“三苏”之一，他与苏轼共同引领了当时的文风，其散文和诗歌在士林中享有崇高声誉，是“唐宋八大家”传统在北宋的重要传承者与实践者。\n\n### 对后世的影响\n1.  **散文典范**：其散文成就被后世列为“唐宋八大家”之一，其文风“汪洋澹泊，深醇温粹”，成为后世学习古文的典范。\n2.  **学术贡献**：所著《古史》、《诗集传》、《春秋集解》等，对后世经学、史学研究有重要参考价值。\n3.  **家族文化象征**：与父兄共同构成的“三苏”文化现象，成为后世家族教育与文学传承的楷模。\n4.  **人格精神**：其一生在政治风波中沉浮，却能保持淡泊自守、潜心著述的品格，为后世文人提供了某种精神参照。\n\n### 历史评价\n1.  **苏轼评**：“子由之文实胜仆，而世俗不知，乃以为不如。其人深，不愿人知之。其文如其为人，故汪洋澹泊，有一唱三叹之声，而其秀杰之气终不可没。”（《答张文潜书》）\n2.  **朱熹评**：“苏子由……晚年作《待月轩记》，说他自悟道。”（《朱子语类》）肯定其晚年思想境界。\n3.  **《宋史》评**：“辙与兄进退出处，无不相同，患难之中，友爱弥笃，无少怨尤，近古罕见。”\n4.  **后世文学史定位**：与父兄并称“三苏”，位列“唐宋八大家”，是北宋古文运动的核心人物之一。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：生活在**北宋中期**，社会矛盾尖锐，面临**辽和西夏**的威胁。\n- **家庭关系**：**苏洵**之子，**苏轼**之弟，合称“**三苏**”，均被列入“**唐宋八大家**”。\n- **科举入仕**：与兄苏轼同科考中**进士**，传为佳话。\n- **政治立场**：在**王安石变法**期间，持**反对**态度，属于**旧党**阵营。\n- **代表作品**：散文《**上枢密韩太尉书**》（常作为古代书信体散文的典范）。\n- **常见易混点**：区分“三苏”的字号（苏洵-老泉，苏轼-子瞻/东坡，苏辙-子由/颍滨）；注意“唐宋八大家”中宋代的六位（欧阳修、王安石、曾巩、三苏）。\n\n### 高中阶段\n- **政治生涯**：深度参与**新旧党争**，元祐年间官至**门下侍郎**（副宰相），是“**元祐更化**”的重要执行者。\n- **贬谪经历**：因“**乌台诗案**”受苏轼牵连被贬；哲宗亲政后，作为旧党核心被远贬至**岭南**（循州、雷州）。\n- **文学成就**：散文以**政论**和**史论**见长，风格**汪洋澹泊**，如《**六国论**》（与苏洵同题异趣）；诗歌与苏轼唱和颇多。\n- **思想与学术**：晚年著述《**古史**》、《**颍滨遗老传**》，体现其**史学**和**哲学**思考。\n- **对比点**：与苏轼相比，苏辙性格更**沉静内敛**，仕途后期更为**显达**（官至宰执），但贬谪也更**偏远持久**；文风上，苏轼豪放飘逸，苏辙**醇厚深沉**。\n- **关键词**：**三苏**、**唐宋八大家**、**新旧党争**、**元祐更化**、**乌台诗案**、**门下侍郎**。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段\n1.  “三苏”指北宋的**苏洵、苏轼、苏辙**父子三人。\n2.  苏辙与父兄同列“**唐宋八大家**”。\n3.  苏辙与苏轼于**嘉祐二年**同榜考中**进士**。\n4.  苏辙在政治上反对**王安石变法**，属于旧党。\n5.  代表作《**上枢密韩太尉书**》提出了“**文气说**”的文学观点。\n6.  （存疑）苏辙是否直接参与了“乌台诗案”的营救？（答：他上书请求以官职为兄赎罪，因此被贬。）\n\n### 高中阶段\n1.  苏辙在**元祐年间**官至**门下侍郎**，达到政治顶峰。\n2.  其贬谪地包括**筠州**（江西）、**循州**（广东）、**雷州**（广东），反映了北宋党争的残酷性。\n3.  文学风格与苏轼的区别：苏轼**豪放旷达**，苏辙**沉稳含蓄**。\n4.  苏辙的史论文章，如《**六国论**》，借古讽今，议论精辟。\n5.  晚年定居**颍昌府**（今河南许昌），闭门著述，完成《**古史**》等。\n6.  （说法不一）苏辙在“元祐更化”中的具体作用和评价，有观点认为其政策较为**稳健务实**，也有观点认为其**党同伐异**。\n7.  与苏轼的兄弟情谊是理解其生平的重要线索，患难中“**友爱弥笃**”（《宋史》评）。\n8.  作为文学家，其散文成就主要体现在**议论文**和**书信杂记**中。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 生于眉州眉山。 | 生于眉州眉山。 | 22.997997 | 113.377632 |\n| 回京，任制置三司条例司检详文字，参与变法讨论，因反对新法而出为河南推官。 | 回京，任制置三司条例司检详文字，参与变法讨论，因反对新法而出为河南推官。 const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

        locations[i+1].lat, locations[i+1].lng

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
