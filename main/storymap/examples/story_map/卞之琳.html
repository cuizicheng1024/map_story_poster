: "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **核心篇目**：**《断章》**（常见于九年级或高中语文拓展阅读）。\n- **关键词**：**现代诗**、**哲理诗**、**意象**（桥、楼、明月、窗）、**相对性**（主客体关系）。\n- **常见考点**：\n    1.  诗歌描绘的**画面**与营造的**意境**。\n    2.  诗中蕴含的**哲理**：世间万物相互关联、相互依存的相对关系。\n    3.  “装饰”一词的**双重含义**与**反讽**意味。\n    4.  作者**卞之琳**所属的诗歌流派（**现代派**）。\n    5.  与古典诗词（如“落花人独立，微雨燕双飞”）在意象运用上的**对比**。\n\n### 高中阶段\n- **核心知识**：卞之琳与**现代派诗歌**、**“汉园三诗人”**。\n- **关键词**：**新月派**（格律）、**现代派**（象征、智性）、**客观对应物**、**戏剧化处境**。\n- **常见考点**：\n    1.  卞之琳诗歌的**艺术特色**：融汇中国古典诗学与西方现代主义技巧（如象征、玄学）。\n    2.  从**新月派**到**现代派**的转变轨迹（比较其与徐志摩、戴望舒的异同）。\n    3.  《断章》的**多层解读**（爱情说、哲理说、相对论说）。\n    4.  其**抗战诗歌**（《慰劳信集》）的风格转变与文学史意义。\n    5.  作为**翻译家**的成就（莎士比亚翻译）及其与创作的关系。\n    6.  在**西南联大**文学圈中的影响（对“九叶派”的启发）。\n\n---", "examPoints": "### 初中阶段考点\n1.  **《断章》的默写与填空**。\n2.  **《断章》中核心意象的识别与作用分析**（桥、明月、窗等）。\n3.  **《断章》所表达的哲理或情感**（常考选择题或简答题）。\n4.  **作者卞之琳的基本信息**（时代、流派）。\n5.  **《断章》与其它短小哲理诗（如冰心《繁星》《春水》选首）的对比阅读**。\n\n### 高中阶段考点\n1.  **卞之琳诗歌的“智性”特征**，结合具体诗句分析。\n2.  **比较卞之琳与戴望舒诗歌风格的异同**（同属现代派，但卞更重智性，戴更重情绪与音乐性）。\n3.  **分析《断章》的“相对性”哲学思想**。\n4.  **简述卞之琳在1930年代中国诗坛的地位与贡献**。\n5.  **结合《慰劳信集》选篇，谈谈抗战对其诗歌创作的影响**（存疑/说法不一：对其艺术价值的评价历来有不同看法）。\n6.  **作为翻译家，卞之琳的翻译理念与实践**（“亦步亦趋”与“神似”之争）。", "markdown": "# 卞之琳 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：卞之琳\n- **时代**：中国现当代\n- **出生**：1910年12月8日，江苏海门汤家镇\n- **去世**：2000年12月2日，北京\n- **享年**：90岁\n- **主要身份**：诗人、翻译家、文学评论家、学者\n- **历史地位**：中国现代派诗歌的重要代表，新月派向现代派过渡的关键人物，其诗歌融汇中西，以精巧的意象与深邃的哲理著称。\n- **主要成就**：创作《断章》等经典现代诗；翻译《莎士比亚悲剧四种》等西方文学名著；系统研究中国新诗发展，撰写《莎士比亚悲剧论痕》等学术著作。\n\n### 生平概述\n卞之琳生于清末民初的江苏海门，早年在私塾与小学接受教育。1929年考入北京大学英文系，深受新月派诗人闻一多、徐志摩的影响，开始诗歌创作。1930年代，他与何其芳、李广田并称“汉园三诗人”，诗风逐渐转向现代主义，以冷峻的智性与客观的象征为特色。抗战爆发后，他曾短暂访问延安，后辗转于西南联大任教。新中国成立后，他长期在中国社会科学院外国文学研究所工作，专注于莎士比亚等外国文学的研究与翻译。其一生横跨创作、翻译与学术研究，在多个领域成就卓著。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：从江苏海门出发，求学于北平，抗战期间辗转于延安、昆明等地，最终定居北京从事学术研究。\n- ⏱️ **时间跨度**：1910年—2000年，共计约90年。\n- 📍 **地理范围**：主要覆盖江苏、北京（北平）、陕西（延安）、云南（昆明）、天津等地。\n- 🌟 **重要节点数量**：8个核心地点。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：江苏海门汤家镇\n- **公元纪年**：1910年—约1918年\n- **停留时间**：童年时期（约8年）\n- **位置**：海门县汤家镇（今江苏省南通市海门区）\n- **事迹**：在此度过童年，接受最初的乡土与传统文化启蒙。\n- **意义**：故乡的风物与语言是其文化根基的起点。\n\n### 📍 重要地点：北京（北平）\n- **公元纪年**：1929年—1937年（求学与早期创作期）\n- **停留时间**：约8年\n- **位置**：北平（今北京市）\n- **事迹**：1929年入北京大学英文系学习；参与创办《水星》等文学杂志；与何其芳、李广田合出诗集《汉园集》；创作《断章》《距离的组织》等代表作。\n- **意义**：文学观念形成与创作巅峰期，从新月派走向现代派的核心舞台。\n- **名篇名句**：《断章》：“你站在桥上看风景，看风景人在楼上看你。明月装饰了你的窗子，你装饰了别人的梦。”\n\n### 📍 重要地点：延安\n- **公元纪年**：1938年\n- **停留时间**：短期访问（约数月）\n- **位置**：延安（今陕西省延安市）\n- **事迹**：随“抗战文艺工作团”访问延安，在鲁迅艺术学院临时任教，访问毛泽东等中共领导人，创作《慰劳信集》。\n- **意义**：人生与创作的一次重要“左转”，尝试用诗歌直接服务抗战，但艺术风格与革命大众化要求存在张力。\n- **名篇名句**：《慰劳信集·给<论持久战>的著者》：“你指导了奇迹，用什么？用什么？/用一枝笔，用对人的信心。”\n\n### 📍 重要地点：昆明（西南联合大学）\n- **公元纪年**：1940年—1946年\n- **停留时间**：约6年\n- **位置**：昆明（今云南省昆明市）\n- **事迹**：任教于西南联合大学外文系；继续诗歌创作与翻译；培养后辈诗人；完成《十年诗草》的编订。\n- **意义**：在战时艰苦环境中坚持学术与创作，进入创作生涯的又一个高峰期，诗艺更趋成熟。\n- **名篇名句**：《雨同我》：“我的忧愁随草绿天涯：/鸟安于巢吗？人安于客枕？”\n\n### 📍 重要地点：天津（南开大学）\n- **公元纪年**：1946年—1949年\n- **停留时间**：约3年\n- **位置**：天津（今天津市）\n- **事迹**：任南开大学英文系教授。\n- **意义**：战后相对稳定的教学与研究时期，为新中国成立后的学术转向做准备。\n\n### 📍 重要地点：北京（北京大学）\n- **公元纪年**：1949年—1952年\n- **停留时间**：约3年\n- **位置**：北京（今北京市）\n- **事迹**：任北京大学西语系教授。\n- **意义**：经历新中国成立初期的高校院系调整，学术重心开始从创作向研究倾斜。\n\n### 📍 重要地点：北京（中国社会科学院）\n- **公元纪年**：1953年—2000年\n- **停留时间**：约47年\n- **位置**：北京（今北京市）\n- **事迹**：调入北京大学文学研究所（后划归中国社会科学院），任研究员；专注于莎士比亚、布莱希特等外国作家的研究与翻译；出版《莎士比亚悲剧四种》《英国诗选》等重要译著；撰写大量学术论文。\n- **意义**：人生后半程的主要工作与生活地，完成了从诗人到卓越翻译家与学者的转型。\n- **名篇名句**：（此阶段以学术著作为主，诗歌创作减少）\n\n### 🔴 去世地：北京\n- **公元纪年**：2000年12月2日\n- **停留时间**：晚年定居于此（约47年）\n- **位置**：北京（今北京市）\n- **经过**：因病医治无效逝世。\n- **意义**：学术生涯的终点，其一生横跨整个20世纪，见证了中国现当代文学的变迁。\n- **名篇名句**：（无直接关联名句，但其《断章》等作品已成为永恒的经典）\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| :--- | :--- | :--- |\n| 1910 | 0岁 | 出生于江苏海门汤家镇。 |\n| 1929 | 19岁 | 考入北京大学英文系，开始新诗创作。 |\n| 1933 | 23岁 | 北京大学毕业。诗集《三秋草》出版。 |\n| 1935 | 25岁 | 出版诗集《鱼目集》，现代派风格成熟。 |\n| 1936 | 26岁 | 与何其芳、李广田合著的《汉园集》出版。 |\n| 1938 | 28岁 | 访问延安，创作《慰劳信集》。 |\n| 1940 | 30岁 | 开始任教于西南联合大学（昆明）。 |\n| 1942 | 32岁 | 编订的《十年诗草（1930-1939）》出版。 |\n| 1946 | 36岁 | 任教于天津南开大学。 |\n| 1949 | 39岁 | 任教于北京大学西语系。 |\n| 1953 | 43岁 | 调入北京大学文学研究所（后属中国社科院），转向学术研究。 |\n| 1956 | 46岁 | 翻译的《哈姆雷特》出版。 |\n| 1980 | 70岁 | 出版学术著作《莎士比亚悲剧论痕》。 |\n| 1982 | 72岁 | 翻译的《莎士比亚悲剧四种》出版。 |\n| 2000 | 90岁 | 12月2日于北京逝世。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n卞之琳是1930年代中国现代派诗歌的中坚力量。他将西方象征主义、玄学派诗歌的技巧与中国古典诗词的意境相融合，创作出智性深邃、形式精巧的诗歌，极大地丰富了新诗的艺术表现力。抗战时期，他尝试用诗歌介入现实，其《慰劳信集》为战时诗歌提供了另一种艺术路径。同时，作为西南联大教授，他直接影响了穆旦、杜运燮等“九叶派”诗人的成长。\n\n### 对后世的影响\n1. **诗歌典范**：《断章》成为现代汉语诗歌中流传最广、阐释最丰富的短诗之一，其哲理与意象的完美结合，为后世诗歌创作树立了典范。\n2. **翻译贡献**：其翻译的《莎士比亚悲剧四种》译笔严谨、文辞优美，是中国莎士比亚翻译史上的里程碑，影响了几代读者和研究者。\n3. **学术研究**：他的外国文学研究，特别是对莎士比亚和现代主义诗学的研究，为中国比较文学和外国文学学科建设奠定了重要基础。\n4. **文学史地位**：作为连接新月派与现代派、创作与学术的桥梁，他是中国现代文学史不可或缺的关键人物。\n\n### 历史评价\n1. **学者钱理群**：“卞之琳的诗，是‘冷淡盖深挚’的典型，在表面的冷静下蕴含着深沉的情感与哲思。”\n2. **文学史家司马长风**：“卞之琳是三十年代诗坛一颗明亮的星，他的诗以技巧的圆熟和构思的奇巧见长。”\n3. **诗人余光中**：“卞之琳先生是中国现代诗从早期白话诗的直白走向成熟的象征艺术的关键人物。”\n4. **学界共识**：他是中国现代文学史上少有的在创作、翻译、研究三个领域均取得杰出成就的“全才型”文人。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **核心篇目**：**《断章》**（常见于九年级或高中语文拓展阅读）。\n- **关键词**：**现代诗**、**哲理诗**、**意象**（桥、楼、明月、窗）、**相对性**（主客体关系）。\n- **常见考点**：\n    1.  诗歌描绘的**画面**与营造的**意境**。\n    2.  诗中蕴含的**哲理**：世间万物相互关联、相互依存的相对关系。\n    3.  “装饰”一词的**双重含义**与**反讽**意味。\n    4.  作者**卞之琳**所属的诗歌流派（**现代派**）。\n    5.  与古典诗词（如“落花人独立，微雨燕双飞”）在意象运用上的**对比**。\n\n### 高中阶段\n- **核心知识**：卞之琳与**现代派诗歌**、**“汉园三诗人”**。\n- **关键词**：**新月派**（格律）、**现代派**（象征、智性）、**客观对应物**、**戏剧化处境**。\n- **常见考点**：\n    1.  卞之琳诗歌的**艺术特色**：融汇中国古典诗学与西方现代主义技巧（如象征、玄学）。\n    2.  从**新月派**到**现代派**的转变轨迹（比较其与徐志摩、戴望舒的异同）。\n    3.  《断章》的**多层解读**（爱情说、哲理说、相对论说）。\n    4.  其**抗战诗歌**（《慰劳信集》）的风格转变与文学史意义。\n    5.  作为**翻译家**的成就（莎士比亚翻译）及其与创作的关系。\n    6.  在**西南联大**文学圈中的影响（对“九叶派”的启发）。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  **《断章》的默写与填空**。\n2.  **《断章》中核心意象的识别与作用分析**（桥、明月、窗等）。\n3.  **《断章》所表达的哲理或情感**（常考选择题或简答题）。\n4.  **作者卞之琳的基本信息**（时代、流派）。\n5.  **《断章》与其它短小哲理诗（如冰心《繁星》《春水》选首）的对比阅读**。\n\n### 高中阶段考点\n1.  **卞之琳诗歌的“智性”特征**，结合具体诗句分析。\n2.  **比较卞之琳与戴望舒诗歌风格的异同**（同属现代派，但卞更重智性，戴更重情绪与音乐性）。\n3.  **分析《断章》的“相对性”哲学思想**。\n4.  **简述卞之琳在1930年代中国诗坛的地位与贡献**。\n5.  **结合《慰劳信集》选篇，谈谈抗战对其诗歌创作的影响**（存疑/说法不一：对其艺术价值的评价历来有不同看法）。\n6.  **作为翻译家，卞之琳的翻译理念与实践**（“亦步亦趋”与“神似”之争）。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 出版诗集《鱼目集》，现代派风格成熟。 | 出版诗集《鱼目集》，现代派风格成熟。 | 30.295463 | 120.163328 |\n| 与何其芳、李广田合著的《汉园集》出版。 | 与何其芳、李广田合著的《汉园集》出版。 | 34.607283 | 112.358405 |\n| 访问延安，创作《慰劳信集》。 | 访问延安，创作《慰劳信集》。 | 46.428561 | 123.970684 |\n| 任教于天津南开大学。 | 任教于天津南开大学。 | 39.101799 | 117.157249 |\n| 任教于北京大学西语系。 | 任教于北京大学西语系。 | 28.678766 | 115.934628 |"};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-extrabold text-gray-900">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

                        : 'bg-white/70 border-transparent hover:bg-white'
                    }`}
                  >
                    <div className="flex justify-between items-start mb-2">
                      <div className="min-w-0">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-sm truncate">{loc.name}</span>
                          {loc.type === 'birth' ? (
                            <span className="text-[10px] px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700 border border-emerald-200">出生</span>
                          ) : loc.type === 'death' ? (
                            <span className="text-[10px] px-1.5 py-0.5 rounded bg-rose-50 text-rose-700 border border-rose-200">去世</span>
                          ) : null}
                        </div>
                        <div className="text-[10px] text-gray-400 truncate">{loc.ancientName} → {loc.modernName}</div>
                      </div>
                      <span className="text-[10px] px-1.5 py-0.5 rounded bg-gray-100 text-gray-500">
                        {loc.time || '未知'}
                      </span>
                    </div>
                    <div className="space-y-1 text-[11px] text-gray-500 mb-2">
                      <div className="flex justify-between">
                        <span>公元纪年</span>
                        <span className="text-gray-700">{loc.time || '未知'}</span>
                      </div>
                      <div className="flex justify-between">
                        <span>停留时间</span>
                        <span className="text-gray-700">{loc.duration || '未知'}</span>
                      </div>
                    </div>
                    <p className="text-xs text-gray-500">{loc.event}</p>
                  </div>
                ))
              ) : (
                <div className="text-xs text-gray-400">暂无事件</div>
              )}
            </div>
          </div>
          <div
            className="hidden lg:block w-2 rounded bg-[#c8b496]/50 hover:bg-[#c8b496] cursor-col-resize"
            onMouseDown={(e) => {
              e.preventDefault();
              draggingRef.current = true;
            }}
          ></div>
          <div className="relative flex-1">
            <div id="map"></div>
            {selectedLoc && (
              <div className="absolute top-4 left-4 z-[1000] w-72 glass-panel p-4 rounded-xl shadow-xl border-t-4 border-[#c0392b]">
                <button
                  onClick={() => setSelectedLoc(null)}
                  className="absolute top-2 right-2 text-gray-400 hover:text-gray-600"
                >✕</button>
                <h3 className="text-xl font-bold text-[#c0392b] mb-1">{selectedLoc.name}</h3>
                <p className="text-xs text-gray-400 mb-3">{selectedLoc.ancientName} → {selectedLoc.modernName}</p>
                <div className="space-y-3 text-sm">
                  <div>
                    <p className="text-gray-400 text-[10px] uppercase font-bold">公元纪年</p>
                    <p>{selectedLoc.time || '未知'}</p>
                  </div>
                  <div>
                    <p className="text-gray-400 text-[10px] uppercase font-bold">停留时间</p>
                    <p>{selectedLoc.duration || '未知'}</p>
                  </div>
                  <div>
                    <p className="text-gray-400 text-[10px] uppercase font-bold">事迹描述</p>
                    <p className="leading-relaxed">{selectedLoc.event}</p>
                  </div>
                  {selectedLoc.poster?.png ? (
                    <div>
                      <p className="text-gray-400 text-[10px] uppercase font-bold">海报</p>
                      <a href={selectedLoc.poster.png} target="_blank" rel="noreferrer">
                        <img src={selectedLoc.poster.png} className="w-full rounded-lg border border-[#c8b496]/50" />
                      </a>
                    </div>
                  ) : null}
                  <div className="bg-[#fdf6e3] p-2 rounded border border-dashed border-[#c8b496]">
                    <p className="text-[#c0392b] text-[10px] uppercase font-bold">历史意义</p>
                    <p className="italic text-xs">{selectedLoc.significance}</p>
                  </div>
                  {selectedLoc.quoteLines?.length ? (
                    <div>
                      <p className="text-gray-400 text-[10px] uppercase font-bold">名篇名句</p>
                      <ul className="space-y-1">
                        {selectedLoc.quoteLines.map((q, idx) => (
                          <li key={idx} className="text-xs text-gray-700">{q}</li>
                        ))}
                      </ul>
                    </div>
                  ) : selectedLoc.works?.length ? (
                    <div>
                      <p className="text-gray-400 text-[10px] uppercase font-bold">名篇名句</p>
                      <ul className="list-disc pl-4 space-y-1">
                        {selectedLoc.works.map((w, idx) => (
                          <li key={idx} className="text-xs text-gray-700">《{w}》</li>
                        ))}
                      </ul>
                    </div>
                  ) : null}
                </div>
              </div>
            )}
          </div>
        </div>
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div className="glass-panel p-4 rounded-xl text-center">
            <p className="text-2xl mb-1">🗺️</p>
            <p className="text-xl font-bold">{stats.distance} <span className="text-xs font-normal">km</span></p>

          </div>
          <div className="glass-panel p-4 rounded-xl text-center">
            <p className="text-2xl mb-1">⏱️</p>
            <p className="text-xl font-bold">
              {stats.yearsLabel}{stats.yearsValue === null ? null : <span className="text-xs font-normal">年</span>}
            </p>
            <p className="text-[10px] text-gray-400 uppercase">生命跨度</p>
          </div>
          <div className="glass-panel p-4 rounded-xl text-center">
            <p className="text-2xl mb-1">📍</p>
            <p className="text-xl font-bold">{stats.regions} <span className="text-xs font-normal">个</span></p>
            <p className="text-[10px] text-gray-400 uppercase">覆盖地区</p>
          </div>
          <div className="glass-panel p-4 rounded-xl text-center">
            <p className="text-2xl mb-1">🌟</p>
            <p className="text-xl font-bold">{stats.events} <span className="text-xs font-normal">件</span></p>
            <p className="text-[10px] text-gray-400 uppercase">重要事迹</p>
          </div>
        </div>

        {mergedTeachingPoints ? (
          <section className="glass-panel p-6 rounded-xl shadow-sm border border-[#c8b496]/40 bg-amber-50/40">
            <div className="flex items-center justify-between gap-4 mb-3">
              <h2 className="text-lg font-bold text-[#7c2d12]">教材知识点与考点</h2>
              <div className="flex items-center gap-3">
                <button
                  onClick={() => setShowTeachingFull(v => !v)}
                  className="text-[11px] px-2 py-1 rounded bg-white/70 border border-[#c8b496]/50 text-[#7c2d12] hover:bg-white"
                >
                  {showTeachingFull ? '收起' : '展开'}
                </button>
                <span className="text-[10px] text-gray-500">面向教学</span>
              </div>
            </div>
            <div className="space-y-1">
              {renderTextbookPoints(mergedTeachingPointsNormalized, { expanded: showTeachingFull })}
            </div>
          </section>
        ) : null}

      </div>
      <footer className="text-center text-gray-400 text-[10px] py-8 border-t border-gray-200">
        <p>
          built by cuicheng (
          <a className="underline hover:text-gray-600" href="mailto:cuizicheng.1024@gmail.com">cuizicheng.1024@gmail.com</a>
          )
        </p>
      </footer>
    </div>
  );
};
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
