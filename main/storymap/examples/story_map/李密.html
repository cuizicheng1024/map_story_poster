      const data = {"person": {"name": "李密", "title": "", "description": "李密生于蜀地，幼年丧父，母亲改嫁，由祖母刘氏躬亲抚养，以“孝”名闻乡里。仕于蜀汉，官至尚书郎。蜀汉亡后，晋武帝数次征召他为太子洗马，他因祖母年老多病，无人奉养，上《陈情表》婉拒，其文情理兼备，武帝感其孝心，准其请求，并赐奴婢钱米。祖母去世后，他出仕晋朝，历任河内温县令、汉中太守等职，后因赋诗获怨，免官归老，卒于家中。", "quote": "《陈情表》：“臣无祖母，无以至今日", "dynasty": "西晋", "birthplace": "", "avatar": "", "birth": {"date": "224年", "location": "", "lat": null, "lng": null}, "death": {"date": "287年", "location": "", "lat": null, "lng": null}, "lifespan": "64岁", "highlights": {"honor": "", "status": "西晋著名孝子，以一篇情真意切的《陈情表》感化晋武帝，成为弘扬孝道的典范人物。", "identities": "官员、文学家", "achievements": "以孝道闻名，上《陈情表》辞官终养祖母；在文学上留下千古名篇《陈情表》。", "works": ["陈情表"], "reviews": ["《华阳国志》：“（密）治《春秋左传》，博览五经，多所通涉。机警辨捷，辞义响起。”", "《晋书·孝友传》：“祖母刘氏躬自抚养，密奉事以孝谨闻……士有被其容接者，名为登龙门。”", "后世评：其文“沛然从肺腑中流出，殊不见斧凿痕”（真德秀语），其人“孝”名千古。"]}}, "locations": [{"name": "犍为武阳", "ancientName": "犍为武阳", "modernName": "四川省眉山市彭山区", "lat": 30.1981104, "lng": 103.8717011, "type": "birth", "event": "出生于此，并在此度过幼年，父亲早亡，母亲改嫁，由祖母刘氏抚养长大。", "time": "公元224年", "duration": "幼年时期", "significance": "人生的起点，也是其孝道精神萌芽之地。", "works": [], "quoteLines": []}, {"name": "洛阳（辞诏与陈情地）", "ancientName": "洛阳", "modernName": "河南省洛阳市", "lat": 34.6196539, "lng": 112.4477046, "type": "normal", "event": "晋武帝司马炎征召其为太子洗马，李密以祖母年老病重为由，上《陈情表》辞不就职。", "time": "公元267年—268年", "duration": "短暂停留（应召赴京，上表后获准归养）", "significance": "人生关键转折点，通过《陈情表》确立了其“孝”的历史形象，文章成为千古传诵的名篇。", "works": ["陈情表"], "quoteLines": ["《陈情表》：“臣无祖母，无以至今日", "祖母无臣，无以终余年。”", "“乌鸟私情，愿乞终养。”"]}, {"name": "河内温县（初仕地）", "ancientName": "河内温县", "modernName": "河南省焦作市温县", "lat": 34.9370595, "lng": 113.0755846, "type": "normal", "event": "祖母刘氏去世后，李密服丧期满，应征出仕晋朝，被任命为太子洗马，后外任为温县令。在任有政绩。", "time": "约公元270年—278年（祖母去世后出仕）", "duration": "数年", "significance": "正式开始在西晋的仕途，展现了其治理地方的才能。", "works": [], "quoteLines": []}, {"name": "汉中（任职地）", "ancientName": "汉中", "modernName": "陕西省汉中市", "lat": 33.02875, "lng": 107.08756, "type": "normal", "event": "由温县令升任汉中太守。", "time": "约公元279年—280年", "duration": "约1-2年", "significance": "仕途的顶峰，但也是其政治生涯 述策略**上的异同。\n6.  **思想评价**：评价李密“先孝后忠”的选择，及其所反映的**魏晋士人**在特定历史条件下的处世智慧与伦理困境。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：李密（一名虔，字令伯）\n- **时代**：西晋\n- **出生**：公元224年；犍为武阳（今四川省眉山市彭山区）\n- **去世**：公元287年；河内温县（今河南省焦作市温县）\n- **享年**：64岁\n- **主要身份**：官员、文学家\n- **历史地位**：西晋著名孝子，以一篇情真意切的《陈情表》感化晋武帝，成为弘扬孝道的典范人物。\n- **主要成就**：以孝道闻名，上《陈情表》辞官终养祖母；在文学上留下千古名篇《陈情表》。\n\n### 生平概述\n李密生于蜀地，幼年丧父，母亲改嫁，由祖母刘氏躬亲抚养，以“孝”名闻乡里。仕于蜀汉，官至尚书郎。蜀汉亡后，晋武帝数次征召他为太子洗马，他因祖母年老多病，无人奉养，上《陈情表》婉拒，其文情理兼备，武帝感其孝心，准其请求，并赐奴婢钱米。祖母去世后，他出仕晋朝，历任河内温县令、汉中太守等职，后因赋诗获怨，免官归老，卒于家中。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：一生主要活动于蜀地（今四川）与中原（今河南洛阳、温县一带）。\n- ⏱️ **时间跨度**：公元224年—公元287年，总跨度64年。\n- 📍 **地理范围**：大致覆盖今四川省、河南省。\n- 🌟 **重要节点数量**：6个核心地点。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：犍为武阳\n- **公元纪年**：公元224年\n- **停留时间**：幼年时期\n- **位置**：古称犍为武阳（今四川省眉山市彭山区）\n- **事迹**：出生于此，并在此度过幼年，父亲早亡，母亲改嫁，由祖母刘氏抚养长大。\n- **意义**：人生的起点，也是其孝道精神萌芽之地。\n\n### 📍 重要地点：蜀地（成长与出仕地）\n- **公元纪年**：约公元230年—263年\n- **停留时间**：约33年\n- **位置**：古称蜀汉（今四川省一带）\n- **事迹**：在祖母抚养下成长，师事谯周，博览五经，尤精《春秋左传》。在蜀汉政权出仕，官至尚书郎。\n- **意义**：奠定了其学识基础与早期政治生涯，蜀地文化对其影响深远。\n- **名篇名句**：《陈情表》：“生孩六月，慈父见背；行年四岁，舅夺母志。祖母刘愍臣孤弱，躬亲抚养。”\n\n### 📍 重要地点：洛阳（辞诏与陈情地）\n- **公元纪年**：公元267年—268年\n- **停留时间**：短暂停留（应召赴京，上表后获准归养）\n- **位置**：古称洛阳（今河南省洛阳市）\n- **事迹**：晋武帝司马炎征召其为太子洗马，李密以祖母年老病重为由，上《陈情表》辞不就职。\n- **意义**：人生关键转折点，通过《陈情表》确立了其“孝”的历史形象，文章成为千古传诵的名篇。\n- **名篇名句**：《陈情表》：“臣无祖母，无以至今日；祖母无臣，无以终余年。”；“乌鸟私情，愿乞终养。”\n\n### 📍 重要地点：河内温县（初仕地）\n- **公元纪年**：约公元270年—278年（祖母去世后出仕）\n- **停留时间**：数年\n- **位置**：古称河内温县（今河南省焦作市温县）\n- **事迹**：祖母刘氏去世后，李密服丧期满，应征出仕晋朝，被任命为太子洗马，后外任为温县令。在任有政绩。\n- **意义**：正式开始在西晋的仕途，展现了其治理地方的才能。\n\n### 📍 重要地点：汉中（任职地）\n- **公元纪年**：约公元279年—280年\n- **停留时间**：约1-2年\n- **位置**：古称汉中（今陕西省汉中市）\n- **事迹**：由温县令升任汉中太守。\n- **意义**：仕途的顶峰，但也是其政治生涯的转折点。\n\n### 🔴 去世地：河内温县\n- **公元纪年**：公元287年\n- **停留时间**：晚年\n- **位置**：古称河内温县（今河南省焦作市温县）\n- **经过**：在汉中太守任上，因在一次朝廷宴会中赋诗表达怨愤（“人亦有言，有因有缘。官无中人，不如归田”），被免官归老，后卒于家中。\n- **意义**：人生的终点，归老并终老于此。\n- **名篇名句**：《陈情表》：“臣密今年四十有四，祖母今年九十有六，是臣尽节于陛下之日长，报养刘之日短也。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| :--- | :--- | const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};

    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
