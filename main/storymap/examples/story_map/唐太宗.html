: "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：**隋末农民起义**，社会动荡，为唐朝建立提供契机。\n- **关键事件**：**晋阳起兵**、**玄武门之变**、**贞观之治**。\n- **代表政策**：**轻徭薄赋**、**戒奢从简**；**完善三省六部制**与**科举制**；实行**开明的民族政策**（如被尊为**“天可汗”**、**文成公主入藏**）。\n- **代表作品/思想**：**《贞观政要》**（后人编纂，记载其治国言论）；名言“**水能载舟，亦能覆舟**”（强调君民关系）。\n- **常见易混点/对比点**：与**唐玄宗（李隆基）** 前期“开元盛世”的对比；**“贞观之治”** 与 **“开元盛世”** 的区别与联系。\n\n### 高中阶段\n- **时代背景**：**隋唐制度**的成熟与创新时期，**士族门阀**势力衰落，**庶族地主**地位上升。\n- **关键贡献**：进一步完善并确立**三省六部制**（中书决策、门下审议、尚书执行）；发展**科举制**（扩大进士科，推动社会阶层流动）；完善**府兵制**与**《唐律疏议》**（律令体系的典范）。\n- **历史评价与影响**：其统治被视为**封建治世的顶峰**；**“天可汗”** 体系体现了**羁縻政策**与**华夷一家**的民族观念；为**安史之乱**前的盛唐局面奠定基础。\n- **思想与史学**：其言行主要见于吴兢所编 **《贞观政要》**，成为后世帝王教科书；其历史形象在**《旧唐书》《新唐书》《资治通鉴》** 中均有详细记载与评价。\n- **常见易混点/对比点**：与**汉武帝**在开疆拓土、尊崇儒术方面的异同；**“贞观之治”** 的具体措施与**儒家仁政**思想的实践关系。\n\n---", "examPoints": "### 初中阶段考点\n1.  **唐朝的建立者**是李渊（唐高祖），**“贞观之治”的开创者**是李世民（唐太宗）。\n2.  唐太宗统治时期，年号 **“贞观”**。\n3.  他吸取**隋亡教训**，认识到人民群众力量的巨大，提出 **“水能载舟，亦能覆舟”** 的治国思想。\n4.  他任用贤才，虚心纳谏，著名谏臣是 **魏征**；名相有 **房玄龄**、**杜如晦**（“房谋杜断”）。\n5.  他完善了**隋朝**创立的**三省六部制**和**科举制**。\n6.  他实行开明的民族政策，被北方各族尊称为 **“天可汗”**。\n7.  他将 **文成公主** 嫁给吐蕃赞普**松赞干布**，促进了汉藏友好关系。\n8.  **“贞观之治”** 为唐朝的全盛局面奠定了基础。\n\n### 高中阶段考点\n1.  **玄武门之变**的性质是统治集团内部争夺皇位的政变，是理解其即位合法性与早期统治的关键事件（**存疑/说法不一**：对其道德评价历来有争议）。\n2.  其统治政策体现了 **“王道”与“霸道”** 的结合，即儒家仁政理念与高效国家治理的结合。\n3.  **三省六部制**在贞观年间运作成熟，其**分权制衡**的特点（中书草拟、门下封驳、尚书执行）对提高行政效率、减少决策失误有重要作用。\n4.  **科举制**在贞观年间得到实质性发展，特别是**进士科**的地位提高，扩大了官吏来源，加强了**中央集权**。\n5.  **《唐律疏议》**（永徽年间在《贞观律》基础上修订完成）标志着中国古代**律令体系**的完备，其 **“德主刑辅”** 的原则体现了唐太宗的法治思想。\n6.  **“天可汗”** 体系不仅是称号，更代表了一种**以唐为中心的国际秩序和民族融合政策**，通过设置羁縻府州、和亲、册封等方式实现。\n7.  晚年亲征**高句丽**未果，反映了其**开拓进取**性格的延续，也暴露了府兵制等制度的局限性，为后来**募兵制**的兴起埋下伏笔。\n8.  历代史家对其评价极高，但现代史学也关注其**统治的阶级本质**（代表地主阶级利益）以及**贞观中后期**政治的变化（如纳谏精神减弱、营建增多）。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：李世民（唐太宗）\n- **时代**：唐朝\n- **出生**：公元598年（隋开皇十八年），武功别馆（今陕西省咸阳市武功县）\n- **去世**：公元649年（贞观二十三年），终南山翠微宫含风殿（今陕西省西安市）\n- **享年**：52岁\n- **主要身份**：政治家、军事家、战略家、书法家、诗人\n- **历史地位**：唐朝第二位皇帝，中国历史上最杰出的皇帝之一，开创了著名的“贞观之治”。\n- **主要成就**：晋阳起兵反隋；统一全国；开创“贞观之治”；完善三省六部制、科举制、府兵制；开明的民族政策与“天可汗”体系；主持编修《氏族志》、《贞观律》等。\n\n### 生平概述\n李世民是唐高祖李渊次子，生于隋末乱世。他自幼聪慧果敢，擅长骑射。隋朝末年，天下大乱，他力劝并协助父亲李渊在晋阳起兵，是唐朝建立的主要策划者与军事统帅。唐朝建立后，他率军平定了薛仁杲、刘武周、窦建德、王世充等割据势力，为统一全国立下赫赫战功。武德九年（626年），他发动“玄武门之变”，杀死太子李建成与齐王李元吉，随后被立为皇太子，不久即位，年号“贞观”。在位期间（626-649年），他励精图治，虚心纳谏，任用房玄龄、杜如晦、魏征等贤臣，推行轻徭薄赋、疏缓刑罚的政策，并开疆拓土，被各族尊称为“天可汗”，开创了政治清明、经济复苏、文化繁荣的“贞观之治”盛世，为后来的盛唐奠定了坚实基础。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：足迹以唐朝京师长安（今西安）为核心，辐射至关中、中原、河北、江南、辽东等地区，主要因军事征战与巡幸活动。\n- ⏱️ **时间跨度**：公元598年—649年，共约51年。\n- 📍 **地理范围**：大致覆盖今陕西、河南、山西、河北、山东、江苏、湖北、辽宁等省份。\n- 🌟 **重要节点数量**：核心地点约10个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：武功别馆\n- **公元纪年**：公元598年\n- **停留时间**：幼年时期\n- **位置**：隋武功县（今陕西省咸阳市武功县）\n- **事迹**：李世民在此出生。其父李渊时任隋岐州刺史，此地为其家族别业。\n- **意义**：生命的起点，李唐家族早期活动地之一。\n\n### 📍 重要地点：太原（晋阳）\n- **公元纪年**：约615年—617年\n- **停留时间**：约2年\n- **位置**：隋太原郡（今山西省太原市）\n- **事迹**：随父李渊赴任，暗中结交豪杰，部署力量。于617年策划并推动李渊在此起兵反隋，是唐朝事业的起点。\n- **意义**：龙兴之地，唐朝建国大业的策源地。\n- **名篇名句**：《还陕述怀》：“慨然抚长剑，济世岂邀名。”\n\n### 📍 重要地点：长安（大兴城）\n- **公元纪年**：617年—626年（建国初期）；626年—649年（在位时期）\n- **停留时间**：主要生活与执政地，总计约30余年。\n- **位置**：唐京师（今陕西省西安市）\n- **事迹**：617年随军攻占长安，拥立隋恭帝，后受封秦王。唐朝建立后，长期居此指挥统一战争。626年发动玄武门之变后即位，以此为都城开创贞观之治，处理全国军政要务。\n- **意义**：唐朝的政治、经济、文化中心，其一生最重要的舞台。\n- **名篇名句**：《帝范·君体篇》：“夫君者，俭以养性，静以修身。”；《赐房玄龄》：“太液仙舟迥，西园引上才。”\n\n### 📍 重要地点：洛阳\n- **公元纪年**：621年（征战时期）；贞观年间多次巡幸\n- **停留时间**：断续停留\n- **位置**：唐东都（今河南省洛阳市）\n- **事迹**：621年率军围攻并击败王世充、窦建德联军，取得虎牢关大捷，一举平定中原。贞观年间多次东巡，以此为处理东方事务的中心。\n- **意义**：统一战争的关键战场，唐朝的东都与战略重镇。\n- **名篇名句**：《春日玄武门宴群臣》：“韶光开令序，淑气动芳年。”\n\n### 📍 重要地点：虎牢关（汜水关）\n- **公元纪年**：621年\n- **停留时间**：短暂，关键战役期间\n- **位置**：唐郑州荥阳县（今河南省荥阳市汜水镇）\n- **事迹**：在此以少胜多，一举击败前来救援王世充的窦建德十万大军，随后迫降王世充，是唐朝统一天下的决定性战役。\n- **意义**：军事生涯的巅峰之战，展现了其卓越的军事指挥艺术。\n\n### 📍 重要地点：幽州（范阳）\n- **公元纪年**：贞观十九年（645年）\n- **停留时间**：数月\n- **位置**：唐河北道（今北京市及河北北部）\n- **事迹**：亲征高句丽的后方基地与誓师之地。从此出发，进军辽东。\n- **意义**：经略东北边疆的前哨，体现了其开疆拓土的雄心。\n\n### 📍 重要地点：辽东城（辽东地区）\n- **公元纪年**：贞观十九年（645年）\n- **停留时间**：数月\n- **位置**：高句丽境内（今辽宁省辽阳市一带）\n- **事迹**：亲率唐军攻打高句丽，攻克辽东城等城池，但因天气转寒、战事胶着而未能毕其功于一役，最终班师。\n- **意义**：其晚年最重要的军事行动所在地，虽未竟全功，但沉重打击了高句丽。\n- **名篇名句**：《辽城望月》：“玄兔月初明，澄辉照辽碣。”\n\n### 📍 重要地点：骊山温泉宫（华清宫）\n- **公元纪年**：贞观年间\n- **停留时间**：不定期巡幸\n- **位置**：唐京兆府（今陕西省西安市临潼区）\n- **事迹**：常在此沐浴、疗养、处理政务，是皇家休闲与理政的离宫。\n- **意义**：体现了其宫廷生活与休闲理政的一面。\n\n### 📍 重要地点：终南山翠微宫\n- **公元纪年**：贞观二十一年（647年）至二十三年（649年）\n- **停留时间**：晚年最后两年多常居于此\n- **位置**：唐京兆府（今陕西省西安市长安区）\n- **事迹**：因病在此疗养，并于此地处理政务，直至去世。\n- **意义**：晚年主要活动地与最终的政治决策地之一。\n\n### 🔴 去世地：终南山翠微宫含风殿\n- **公元纪年**：贞观二十三年（649年）\n- **停留时间**：约两年（晚年常驻）\n- **位置**：唐京兆府终南山（今陕西省西安市长安区）\n- **经过**：贞观二十三年五月，李世民因早年征战旧伤及服食丹药导致病情加重，驾崩于含风殿。\n- **意义**：生命的终点，标志着“贞观之治”的结束。\n- **名篇名句**：《帝范·后序》：“战战兢兢，若临深而御朽；日慎一日，思善始而令终。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 公元598年 | 1岁 | 生于武功别馆。 |\n| 公元615年 | 18岁 | 随父赴太原，参与谋划反隋。 |\n| 公元617年 | 20岁 | 策动并参与晋阳起兵，率军攻占长安。 |\n| 公元618年 | 21岁 | 唐朝建立，被封为秦王，任尚书令。 |\n| 公元618-621年 | 21-24岁 | 率军平定薛仁杲、刘武周、窦建德、王世充等势力，统一北方。 |\n| 公元621年 | 24岁 | 指挥虎牢关大捷，威望日隆，设“文学馆”招揽人才。 |\n| 公元626年 | 29岁 | 发动“玄武门之变”，杀李建成、李元吉，被立为太子，随后即位，改元贞观。 |\n| 公元626-629年 | 29-32岁 | 与突厥订立“渭水之盟”，后积极备战。 |\n| 公元629-630年 | 32-33岁 | 派李靖等灭亡东突厥，被尊为“天可汗”。 |\n| 公元630-640年 | 33-43岁 | 贞观之治鼎盛期，完善制度，社会安定，经济繁荣。 |\n| 公元636年 | 39岁 | 长孙皇后去世。 |\n| 公元640年 | 43岁 | 置安西都护府，控制西域。 |\n| 公元641年 | 44岁 | 文成公主入藏和亲吐蕃。 |\n| 公元645年 | 48岁 | 亲征高句丽，未竟全功，班师。 |\n| 公元648年 | 51岁 | 太子李治监国，撰《帝范》十二篇赐太子。 |\n| 公元649年 | 52岁 | 驾崩于终南山翠微宫含风殿，庙号太宗，葬昭陵。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n李世民在位期间，通过一系列政治、经济、军事和文化改革，迅速医治了隋末战乱的创伤，使社会从凋敝走向繁荣。他确立的“偃武修文”国策、完善的中央官制、推行的均田制和租庸调制，以及开明的民族政策，不仅巩固了新生的唐朝政权，更奠定了盛唐一百多年的基业。其统治时期被视为中国古代封建治世的最高典范。\n\n### 对后世的影响\n- **治世典范**：“贞观之治”成为后世历代帝王效仿和追求的政治理想，其“以民为本”、“从谏如流”的执政理念影响深远。\n- **制度遗产**：其完善的三省六部制、科举制、府兵制等，为后世王朝所继承和发展。\n- **民族与外交**：“天可汗”体系下的开明民族政策与开放的对外态度，为盛唐的多元文化融合与国际地位奠定了基础。\n- **文化象征**：作为“明君”的代名词，其形象频繁出现在后世文学、艺术和史学作品中，成为儒家理想君主的化身。\n\n### 历史评价\n- **《旧唐书》**：“千载可称，一人而已！”\n- **《新唐书》**：“盛哉，太宗之烈也！其除隋之乱，比迹汤、武；致治之美，庶几成、康。”\n- **明末清初思想家王夫之**：“太宗之世，天下大定，仰观天文，俯察人事，此其时矣。”\n- **毛泽东**：“自古能军无出李世民之右者，其次则朱元璋耳。”\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**隋末农民起义**，社会动荡，为唐朝建立提供契机。\n- **关键事件**：**晋阳起兵**、**玄武门之变**、**贞观之治**。\n- **代表政策**：**轻徭薄赋**、**戒奢从简**；**完善三省六部制**与**科举制**；实行**开明的民族政策**（如被尊为**“天可汗”**、**文成公主入藏**）。\n- **代表作品/思想**：**《贞观政要》**（后人编纂，记载其治国言论）；名言“**水能载舟，亦能覆舟**”（强调君民关系）。\n- **常见易混点/对比点**：与**唐玄宗（李隆基）** 前期“开元盛世”的对比；**“贞观之治”** 与 **“开元盛世”** 的区别与联系。\n\n### 高中阶段\n- **时代背景**：**隋唐制度**的成熟与创新时期，**士族门阀**势力衰落，**庶族地主**地位上升。\n- **关键贡献**：进一步完善并确立**三省六部制**（中书决策、门下审议、尚书执行）；发展**科举制**（扩大进士科，推动社会阶层流动）；完善**府兵制**与**《唐律疏议》**（律令体系的典范）。\n- **历史评价与影响**：其统治被视为**封建治世的顶峰**；**“天可汗”** 体系体现了**羁縻政策**与**华夷一家**的民族观念；为**安史之乱**前的盛唐局面奠定基础。\n- **思想与史学**：其言行主要见于吴兢所编 **《贞观政要》**，成为后世帝王教科书；其历史形象在**《旧唐书》《新唐书》《资治通鉴》** 中均有详细记载与评价。\n- **常见易混点/对比点**：与**汉武帝**在开疆拓土、尊崇儒术方面的异同；**“贞观之治”** 的具体措施与**儒家仁政**思想的实践关系。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  **唐朝的建立者**是李渊（唐高祖），**“贞观之治”的开创者**是李世民（唐太宗）。\n2.  唐太宗统治时期，年号 **“贞观”**。\n3.  他吸取**隋亡教训**，认识到人民群众力量的巨大，提出 **“水能载舟，亦能覆舟”** 的治国思想。\n4.  他任用贤才，虚心纳谏，著名谏臣是 **魏征**；名相有 **房玄龄**、**杜如晦**（“房谋杜断”）。\n5.  他完善了**隋朝**创立的**三省六部制**和**科举制**。\n6.  他实行开明的民族政策，被北方各族尊称为 **“天可汗”**。\n7.  他将 **文成公主** 嫁给吐蕃赞普**松赞干布**，促进了汉藏友好关系。\n8.  **“贞观之治”** 为唐朝的全盛局面奠定了基础。\n\n### 高中阶段考点\n1.  **玄武门之变**的性质是统治集团内部争夺皇位的政变，是理解其即位合法性与早期统治的关键事件（**存疑/说法不一**：对其道德评价历来有争议）。\n2.  其统治政策体现了 **“王道”与“霸道”** 的结合，即儒家仁政理念与高效国家治理的结合。\n3.  **三省六部制**在贞观年间运作成熟，其**分权制衡**的特点（中书草拟、门下封驳、尚书执行）对提高行政效率、减少决策失误有重要作用。\n4.  **科举制**在贞观年间得到实质性发展，特别是**进士科**的地位提高，扩大了官吏来源，加强了**中央集权**。\n5.  **《唐律疏议》**（永徽年间在《贞观律》基础上修订完成）标志着中国古代**律令体系**的完备，其 **“德主刑辅”** 的原则体现了唐太宗的法治思想。\n6.  **“天可汗”** 体系不仅是称号，更代表了一种**以唐为中心的国际秩序和民族融合政策**，通过设置羁縻府州、和亲、册封等方式实现。\n7.  晚年亲征**高句丽**未果，反映了其**开拓进取**性格的延续，也暴露了府兵制等制度的局限性，为后来**募兵制**的兴起埋下伏笔。\n8.  历代史家对其评价极高，但现代史学也关注其**统治的阶级本质**（代表地主阶级利益）以及**贞观中后期**政治的变化（如纳谏精神减弱、营建增多）。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 生于武功别馆。 | 生于武功             Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {
  if (!text) return null;
  const match = String(text).match(/(\d{3,4})\s*年/);
  return match ? parseInt(match[1], 10) : null;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
