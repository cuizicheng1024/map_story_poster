    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect, useRef, useMemo } = React;
      const data = {"person": {"name": "武曌", "title": "贞观之治", "description": "武则天出身于官宦之家，十四岁入宫为唐太宗才人。太宗去世后，她入感业寺为尼。永徽年间，她被高宗李治召回宫中，迅速晋封为皇后。因高宗体弱，她逐渐参与朝政，与高宗并称“二圣”。高宗去世后，她作为皇太后临朝称制，并于天授元年（690年）改唐为周，自立为帝。在位期间，她打击关陇门阀，大力提拔科举出身的官员，社会经济得以持续发展。神龙元年（705年），宰相张柬之等发动“神龙政变”，逼迫其退位。同年冬，武则天于洛阳上阳宫崩逝，遗诏去帝号，称“则天大圣皇后”，与高宗合葬乾陵。", "quote": "《如意娘》：“看朱成碧思纷纷，憔悴支离为忆君。不信比来长下泪，开箱验取石榴裙。”", "dynasty": "唐朝（唐太宗、高宗时期）、武周", "birthplace": "利州（今四川广元）（存疑，另有长安、洛阳等说）", "avatar": "", "birth": {"date": "624年", "location": "利州（今四川广元）（存疑，另有长安、洛阳等说）", "lat": 32.2685578, "lng": 105.8395358}, "death": {"date": "705年", "location": "洛阳上阳宫仙居殿", "lat": null, "lng": null}, "lifespan": "81岁", "highlights": {"honor": "贞观之治", "status": "中国历史上唯一正统的女皇帝，其统治上承“贞观之治”，下启“开元盛世”，对唐朝的发展起到了承前启后的关键作用。", "identities": "皇帝、政治家、改革家、皇后、皇太后", "achievements": "建立武周王朝；改革科举制度，首创殿试、武举；任用酷吏打击门阀，巩固中央集权；推行轻徭薄赋政策，重视农业生产；巩固并拓展了唐朝的疆域。", "works": [], "reviews": ["**《旧唐书》评价**：“治乱，时也，存亡，势也。使桀、纣在上，虽十尧不能治；使尧、舜在上，虽十桀不能乱……武后夺嫡之谋也，振喉绝襁褓之儿，菹醢碎椒涂之骨，其不道也甚矣，亦奸人妒妇之恒态也。然犹泛延谠议，时礼正人，遵遗庙谟，高宗之覆辙，遵遗令以终制，颇识大体。及革命，虽宗室诛夷殆尽，而能用狄仁杰、娄师德、姚崇、宋璟，卒承其业，岂非聪明不惑者乎？”", "**宋代司马光评价**：“虽滥以禄位收天下人心，然不称职者，寻亦黜之，或加刑诛。挟刑赏之柄以驾御天下，政由己出，明察善断，故当时英贤亦竞为之用。”", "**现代史家评价**：郭沫若称其“政启开元，治宏贞观”。她是中国封建时代杰出的女政治家，其统治具有承上启下的关键作用，但其任用酷吏、放手招官等举措也带来了严重的负面影响。"]}}, "locations": [{"name": "利州", "ancientName": "利州", "modernName": "利州（今四川省广元市）", "lat": 32.44389, "lng": 105.83299, "type": "birth", "event": "其父武士彟时任利州都督，武则天在此地出生并度过幼年。", "time": "约公元624年", "duration": "童年时期（约0-4岁）", "significance": "人生起点，其早年成长环境塑造了她果敢刚毅的性格基础。", "works": [], "quoteLines": []}, {"name": "长安（唐都城）", "ancientName": "长安", "modernName": "陕西省西安市", "lat": 34.261004, "lng": 108.9423363, "type": "normal", "event": "1. **贞观十一年（637年）**：入宫为唐太宗才人，赐号“武媚”。2. **永徽年间**：从感业寺再度入宫，拜为昭仪，后立为皇后。3. **显庆以后**：因高宗风疾，开始协助处理政务，与高宗并称“二圣”。4. **光宅元年（684年）**：以皇太后身份临朝称制。", "time": "约637年—649年；651年—657年；660年—683年（多次居留）", "duration": "累计数十年，是其政治生涯的核心舞台。", "significance": "唐朝政治中心，武则天从后宫走向权力巅峰的起点，也是她实施一系列政治改革、最终建立武周政权的决策中心。", "works": [], "quoteLines": ["《如意娘》：“看朱成碧思纷纷，憔悴支离为忆君。不信比来长下泪，开箱验取石榴裙。”"]}, {"name": "感业寺", "ancientName": "感业寺", "modernName": "长安感业寺（今陕西省西安市境内，遗址存疑）", "lat": 34.4468505, "lng": 109.0014638, "type": "normal", "event": "唐太宗去世后，作为无子嗣的妃嫔被送入感业寺削发为尼。", "time": "649年—651年", "duration": "约2年", "significance": "人生低谷期，但在此地与唐高宗李治重逢，为其重返宫廷埋下伏笔。", "works": [], "quoteLines": []}, {"name": "洛阳（东都/神都）", "ancientName": "洛阳（东都/神都）", "modernName": "洛阳，武周时期改称“神都”（今河南省洛阳市）", "lat": 34.6196539, "lng": 112.4477046, "type": "normal", "event": "1. **光宅元年（684年）**：临朝称制后，改东都为神都，进行大规模修建。2. **天授元年（690年）**：在洛阳则天楼登基称帝，改唐为周。3. **执政期间**：以洛阳为武周首都，处理全国政务。4. **神龙元年（700年）**：病重，宰相张柬之等在洛阳发动“神龙政变”，迫其退位。", "time": "657年以后频繁往来；684年—705年常驻。", "duration": "后期主要执政与生活地，长达约20年。", "significance": "武周王朝的正式都城，是其女皇生涯的政治象征和权力中心。", "works": [], "quoteLines": ["《腊日宣诏幸上苑》：“明朝游上苑，火急报春知。花须连夜发，莫待晓风吹。”"]}, {"name": "嵩山", "ancientName": "嵩山", "modernName": "嵩山（今河南省登封市）", "lat": 34.4551772, "lng": 113.0444455, "type": "normal", "event": "举行封禅嵩山大典，加封“天册金轮大圣皇帝”尊号。", "time": "万岁登封元年（696年）", "duration": "封禅活动期间", "significance": "通过封禅典礼，向天地宣告武周政权的合法性与权威，是其政治生涯的巅峰仪式之一。", "works": [], "quoteLines": []}, {"name": "并州（故里）", "ancientName": "并州（故里）", "modernName": "并州（今山西省太原市，其家族祖籍并州文水）", "lat": 37.8699921, "lng": 112.5437075, "type": "normal", "event": "以皇后身份随高宗巡幸并州，在故里接见亲族百姓，并宴请当地官员民众。", "time": "显庆五年（660年）等", "duration": "巡幸期间", "significance": "衣锦还乡，彰显个人与家族荣耀，同时安抚并州这一“龙兴之地”。", "works": [], "quoteLines": []}, {"name": "乾陵", "ancientName": "乾陵", "modernName": "乾陵（今陕西省咸阳市乾县）", "lat": 34.5308252, "lng": 108.2398903, "type": "normal", "event": "唐高宗李治与武则天的合葬墓。武则天去世后，遵其遗诏，去帝号，以“则天大圣皇后”身份葬入乾陵。", "time": "文明元年（684年）葬高宗；神龙二年（706年）武则天祔葬。", "duration": "身后永恒之地", "significance": "最终归宿，其无字碑引发后世无尽评说，是其复杂历史评价的永恒象征。", "works": [], "quoteLines": []}, {"name": "洛阳上阳宫", "ancientName": "洛阳上阳宫", "modernName": "上阳宫仙居殿（今河南省洛阳市）", "lat": 34.6196539, "lng": 112.4477046, "type": "death", "event": "神龙政变后被迫退位，徙居上阳宫。唐中宗率百官为其上尊号“则天大圣皇帝”。同年十一月，武则天在上阳宫仙居殿病逝，遗诏称“则天大圣皇后”。", "time": "神龙元年十一月（705年12月）", "duration": "退位后至去世（约10个月）", "significance": "生命终点与政治生涯的落幕之地，标志着武周时代的正式终结。", "works": [], "quoteLines": ["晚年所作《曳鼎歌》：“羲农首出，轩昊膺期。唐虞继踵，汤禹乘时。天下光宅，海内雍熙。上玄降鉴，方建隆基。”"]}], "mapStyle": {"pathColor": "#1e40af", "markers": {"normal": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：**唐朝**前期，经历**贞观之治**后，社会经济繁荣。\n- **关键事件**：**武则天**是中国历史上唯一的**女皇帝**。她原是唐高宗的皇后，后来称帝，改国号为**周**。\n- **统治措施**：她大力发展**科举制**，创立**殿试**和**武举**；重视农业生产。\n- **历史地位**：她的统治为后来的“**开元盛世**”奠定了基础，史称她的统治有“**贞观遗风**”。\n- **代表作品/思想**：无具体作品要求，但需知其**无字碑**引发后世讨论。\n- **常见易混点/对比点**：与**唐太宗**（贞观之治）、**唐玄宗**（开元盛世）的统治时期顺序与特点对比。\n\n### 高中阶段\n- **时代背景**：唐朝**关陇集团**势力强大，社会阶层趋于固化。\n- **关键事件**：通过残酷政治斗争，打击**长孙无忌**等关陇贵族；临朝称制与**改唐为周**。\n- **政治改革**：进一步完善科举，**首创殿试**，由皇帝亲自面试贡士；扩大**南选**；鼓励官员举荐人才。\n- **经济政策**：重视农业，编成《**兆人本业记**》颁行天下，作为地方官员劝农参考。\n- **军事与边疆**：收复**安西四镇**，设置**北庭都护府**，巩固了西北边防。\n- **统治特点**：**“政由己出”**，明察善断；任用酷吏（如**来俊臣**）打击政敌，但也重用贤臣（如**狄仁杰**、**姚崇**）。\n- **历史评价**：承前启后，有“**政启开元，治宏贞观**”之誉；其统治也存在**任用酷吏**、**放手招官**（导致官僚机构膨胀）等弊端。\n- **代表作品/思想**：了解其诗歌《**如意娘**》、《**腊日宣诏幸上苑**》体现的个人性格与权威。\n- **常见易混点/对比点**：与汉初**吕后**专权的异同；其“革命”（改朝换代）与传统**儒家伦理**的冲突。\n\n---", "examPoints": "### 初中阶段考点\n1.  **身份与称号**：中国历史上唯一的**女皇帝**。\n2.  **国号**：改唐为**周**（史称“武周”）。\n3.  **核心贡献**：大力发展科举制，创立**殿试**和**武举**。\n4.  **统治评价**：其统治为“**开元盛世**”奠定基础，有“**贞观遗风**”。\n5.  **重要遗迹**：与高宗合葬**乾陵**，立有著名的**无字碑**。\n6.  **易混点**：注意区分**唐太宗**（李世民）、**武则天**、**唐玄宗**（李隆基）的先后顺序和主要作为。\n\n### 高中阶段考点\n1.  **政治背景**：其上台与打击**关陇军事贵族集团**，扩大**庶族地主**政治参与有关。\n2.  **制度创新**：科举制方面，**殿试**由其首创（存疑，一说始于唐高宗），**武举**则为其明确设立。\n3.  **统治手段**：双重性——**任用酷吏**打击政敌以巩固权力 vs. **知人善任**，选拔了狄仁杰、姚崇、宋璟等名臣。\n4.  **经济措施**：重视农业，编撰农书《**兆人本业记**》。\n5.  **边疆经略**：军事上**收复安西四镇**，设立**北庭都护府**，巩固了对西域的统治。\n6.  **历史评价**：理解“**政启开元，治宏贞观**”的内涵；认识其统治的积极面（承上启下、促进社会流动）与消极面（酷吏政治、后期朝政腐败）。\n7.  **文化象征**：**无字碑**是其复杂历史评价的集中体现。\n8.  **对比分析**：与**吕后**专权的异同（是否称帝、制度性贡献等）；其称帝对**儒家纲常伦理**的冲击。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：武曌（zhào），名照，又名武则天、武媚娘\n- **时代**：唐朝（唐太宗、高宗时期）、武周\n- **出生**：武德七年（公元624年），利州（今四川广元）（存疑，另有长安、洛阳等说）\n- **去世**：神龙元年十一月壬寅（公元705年12月16日），洛阳上阳宫仙居殿\n- **享年**：81岁\n- **主要身份**：皇帝、政治家、改革家、皇后、皇太后\n- **历史地位**：中国历史上唯一正统的女皇帝，其统治上承“贞观之治”，下启“开元盛世”，对唐朝的发展起到了承前启后的关键作用。\n- **主要成就**：建立武周王朝；改革科举制度，首创殿试、武举；任用酷吏打击门阀，巩固中央集权；推行轻徭薄赋政策，重视农业生产；巩固并拓展了唐朝的疆域。\n\n### 生平概述\n武则天出身于官宦之家，十四岁入宫为唐太宗才人。太宗去世后，她入感业寺为尼。永徽年间，她被高宗李治召回宫中，迅速晋封为皇后。因高宗体弱，她逐渐参与朝政，与高宗并称“二圣”。高宗去世后，她作为皇太后临朝称制，并于天授元年（690年）改唐为周，自立为帝。在位期间，她打击关陇门阀，大力提拔科举出身的官员，社会经济得以持续发展。神龙元年（705年），宰相张柬之等发动“神龙政变”，逼迫其退位。同年冬，武则天于洛阳上阳宫崩逝，遗诏去帝号，称“则天大圣皇后”，与高宗合葬乾陵。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：一生主要活动于以两京（长安、洛阳）为核心的帝国政治中心，并曾巡幸嵩山、并州等地。\n- ⏱️ **时间跨度**：公元624年—705年，共81年。\n- 📍 **地理范围**：大致覆盖今陕西（长安）、河南（洛阳、嵩山）、四川（广元）、山西（文水、并州）等地。\n- 🌟 **重要节点数量**：核心地点约10个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：利州\n- **公元纪年**：约公元624年\n- **停留时间**：童年时期（约0-4岁）\n- **位置**：利州（今四川省广元市）\n- **事迹**：其父武士彟时任利州都督，武则天在此地出生并度过幼年。\n- **意义**：人生起点，其早年成长环境塑造了她果敢刚毅的性格基础。\n\n### 📍 重要地点：长安（唐都城）\n- **公元纪年**：约637年—649年；651年—657年；660年—683年（多次居留）\n- **停留时间**：累计数十年，是其政治生涯的核心舞台。\n- **位置**：长安（今陕西省西安市）\n- **事迹**：1. **贞观十一年（637年）**：入宫为唐太宗才人，赐号“武媚”。2. **永徽年间**：从感业寺再度入宫，拜为昭仪，后立为皇后。3. **显庆以后**：因高宗风疾，开始协助处理政务，与高宗并称“二圣”。4. **光宅元年（684年）**：以皇太后身份临朝称制。\n- **意义**：唐朝政治中心，武则天从后宫走向权力巅峰的起点，也是她实施一系列政治改革、最终建立武周政权的决策中心。\n- **名篇名句**：《如意娘》：“看朱成碧思纷纷，憔悴支离为忆君。不信比来长下泪，开箱验取石榴裙。”\n\n### 📍 重要地点：感业寺\n- **公元纪年**：649年—651年\n- **停留时间**：约2年\n- **位置**：长安感业寺（今陕西省西安市境内，遗址存疑）\n- **事迹**：唐太宗去世后，作为无子嗣的妃嫔被送入感业寺削发为尼。\n- **意义**：人生低谷期，但在此地与唐高宗李治重逢，为其重返宫廷埋下伏笔。\n\n### 📍 重要地点：洛阳（东都/神都）\n- **公元纪年**：657年以后频繁往来；684年—705年常驻。\n- **停留时间**：后期主要执政与生活地，长达约20年。\n- **位置**：洛阳，武周时期改称“神都”（今河南省洛阳市）\n- **事迹**：1. **光宅元年（684年）**：临朝称制后，改东都为神都，进行大规模修建。2. **天授元年（690年）**：在洛阳则天楼登基称帝，改唐为周。3. **执政期间**：以洛阳为武周首都，处理全国政务。4. **神龙元年（700年）**：病重，宰相张柬之等在洛阳发动“神龙政变”，迫其退位。\n- **意义**：武周王朝的正式都城，是其女皇生涯的政治象征和权力中心。\n- **名篇名句**：《腊日宣诏幸上苑》：“明朝游上苑，火急报春知。花须连夜发，莫待晓风吹。”\n\n### 📍 重要地点：嵩山\n- **公元纪年**：万岁登封元年（696年）\n- **停留时间**：封禅活动期间\n- **位置**：嵩山（今河南省登封市）\n- **事迹**：举行封禅嵩山大典，加封“天册金轮大圣皇帝”尊号。\n- **意义**：通过封禅典礼，向天地宣告武周政权的合法性与权威，是其政治生涯的巅峰仪式之一。\n\n### 📍 重要地点：并州（故里）\n- **公元纪年**：显庆五年（660年）等\n- **停留时间**：巡幸期间\n- **位置**：并州（今山西省太原市，其家族祖籍并州文水）\n- **事迹**：以皇后身份随高宗巡幸并州，在故里接见亲族百姓，并宴请当地官员民众。\n- **意义**：衣锦还乡，彰显个人与家族荣耀，同时安抚并州这一“龙兴之地”。\n\n### 📍 重要地点：乾陵\n- **公元纪年**：文明元年（684年）葬高宗；神龙二年（706年）武则天祔葬。\n- **停留时间**：身后永恒之地\n- **位置**：乾陵（今陕西省咸阳市乾县）\n- **事迹**：唐高宗李治与武则天的合葬墓。武则天去世后，遵其遗诏，去帝号，以“则天大圣皇后”身份葬入乾陵。\n- **意义**：最终归宿，其无字碑引发后世无尽评说，是其复杂历史评价的永恒象征。\n\n### 🔴 去世地：洛阳上阳宫\n- **公元纪年**：神龙元年十一月（705年12月）\n- **停留时间**：退位后至去世（约10个月）\n- **位置**：上阳宫仙居殿（今河南省洛阳市）\n- **经过**：神龙政变后被迫退位，徙居上阳宫。唐中宗率百官为其上尊号“则天大圣皇帝”。同年十一月，武则天在上阳宫仙居殿病逝，遗诏称“则天大圣皇后”。\n- **意义**：生命终点与政治生涯的落幕之地，标志着武周时代的正式终结。\n- **名篇名句**：晚年所作《曳鼎歌》：“羲农首出，轩昊膺期。唐虞继踵，汤禹乘时。天下光宅，海内雍熙。上玄降鉴，方建隆基。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 武德七年（624年） | 0岁 | 生于利州（存疑）。 |\n| 贞观十一年（637年） | 14岁 | 入宫为唐太宗才人。 |\n| 贞观二十三年（649年） | 26岁 | 太宗驾崩，入感业寺为尼。 |\n| 永徽二年（651年） | 28岁 | 奉诏再度入宫，拜为昭仪。 |\n| 永徽六年（655年） | 32岁 | 被立为皇后。 |\n| 显庆五年（660年） | 37岁 | 高宗风疾加重，开始参决政事，时称“二圣”。 |\n| 弘道元年（683年） | 60岁 | 高宗驾崩，中宗李显即位，武则天临朝称制。 |\n| 光宅元年（684年） | 61岁 | 废中宗，立睿宗李旦，改东都为神都。 |\n| 天授元年（690年） | 67岁 | 废睿宗，登基称帝，改唐为周，史称“武周”。 |\n| 万岁登封元年（696年） | 73岁 | 封禅嵩山。 |\n| 神龙元年（705年） | 82岁 | 神龙政变，被迫退位，徙居上阳宫。同年冬，崩逝。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n武则天以皇后、太后、皇帝的身份执掌最高权力近半个世纪。她通过残酷的政治斗争，沉重打击了以长孙无忌、褚遂良为首的关陇贵族集团，为庶族地主阶级的上升扫清了障碍。她进一步完善了科举制度，扩大了统治基础，使得大量寒门才俊得以进入权力中枢。在其治下，社会经济得以持续发展，人口增长，边疆基本保持稳定，为后来的“开元盛世”奠定了坚实的基础。\n\n### 对后世的影响\n1.  **政治典范**：作为中国历史上唯一的女皇帝，她的存在本身即是对传统“男尊女卑”观念的巨大冲击，为后世女性参政提供了想象空间。\n2.  **制度遗产**：她所确立的殿试、武举等制度被后世王朝长期沿用，深刻影响了中国古代的选官制度。\n3.  **文化符号**：其无字碑成为千古之谜，象征着功过是非留待后人评说的历史观，成为重要的文化意象。\n4.  **边疆治理**：她执政时期对突厥、吐蕃、契丹等政权的军事与外交策略，对唐朝中后期的边疆格局产生了深远影响。\n\n### 历史评价\n1.  **《旧唐书》评价**：“治乱，时也，存亡，势也。使桀、纣在上，虽十尧不能治；使尧、舜在上，虽十桀不能乱……武后夺嫡之谋也，振喉绝襁褓之儿，菹醢碎椒涂之骨，其不道也甚矣，亦奸人妒妇之恒态也。然犹泛延谠议，时礼正人，遵遗庙谟，高宗之覆辙，遵遗令以终制，颇识大体。及革命，虽宗室诛夷殆尽，而能用狄仁杰、娄师德、姚崇、宋璟，卒承其业，岂非聪明不惑者乎？”\n2.  **宋代司马光评价**：“虽滥以禄位收天下人心，然不称职者，寻亦黜之，或加刑诛。挟刑赏之柄以驾御天下，政由己出，明察善断，故当时英贤亦竞为之用。”\n3.  **现代史家评价**：郭沫若称其“政启开元，治宏贞观”。她是中国封建时代杰出的女政治家，其统治具有承上启下的关键作用，但其任用酷吏、放手招官等举措也带来了严重的负面影响。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**唐朝**前期，经历**贞观之治**后，社会经济繁荣。\n- **关键事件**：**武则天**是中国历史上唯一的**女皇帝**。她原是唐高宗的皇后，后来称帝，改国号为**周**。\n- **统治措施**：她大力发展**科举制**，创立**殿试**和**武举**；重视农业生产。\n- **历史地位**：她的统治为后来的“**开元盛世**”奠定了基础，史称她的统治有“**贞观遗风**”。\n- **代表作品/思想**：无具体作品要求，但需知其**无字碑**引发后世讨论。\n- **常见易混点/对比点**：与**唐太宗**（贞观之治）、**唐玄宗**（开元盛世）的统治时期顺序与特点对比。\n\n### 高中阶段\n- **时代背景**：唐朝**关陇集团**势力强大，社会阶层趋于固化。\n- **关键事件**：通过残酷政治斗争，打击**长孙无忌**等关陇贵族；临朝称制与**改唐为周**。\n- **政治改革**：进一步完善科举，**首创殿试**，由皇帝亲自面试贡士；扩大**南选**；鼓励官员举荐人才。\n- **经济政策**：重视农业，编成《**兆人本业记**》颁行天下，作为地方官员劝农参考。\n- **军事与边疆**：收复**安西四镇**，设置**北庭都护府**，巩固了西北边防。\n- **统治特点**：**“政由己出”**，明察善断；任用酷吏（如**来俊臣**）打击政敌，但也重用贤臣（如**狄仁杰**、**姚崇**）。\n- **历史评价**：承前启后，有“**政启开元，治宏贞观**”之誉；其统治也存在**任用酷吏**、**放手招官**（导致官僚机构膨胀）等弊端。\n- **代表作品/思想**：了解其诗歌《**如意娘**》、《**腊日宣诏幸上苑**》体现的个人性格与权威。\n- **常见易混点/对比点**：与汉初**吕后**专权的异同；其“革命”（改朝换代）与传统**儒家伦理**的冲突。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  **身份与称号**：中国历史上唯一的**女皇帝**。\n2.  **国号**：改唐为**周**（史称“武周”）。\n3.  **核心贡献**：大力发展科举制，创立**殿试**和**武举**。\n4.  **统治评价**：其统治为“**开元盛世**”奠定基础，有“**贞观遗风**”。\n5.  **重要遗迹**：与高宗合葬**乾陵**，立有著名的**无字碑**。\n6.  **易混点**：注意区分**唐太宗**（李世民）、**武则天**、**唐玄宗**（李隆基）的先后顺序和主要作为。\n\n### 高中阶段考点\n1.  **政治背景**：其上台与打击**关陇军事贵族集团**，扩大**庶族地主**政治参与有关。\n2.  **制度创新**：科举制方面，**殿试**由其首创（存疑，一说始于唐高宗），**武举**则为其明确设立。\n3.  **统治手段**：双重性——**任用酷吏**打击政敌以巩固权力 vs. **知人善任**，选拔了狄仁杰、姚崇、宋璟等名臣。\n4.  **经济措施**：重视农业，编撰农书《**兆人本业记**》。\n5.  **边疆经略**：军事上**收复安西四镇**，设立**北庭都护府**，巩固了对西域的统治。\n6.  **历史评价**：理解“**政启开元，治宏贞观**”的内涵；认识其统治的积极面（承上启下、促进社会流动）与消极面（酷吏政治、后期朝政腐败）。\n7.  **文化象征**：**无字碑**是其复杂历史评价的集中体现。\n8.  **对比分析**：与**吕后**专权的异同（是否称帝、制度性贡献等）；其称帝对**儒家纲常伦理**的冲击。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 生于利州。 | 生于利州。 | 28.053791 | 102.191518 |\n| 太宗驾崩，入感业寺为尼。 | 太宗驾崩，入感业寺为尼。 | 25.022440 | 102.730522 |\n| 被立为皇后。 | 被立为皇后。 | 36.858345 | 119.385508 |\n| 高宗风疾加重，开始参决   const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {
  if (!text) return null;
  const match = String(text).match(/(\d{3,4})\s*年/);
  return match ? parseInt(match[1], 10) : null;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
