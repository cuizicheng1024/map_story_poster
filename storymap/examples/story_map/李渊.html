 **晋阳起兵**的背景与主要谋划者（**存疑/说法不一**，教材常采《旧唐书》说，强调李世民首谋；学术研究有不同观点）。\n- 唐朝建立后面临的**主要割据势力**（如薛举、刘武周、王世充、窦建德等）。\n- **武德年间**的政治特点：**宰相制度**（三省长官均为宰相）；**律令格式**的初步整理。\n- **玄武门之变**的性质与影响：宫廷政变，导致皇位继承权转移，李渊被迫退位。\n- **历史评价**的变迁：从被描述为优柔寡断到被重新评价为富有政治经验的开国君主。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：李渊（字叔德）\n- **时代**：隋末唐初\n- **出生**：公元566年，长安（今陕西西安）\n- **去世**：公元635年，长安（今陕西西安）\n- **享年**：70岁\n- **主要身份**：政治家、军事家、唐朝开国皇帝\n- **历史地位**：唐朝的开国皇帝，为大唐王朝近三百年的基业奠定了基础。\n- **主要成就**：晋阳起兵、攻占长安、建立唐朝、统一全国、初步奠定唐初政治制度。\n\n### 生平概述\n李渊出身于北周关陇贵族家庭，袭封唐国公。隋末天下大乱，他于大业十三年（617年）在晋阳起兵，同年攻占长安，立隋炀帝之孙杨侑为帝。次年（618年），隋炀帝死讯传来，李渊迫杨侑禅让，建立唐朝，年号武德。在位期间，他削平薛举、李轨、刘武周、王世充、窦建德等割据势力，基本完成全国统一。武德九年（626年），其子李世民发动“玄武门之变”，李渊被迫立李世民为太子，不久禅位，成为太上皇，直至去世。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：以长安（今西安）为中心，足迹遍及关中、山西、陇西等地。\n- ⏱️ **时间跨度**：公元566年—635年，共约70年。\n- 📍 **地理范围**：大致覆盖今陕西、山西、甘肃、河南等地区。\n- 🌟 **重要节点数量**：核心地点约8个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：长安\n- **公元纪年**：公元566年\n- **停留时间**：童年及青少年时期\n- **位置**：长安（今陕西省西安市）\n- **事迹**：出生于北周贵族家庭，袭封唐国公。\n- **意义**：其家族根基所在，也是其政治生涯的起点和最终归宿。\n\n### 📍 重要地点：陇西成纪\n- **公元纪年**：约公元566年之前（郡望）\n- **停留时间**：家族祖籍地\n- **位置**：陇西成纪（今甘肃省秦安县）\n- **事迹**：李氏家族的郡望所在地，是其贵族身份的象征性源头。\n- **意义**：标榜其家族出身，增强政治号召力。\n- **名篇名句**：《旧唐书·高祖本纪》：“姓李氏，陇西成纪人也。”\n\n### 📍 重要地点：太原/晋阳\n- **公元纪年**：公元615年—617年\n- **停留时间**：约2年\n- **位置**：太原郡晋阳县（今山西省太原市西南）\n- **事迹**：任太原留守，于此地招揽人才，储备力量，最终在晋阳宫起兵反隋。\n- **意义**：其事业的发祥地，“唐”国号亦源于此（古唐国之地）。\n- **名篇名句**：《授三秦豪杰等官敕》：“义兵济河，关中响应。”\n\n### 📍 重要地点：晋阳宫\n- **公元纪年**：公元617年农历五月\n- **停留时间**：起兵决策地\n- **位置**：位于太原晋阳城内\n- **事迹**：在此诛杀副留守王威、高君雅，正式宣布起兵，史称“晋阳起兵”。\n- **意义**：李渊集团公开反隋的标志性地点，唐朝国运的起点。\n\n### 📍 重要地点：霍邑\n- **公元纪年**：公元617年农历八月\n- **停留时间**：短暂交战\n- **位置**：霍邑（今山西省霍州市）\n- **事迹**：率军南下，于此地击败隋将宋老生，打开了进军关中的通道。\n- **意义**：起兵后的第一场关键性胜利，极大鼓舞了军心。\n\n### 📍 重要地点：长安（大兴城）\n- **公元纪年**：公元617年农历十一月—635年\n- **停留时间**：约18年（自攻占至去世）\n- **位置**：长安（今陕西省西安市）\n- **事迹**：攻占长安后，拥立隋恭帝，自封大丞相、唐王。次年受禅称帝，建立唐朝，以此为都。在此统治全国，后于此成为太上皇。\n- **意义**：唐朝的京师，其政治生涯的核心舞台与最终归宿。\n- **名篇名句**：《赐秦王诗》：“新丰停翠辇，谯邑驻鸣笳。园荒一径断，苔古半阶斜。”（存疑，一说为后世伪托）\n\n### 📍 重要地点：长春宫\n- **公元纪年**：公元618年—619年\n- **停留时间**：称帝初期\n- **位置**：长春宫（今陕西省大荔县朝邑镇）\n- **事迹**：称帝后曾驻跸于此，指挥对关东割据势力的战争。\n- **意义**：唐朝初年重要的前线指挥所。\n\n### 🔴 去世地：长安（大安宫/垂拱殿）\n- **公元纪年**：公元635年农历五月\n- **停留时间**：太上皇时期（626年—635年）\n- **位置**：长安大安宫（后改称大明宫，今陕西省西安市）\n- **经过**：玄武门之变后退位为太上皇，晚年在宫中度过，郁郁而终。\n- **意义**：人生的终点，见证了从开国之君到失势太上皇的转变。\n- **名篇名句**：《旧唐书·高祖本纪》：“（贞观）九年五月庚子，崩于太安宫之垂拱殿。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 公元566年 | 0岁 | 出生于长安。 |\n| 公元572年 | 6岁 | 袭封唐国公。 |\n| 公元615年 | 49岁 | 被任命为山西河东慰抚大使，镇压起义，后升任太原留守。 |\n| 公元617年 | 51岁 | 农历五月，于晋阳起兵；农历十一月，攻占长安，立隋恭帝，自任大丞相、唐王。 |\n| 公元618年 | 52岁 | 隋炀帝死讯至，受禅称帝，建立唐朝，年号武德。 |\n| 公元618年—624年 | 52—58岁 | 进行统一战争，先后平定薛仁杲、李轨、刘武周、王世充、窦建德、刘黑闼等势力。 |\n| 公元626年 | 60岁 | 农历六月，玄武门之变爆发，秦王李世民杀太子李建成、齐王李元吉；农历八月，禅位于李世民，自称太上皇。 |\n| 公元635年 | 70岁 | 崩于长安大安宫，庙号高祖，葬于献陵。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n李渊在隋末乱世中抓住时机，成功起兵并建立唐朝，结束了隋末的分裂局面，重新统一了中国。他在位期间确立的官制、律法（如《武德律》）、均田制与租庸调制等，为“贞观之治”的繁荣奠定了坚实的制度基础。\n\n### 对后世的影响\n1.  **奠定大唐基业**：作为唐朝的创建者，其政治决策和军事行动为大唐近三百年的国祚开辟了道路。\n2.  **制度承前启后**：其武德年间的制度建设，上承隋制，下启贞观，是隋唐制度演进的关键一环。\n3.  **家族政治典范**：其以关陇贵族为核心，联合各方力量夺取天下的模式，成为后世研究贵族政治与王朝创建的重要案例。\n\n### 历史评价\n1.  《旧唐书》：“高祖审独夫之运去，知新主之勃兴，密运雄图，未伸龙跃。”\n2.  毛泽东：“唐高祖李渊是中国封建史上一位杰出的政治家、军事家。”\n3.  现代史家多认为，李渊在晋阳起兵中的主导作用长期被其子李世民的光环所掩盖，他是一位深谋远虑、善于把握时机的政治领袖。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**隋末农民起义**，天下大乱。\n- **关键事件**：**晋阳起兵**（617年）；攻占**长安**；**建立唐朝**（618年，年号武德）。\n- **代表贡献**：完成**统一**；定都长安。\n- **常见易混点**：与**李世民**的贡献区分（李渊是开国之君，李世民是治国之君并开创“贞观之治”）。\n\n### 高中阶段\n- **时代背景**：**关陇集团**；**隋唐嬗代**。\n- **关键事件**：**晋阳起兵决策**的主导者问题（**存疑**，传统史书强调李世民作用，现代研究多肯定李渊主导）；**玄武门之变**（626年）与**禅位**。\n- **代表思想/制度**：**《武德律》**；**租庸调制**；**府兵制**的承袭与初步完善。\n- **历史意义**：唐朝**制度奠基**者；其统治时期是**贞观之治**的准备阶段。\n- **对比点**：与**隋文帝**（开国与制度开创）对比；与**李世民**（开国与守成、治国）的功绩与形象对比。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段\n- 唐朝的建立者：**李渊**。\n- 建立时间：**618年**。\n- 都城：**长安**（今西安）。\n- 主要事件：从**太原**起兵，攻入长安。\n- 与唐太宗**李世民**的关系：父子，李渊是父亲，李世民是儿子。\n\n### 高中阶段\n- **晋阳起兵**的背景与主要谋划者（**存疑/说法不一**，教材常采《旧唐书》说，强调李世民首谋；学术研究有不同观点）。\n- 唐朝建立后面临的**主要割据势力**（如薛举、刘武周、王世充、窦 const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {

  return match ? parseInt(match[1], 10) : null;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
