，集中体现了**小品文的战斗性**和批判精神。\n- **代表作品**：除《蜂》外，需掌握其**咏史诗**如《筹笔驿》、《西施》，理解其借古讽今的手法。\n- **艺术特色**：分析其诗歌**犀利泼辣**、**善用翻案**（如《西施》）的语言风格与构思特点。\n- **历史评价**：结合**鲁迅**的评价，理解其在文学史，特别是**讽刺文学史**上的独特地位。\n- **对比点**：与**皮日休、陆龟蒙**的散文（如《皮子文薮》、《笠泽丛书》）进行对比，看晚唐讽刺文学的共同风貌。\n\n---", "examPoints": "### 初中阶段考点\n1.  **罗隐**是**晚唐**著名诗人。\n2.  其诗歌《**蜂**》是咏物诗的名篇，通过蜜蜂采蜜抒发了对劳动者辛勤付出却不得享受的同情，以及对社会不公的**讽刺**。\n3.  了解“**十上不第**”的故事，知道这是古代文人怀才不遇的典型例子。\n4.  能够背诵并默写《蜂》。\n\n### 高中阶段考点\n1.  **罗隐**的散文集《**谗书**》的思想内容与艺术价值（鲁迅的评价是重要切入点）。\n2.  分析其**咏史诗**（如《西施》、《筹笔驿》）中体现的**历史观**和**批判精神**。\n3.  理解其诗歌**语言犀利**、**善用反讽**的艺术特色。\n4.  将罗隐置于**晚唐现实主义文学**（诗人群体）的脉络中进行考察，与**杜荀鹤**、**皮日休**等人进行对比。\n5.  **存疑/说法不一**：关于其生卒年、具体游历路线、部分作品的创作时间和地点，史料记载有出入，需注意。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：罗隐（原名横，字昭谏，号江东生）\n- **时代**：晚唐至五代（吴越国）\n- **出生**：唐文宗大和七年（公元833年），杭州新城（今浙江省杭州市富阳区新登镇）\n- **去世**：后梁开平四年（公元910年），杭州钱塘县（今浙江省杭州市）\n- **享年**：77岁（存疑，另有81岁等说法）\n- **主要身份**：诗人、文学家、官员\n- **历史地位**：晚唐著名现实主义诗人，以讽刺散文和诗歌著称，其作品深刻反映了唐末的社会矛盾与文人心态。\n- **主要成就**：创作大量讽刺小品文（收录于《谗书》）；诗歌成就突出，尤擅咏史、咏物讽刺诗；在吴越国官至给事中，对地方政治有所建言。\n\n### 生平概述\n罗隐生活在唐朝由衰转亡、藩镇割据的动荡时代。他才华横溢，但因性格耿介、诗文多讽时弊，加之相貌传闻（“十上不第”与“貌陋”之说），导致科举之路异常坎坷，历经十余年应试不第。晚年归附家乡的吴越王钱镠，历任钱塘令、著作令、给事中等职，生活相对安定。其诗文笔锋犀利，深刻揭露社会黑暗，是晚唐文坛独具特色的批判者。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：一生主要活动于长江中下游的江南地区（浙江、江苏、安徽）与京城长安之间，晚年定居吴越。\n- ⏱️ **时间跨度**：约公元833年 - 公元910年，总跨度约77年。\n- 📍 **地理范围**：大致覆盖今浙江省、陕西省（长安）、江苏省、安徽省、湖南省、湖北省等地。\n- 🌟 **重要节点数量**：核心地点约10个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：杭州新城\n- **公元纪年**：公元833年\n- **停留时间**：青少年时期\n- **位置**：唐杭州新城县（今浙江省杭州市富阳区新登镇）\n- **事迹**：出生并成长于此，接受了早期教育。\n- **意义**：人生的起点，故乡情结贯穿其诗文，晚年亦归葬于此地。\n\n### 📍 重要地点：池州\n- **公元纪年**：约公元860年代\n- **停留时间**：数年（说法不一）\n- **位置**：唐池州（今安徽省池州市）\n- **事迹**：曾在此地隐居或游学，创作了部分诗文。\n- **意义**：其诗集中有《寄池州郑员外》等作，是其早期游历的重要一站。\n\n### 📍 重要地点：长安\n- **公元纪年**：约公元859年 - 公元887年（多次往返）\n- **停留时间**：断断续续十余年\n- **位置**：唐京城长安（今陕西省西安市）\n- **事迹**：多次参加进士科考试，皆铩羽而归；期间广交文友，创作了大量讽刺时政、抒发愤懑的诗文，如《感弄猴人赐朱绂》。\n- **意义**：科举失意之地，却是其文学创作与思想成熟的中心舞台，奠定了其“十上不第”的悲剧文人形象。\n- **名篇名句**：《感弄猴人赐朱绂》：“十二三年就试期，五湖烟月奈相违。何如买取胡孙弄，一笑君王便著绯。”；《赠妓云英》：“我未成名君未嫁，可能俱是不如人。”\n\n### 📍 重要地点：湖南（长沙等地）\n- **公元纪年**：约公元870年代\n- **停留时间**：数年\n- **位置**：唐潭州等地（今湖南省长沙市一带）\n- **事迹**：科举失意后南下游历，曾入湖南观察使幕府。\n- **意义**：漂泊生涯的一部分，丰富了其人生阅历和诗歌题材。\n- **名篇名句**：《湘南应用集序》自述经历。\n\n### 📍 重要地点：淮润（扬州、镇江一带）\n- **公元纪年**：约公元880年代\n- **停留时间**：数年\n- **位置**：唐淮南节度使辖区（今江苏省扬州、镇江一带）\n- **事迹**：黄巢起义后，避乱于此，生活困顿。\n- **意义**：见证了唐末战乱，加深了对社会动荡的体验。\n\n### 📍 重要地点：杭州钱塘（吴越国都）\n- **公元纪年**：公元887年 - 公元910年\n- **停留时间**：约23年（晚年）\n- **位置**：吴越国都杭州（今浙江省杭州市）\n- **事迹**：归附吴越王钱镠，历任钱塘令、镇海军掌书记、节度判官、著作令、给事中等职。受到钱镠礼遇，生活安定，继续创作。\n- **意义**：人生最后的归宿和政治依托，实现了从落魄文人到幕府官员的转变，得以善终。\n- **名篇名句**：《钱尚父生日》：“大昴分光降斗牛，兴唐宗社作诸侯。”（颂扬钱镠）\n\n### 🔴 去世地：杭州钱塘\n- **公元纪年**：后梁开平四年（公元910年）\n- **停留时间**：晚年定居于此\n- **位置**：吴越国杭州钱塘县（今浙江省杭州市）\n- **经过**：在吴越国给事中任上病逝。\n- **意义**：生命的终点，归葬于故乡新城。其墓今存于浙江省杭州市富阳区新登镇。\n- **名篇名句**：《筹笔驿》：“时来天地皆同力，运去英雄不自由。”（常被视为其咏史怀古的代表作，创作地点存疑，但深刻反映其历史观）\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| --- | --- | --- |\n| 公元833年 | 0岁 | 出生于杭州新城。 |\n| 约859年 | 约26岁 | 首次赴长安参加进士科考试。 |\n| 约859-887年 | 约26-54岁 | 屡试不第，期间游历池州、长安、湖南、淮润等地，创作大量诗文。 |\n| 公元887年 | 约54岁 | 返回杭州，投奔吴越王钱镠，任钱塘令。 |\n| 约887-910年 | 约54-77岁 | 在吴越国任职，官至给事中，生活安定。 |\n| 公元910年 | 77岁 | 在杭州钱塘去世。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n罗隐在唐末文坛以其尖锐的讽刺诗文独树一帜，其作品在士人阶层中流传，引起共鸣，但因其批判性过强，在当时主流政治环境中并未获得广泛推崇。晚年效力于吴越国，其政治建议对钱镠的统治产生了一定积极影响。\n\n### 对后世的影响\n1.  **文学价值**：其讽刺小品文《谗书》被鲁迅誉为“几乎全部是抗争和愤激之谈”，对后世讽刺文学影响深远。\n2.  **诗歌典范**：咏史、咏物诗中的深刻讽刺与精辟议论，成为后世学习的对象。\n3.  **文化符号**：“十上不第”的经历成为古代落魄才子的典型形象之一，常被后世文人援引以抒怀才不遇之慨。\n\n### 历史评价\n1.  **鲁迅评价**：“《谗书》几乎全部是抗争和愤激之谈。”（《小品文的危机》）\n2.  **毛泽东评价**：曾引用罗隐诗句“时来天地皆同力，运去英雄不自由”（《七律·人民解放军占领南京》草稿中曾化用），并称赞罗隐“有才情”。\n3.  **后世文论**：清代李慈铭《越缦堂读书记》称其诗“在晚唐诗人中，风骨最高”。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：**晚唐**时期，社会动荡，**藩镇割据**，科举制度弊端显现。\n- **关键事件**：以**“十上不第”** 的科举经历闻名，是怀才不遇文人的代表。\n- **代表作品**：**《蜂》**（“采得百花成蜜后，为谁辛苦为谁甜？”）是初中阶段接触其讽刺艺术的典型诗作。\n- **思想特点**：诗文多**讽刺现实**，揭露社会不公。\n- **常见易混点**：与同时代诗人**杜荀鹤**、**皮日休**、**陆龟蒙**等同属晚唐现实主义诗人群体，常被对比学习。\n\n### 高中阶段\n- **时代背景**：深入理解**唐末五代**的社会转型与文人心态。\n- **关键贡献**：**《谗书》** 是其散文代表作，集中体现了**小品文的战斗性**和批判精神。\n- **代表作品**：除《蜂》外，需掌握其**咏史诗**如《筹笔驿》、《西施》，理解其借古讽今的手法。\n- **艺术特色**：分析其诗歌**犀利泼辣**、**善用翻案**（如《西施》）的语言风格与构思特点。\n- **历史评价**：结合**鲁迅**的评价，理解其在文学史，特别是**讽刺文学史**上的独特地位。\n- **对比点**：与**皮日休、陆龟蒙**的散文（如《皮子文薮》、《笠泽丛书》）进行对比，看晚唐讽刺文学的共同风貌。\n\n---\n\n## 初高中阶段考点\n\n### 初中阶段考点\n1.  **罗隐**是**晚唐**著名诗人。\n2.  其诗歌《**蜂**》是咏物诗的名篇，通过蜜蜂采蜜抒发了对劳动者辛勤付出却不得享受的同情，以及对社会不公的**讽刺**。\n3.  了解“**十上不第**”的故事，知道这是古代文人怀才不遇的典型例子。\n4.  能够背诵并默写《蜂》。\n\n### 高中阶段考点\n1.  **罗隐**的散文集《**谗书**》的思想内容与艺术价值（鲁迅的评价是重要切入点）。\n2.  分析其**咏史诗**（如《西施》、《筹笔驿》）中体现的**历史观**和**批判精神**。\n3.  理解其诗歌**语言犀利**、**善用反讽**的艺术特色。\n4.  将罗隐置于**晚唐现实主义文学**（诗人群体）的脉络中进行考察，与**杜荀鹤**、**皮日休**等人进行对比。\n5.  **存疑/说法不一**：关于其生卒年、具体游历路线、部分作品的创作时间和地点，史料记载有出入，需注意。\n\n## 地点坐标（自动地理编码）\n| 现称 | 现代搜索地名 | 纬度 | 经度 |\n| --- | --- | --- | --- |\n| 出生于杭州新城。 | 出生于杭州新城。 | 22.305232 | 114.275214 |\n| 返回杭州，投奔吴越王钱镠，任钱塘令。 | 返回杭州，投奔吴越王钱镠，任钱塘令。 | 30.298450 | 120.026052 |\n| 在杭州钱塘去世。 | 在杭州钱塘去世。 | 30.317114 | 120.361873 |"};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

        locations[i+1].lat, locations[i+1].lng

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
