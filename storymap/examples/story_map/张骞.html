      const { useState, useEffect, useRef, useMemo } = React;
      const data = {"person": {"name": "张骞", "title": "第一个睁开眼睛看世界的中国人", "description": "张骞生活在汉武帝时期，汉朝国力强盛，正积极对抗北方的匈奴威胁。为联合被匈奴击败西迁的大月氏共击匈奴，张骞于公元前139年奉命出使西域。途中被匈奴俘虏，羁押十余年，但始终“持汉节不失”。后逃脱，继续西行，经大宛、康居，抵达大月氏，虽未达成军事联盟目的，却详细考察了西域各地的山川物产与风土人情。归国后，他向汉武帝详细汇报，其见闻直接促使汉朝制定并实施了“断匈奴右臂”的战略。公元前119年，他再次出使西域，成功与乌孙等国建立联系，开启了中原与西域大规模交流的时代，其旅程被司马迁称为“凿空”。", "quote": "《史记·大宛列传》：“骞以校尉从大将军击匈奴，知水草处，军得以不乏，乃封骞为博望侯。”", "dynasty": "西汉", "birthplace": "生年不详）", "avatar": "", "birth": {"date": "公元前164年", "location": "生年不详）", "lat": 31.7713699, "lng": 117.2095833}, "death": {"date": "公元前114年", "location": "长安（今陕西西安）", "lat": 34.261004, "lng": 108.9423363}, "lifespan": "约50岁（存疑）", "highlights": {"honor": "第一个睁开眼睛看世界的中国人", "status": "丝绸之路的开拓者，被誉为“第一个睁开眼睛看世界的中国人”", "identities": "外交家、探险家、旅行家", "achievements": "首次出使西域，开辟“凿空”之旅；带回关键西域地理与政治信息；促进汉朝与西域诸国的官方往来与文化交流；为丝绸之路的畅通奠定基础", "works": [], "reviews": ["**司马迁（西汉史学家）**：“《禹本纪》言：‘河出昆仑……’今自张骞使大夏之后也，穷河源，恶睹本纪所谓昆仑者乎？……至《禹本纪》、《山海经》所有怪物，余不敢言之也。”（肯定其亲身考察纠正了古籍的虚妄记载）", "**班固（东汉史学家）**：“张骞凿空，其后使往者皆称博望侯，以为质于外国，外国由是信之。”（指出其信誉为后续外交活动奠定了基础）", "**后世普遍评价**：被誉为“丝绸之路的开拓者”、“第一个睁开眼睛看世界的中国人”，其历史功绩在于以个人非凡的探险，开启了国家层面的对外交流新时代。"]}}, "locations": [{"name": "汉中郡城固县", "ancientName": "汉中郡城固县", "modernName": "陕西省汉中市城固县", "lat": 33.341944, "lng": 107.196667, "type": "birth", "event": "张骞出生及成长之地，具体事迹史载不详。", "time": "约公元前164年？（存疑）", "duration": "青少年时期", "significance": "其人生起点，汉中盆地的地理环境可能培养了他坚韧的性格。", "works": [], "quoteLines": []}, {"name": "长安", "ancientName": "西汉都城长安", "modernName": "陕西省西安市西北", "lat": 34.261004, "lng": 108.9423363, "type": "normal", "event": "接受汉武帝出使西域的诏令；归来后向武帝详细汇报西域见闻，被封为太中大夫；第二次出使归来后被封为大行，负责外交事务。", "time": "约公元前140年-前139年；公元前126年-前119年；公元前115年-前114年", "duration": "出使前担任郎官时期；第一次出使归来后及第二次出使前后；晚年直至去世", "significance": "其政治生涯与外交事业的决策中心和荣誉获取地。", "works": [], "quoteLines": ["《史记·大宛列传》：“骞以校尉从大将军击匈奴，知水草处，军得以不乏，乃封骞为博望侯。”"]}, {"name": "陇西郡", "ancientName": "陇西郡", "modernName": "甘肃省临洮县一带", "lat": 35.37915, "lng": 103.85794, "type": "normal", "event": "率领使团从长安出发，经陇西郡出塞，正式踏上西行之路。", "time": "公元前139年", "duration": "短暂经过", "significance": "离开汉朝控制区的最后关口，前方即是匈奴活动的危险区域。", "works": [], "quoteLines": []}, {"name": "匈奴控制区（单于庭一带）", "ancientName": "漠南地区", "modernName": "内蒙古中部", "lat": 42.8768696, "lng": 117.6604805, "type": "normal", "event": "出使途中被匈奴骑兵俘虏，押送至单于庭。匈奴单于为软化他，赐予妻室，张骞在此娶妻生子，但始终保留汉朝使节的符节。", "time": "约公元前139年-前129年", "duration": "约十年（被俘羁押）", "significance": "漫长的囚徒生涯磨练了他的意志，也使他深入学习了匈奴语言与习俗，为日后成功逃脱和再次出使积累了经验。", "works": [], "quoteLines": ["《汉书·张骞传》：“骞持汉节不失。”"]}, {"name": "大月氏国（妫水北）", "ancientName": "大月氏", "modernName": "中亚阿姆河北，阿富汗北部", "lat": 43.8907284, "lng": 87.5131218, "type": "normal", "event": "经康居最终抵达目的地。此时大月氏已征服大夏，土地肥沃，生活安逸，复仇之心已淡。张骞“竟不能得月氏要领”，未能说服其与汉结盟。", "time": "约公元前128年-前127年", "duration": "约一年", "significance": "虽未完成直接军事使命，但实地考察了中亚大国的国情，获得了关于西域最西端的第一手宝贵资料。", "works": [], "quoteLines": ["《史记·大宛列传》：“大夏民多，可百余万……及大月氏西徙，攻败之，皆臣畜大夏。”"]}, {"name": "长安", "ancientName": "西汉都城长安", "modernName": "陕西省西安市西北", "lat": 34.261004, "lng": 108.9423363, "type": "death", "event": "第二次出使西域归来后约一年，张骞在大行任上病逝。", "time": "公元前114年", "duration": "晚年（约公元前115年-前114年）", "significance": "其外交事业的终点，归葬故里。他的去世标志着汉朝第一波大规模西域探险热潮的结束，但他开辟的道路和留下的信息，持续影响着汉朝的对外政策。", "works": [], "quoteLines": ["《史记·大宛列传》：“骞所遣使通大夏之属者皆颇与其人俱来，于是西北国始通于汉矣。”"]}], "mapStyle": {"pathColor": "#1e40af", "markers": {"normal": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#3498db"}, "birth": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#2ecc71"}, "death": {"iconUrl": "https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 初中阶段\n- **时代背景**：**西汉**强盛，**汉武帝**时期国力达到顶峰，积极反击**匈奴**。\n- **关键事件**：**张骞出使西域**。分为两次：**第一次（公元前139年）** 目的是联络**大月氏**夹击匈奴，未达成直接目的但带回宝贵信息；**第二次（公元前119年）** 目的是联络**乌孙**，并派副使访问中亚诸国，获得成功。\n- **核心贡献**：为**丝绸之路**的开辟奠定了基础，促进了中原与**西域**的经济文化交流。\n- **代表成果/影响**：西域的**葡萄、石榴、苜蓿、胡麻**等传入中原；中原的**丝绸、凿井、冶铁技术**西传。汉朝设立**西域都护府**（公元前60年，张骞死后）标志着西域正式归属中央政权。\n- **常见易混点/对比点**：区分张骞出使西域的**直接目的**（军事联盟）和**客观效果**（开辟商路、文化交流）。对比**班超**经营西域（东汉）与张骞的“凿空”之功。\n\n### 高中阶段\n- **时代背景**：**汉匈战争**是贯穿西汉前期的重大边疆问题，从和亲到武力反击的战略转变。\n- **关键事件**：**“凿空”之旅**。深入分析其被俘、逃脱、坚持完成使命的过程，体现其个人品质与历史机遇的结合。\n- **核心贡献**：**地理发现与信息传递**。其行程记录（见于《史记·大宛列传》）是研究古代中亚史的珍贵史料。**战略价值**：其情报直接服务于汉朝“**断匈奴右臂**”的长期战略。\n- **代表思想/影响**：**文明交流的双向性与物质性**。不仅是商品交换，也是技术、物种、艺术、思想的传播。**国家行为与个人探险**的关系：张骞的个人行动如何被国家力量放大并制度化。\n- **常见易混点/对比点**：对比**陆上丝绸之路**与后来的**海上丝绸之路**。分析“**朝贡体系**”与“**丝绸之路贸易**”在性质上的异同。评价张骞时，需注意其**历史局限性**（如未能达成军事同盟），但更要强调其**开创性贡献**。\n\n---", "examPoints": "### 初中阶段\n1.  张骞出使西域的**时间**：第一次**公元前139年**，第二次**公元前119年**。\n2.  出使的**主要目的**：联络**大月氏**，夹击**匈奴**。\n3.  张骞出使的**历史意义**：促进了汉朝与西域的相互了解与往来，为**丝绸之路**的开通奠定了基础。\n4.  丝绸之路的**路线**：从长安出发，经**河西走廊**、今**新疆**地区，运往**中亚**、**西亚**，最终转运到**欧洲**（大秦）。\n5.  通过丝绸之路传入中原的物种：**葡萄、石榴、苜蓿、核桃（胡桃）、胡萝卜**等。\n6.  公元前60年，西汉政府设立**西域都护府**，总管西域事务，标志着今**新疆地区**开始隶属中央政府管辖。\n7.  张骞身上体现的精神：**不畏艰险、勇于开拓、忠于使命**。\n8.  （易混点）张骞是**西汉**人，班超是**东汉**人，两人都与西域有关，但时代不同。\n\n### 高中阶段\n1.  张骞出使西域的**历史背景**：汉初对匈奴**和亲**政策的失败；汉武帝**反击匈奴**的战略需要。\n2.  **“凿空”** 的含义：指张骞首次打通中原通往西域的道路，具有**探险和开拓**性质。\n3.  张骞出使的**直接成果**与**长远影响**辨析：直接军事目的未达成，但获得了西域地理、政治、物产信息，开启了官方交往。\n4.  丝绸之路开通的**多维影响**：**经济**（贸易往来）、**文化**（宗教、艺术传播）、**物种**（农作物交流）、**技术**（冶铁、凿井西传）。\n5.  张骞通西域与**汉朝边疆政策**的关系：是汉朝“**断匈奴右臂**”战略的关键环节，后发展为设置**河西四郡**、经营西域。\n6.  从**文明史观**角度评价张骞：他是**东西方文明交流的先行者**，其旅程标志着**丝绸之路**从民间零星往来进入官方主导的新阶段。\n7.  （存疑/说法一不）关于张骞**出生年份**、首次出使时的**确切年龄**、在匈奴地**具体生活细节**等，史料记载模糊，需知其不确定性。\n8.  （对比点）张骞通西域与**甘英出使大秦**（东汉）的异同：目的、路线、结果及历史条件的差异。", "markdown": "# 人物 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：张骞\n- **时代**：西汉\n- **出生**：约公元前164年？汉中郡城固县（今陕西城固县）（存疑，生年不详）\n- **去世**：公元前114年，长安（今陕西西安）\n- **享年**：约50岁（存疑）\n- **主要身份**：外交家、探险家、旅行家\n- **历史地位**：丝绸之路的开拓者，被誉为“第一个睁开眼睛看世界的中国人”\n- **主要成就**：首次出使西域，开辟“凿空”之旅；带回关键西域地理与政治信息；促进汉朝与西域诸国的官方往来与文化交流；为丝绸之路的畅通奠定基础\n\n### 生平概述\n张骞生活在汉武帝时期，汉朝国力强盛，正积极对抗北方的匈奴威胁。为联合被匈奴击败西迁的大月氏共击匈奴，张骞于公元前139年奉命出使西域。途中被匈奴俘虏，羁押十余年，但始终“持汉节不失”。后逃脱，继续西行，经大宛、康居，抵达大月氏，虽未达成军事联盟目的，却详细考察了西域各地的山川物产与风土人情。归国后，他向汉武帝详细汇报，其见闻直接促使汉朝制定并实施了“断匈奴右臂”的战略。公元前119年，他再次出使西域，成功与乌孙等国建立联系，开启了中原与西域大规模交流的时代，其旅程被司马迁称为“凿空”。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：从汉朝都城出发，穿越河西走廊、西域（今新疆及中亚部分地区），最远抵达中亚阿姆河流域。\n- ⏱️ **时间跨度**：约公元前139年（首次出使）至公元前114年（去世），跨度约25年。\n- 📍 **地理范围**：大致覆盖今中国陕西、甘肃、新疆，以及中亚的费尔干纳盆地（大宛）、阿姆河流域（大月氏、大夏）等地。\n- 🌟 **重要节点数量**：核心地点约8个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：汉中郡城固县\n- **公元纪年**：约公元前164年？（存疑）\n- **停留时间**：青少年时期\n- **位置**：汉中郡城固县（今陕西省汉中市城固县）\n- **事迹**：张骞出生及成长之地，具体事迹史载不详。\n- **意义**：其人生起点，汉中盆地的地理环境可能培养了他坚韧的性格。\n\n### 📍 重要地点：长安\n- **公元纪年**：约公元前140年-前139年；公元前126年-前119年；公元前115年-前114年\n- **停留时间**：出使前担任郎官时期；第一次出使归来后及第二次出使前后；晚年直至去世\n- **位置**：西汉都城长安（今陕西省西安市西北）\n- **事迹**：接受汉武帝出使西域的诏令；归来后向武帝详细汇报西域见闻，被封为太中大夫；第二次出使归来后被封为大行，负责外交事务。\n- **意义**：其政治生涯与外交事业的决策中心和荣誉获取地。\n- **名篇名句**：《史记·大宛列传》：“骞以校尉从大将军击匈奴，知水草处，军得以不乏，乃封骞为博望侯。”\n\n### 📍 重要地点：陇西郡\n- **公元纪年**：公元前139年\n- **停留时间**：短暂经过\n- **位置**：陇西郡（今甘肃省临洮县一带）\n- **事迹**：率领使团从长安出发，经陇西郡出塞，正式踏上西行之路。\n- **意义**：离开汉朝控制区的最后关口，前方即是匈奴活动的危险区域。\n\n### 📍 重要地点：匈奴控制区（单于庭一带）\n- **公元纪年**：约公元前139年-前129年\n- **停留时间**：约十年（被俘羁押）\n- **位置**：漠南地区（约今内蒙古中部）\n- **事迹**：出使途中被匈奴骑兵俘虏，押送至单于庭。匈奴单于为软化他，赐予妻室，张骞在此娶妻生子，但始终保留汉朝使节的符节。\n- **意义**：漫长的囚徒生涯磨练了他的意志，也使他深入学习了匈奴语言与习俗，为日后成功逃脱和再次出使积累了经验。\n- **名篇名句**：《汉书·张骞传》：“骞持汉节不失。”\n\n### 📍 重要地点：大宛国（费尔干纳盆地）\n- **公元纪年**：约公元前128年\n- **停留时间**：短暂\n- **位置**：大宛（今中亚费尔干纳盆地，乌兹别克斯坦、塔吉克斯坦和吉尔吉斯斯坦交界处）\n- **事迹**：从匈奴逃脱后，西行数十日抵达大宛。向大宛王说明来意，并许诺汉朝将给予丰厚赏赐以换取帮助。大宛王为其提供向导和翻译，护送其至康居。\n- **意义**：成功获得西域第一个国家的官方协助，是其西行取得突破的关键一步。\n- **名篇名句**：《史记·大宛列传》：“大宛闻汉之饶财，欲通不得，见骞，喜。”\n\n### 📍 重要地点：大月氏国（妫水北）\n- **公元纪年**：约公元前128年-前127年\n- **停留时间**：约一年\n- **位置**：大月氏（今中亚阿姆河北，阿富汗北部）\n- **事迹**：经康居最终抵达目的地。此时大月氏已征服大夏，土地肥沃，生活安逸，复仇之心已淡。张骞“竟不能得月氏要领”，未能说服其与汉结盟。\n- **意义**：虽未完成直接军事使命，但实地考察了中亚大国的国情，获得了关于西域最西端的第一手宝贵资料。\n- **名篇名句**：《史记·大宛列传》：“大夏民多，可百余万……及大月氏西徙，攻败之，皆臣畜大夏。”\n\n### 📍 重要地点：大夏国（蓝氏城）\n- **公元纪年**：约公元前127年-前126年\n- **停留时间**：停留考察\n- **位置**：大夏（今阿富汗巴尔赫一带）\n- **事迹**：在大月氏期间，广泛游历其属地大夏，考察了当地的城池、物产、风俗。\n- **意义**：直接接触到了希腊-巴克特里亚文明的遗存，丰富了汉朝对极西之地的认知。\n- **名篇名句**：《史记·大宛列传》：“骞曰：‘臣在大夏时，见邛竹杖、蜀布。’”\n\n### 🔴 去世地：长安\n- **公元纪年**：公元前114年\n- **停留时间**：晚年（约公元前115年-前114年）\n- **位置**：西汉都城长安（今陕西省西安市西北）\n- **经过**：第二次出使西域归来后约一年，张骞在大行任上病逝。\n- **意义**：其外交事业的终点，归葬故里。他的去世标志着汉朝第一波大规模西域探险热潮的结束，但他开辟的道路和留下的信息，持续影响着汉朝的对外政策。\n- **名篇名句**：《史记·大宛列传》：“骞所遣使通大夏之属者皆颇与其人俱来，于是西北国始通于汉矣。”\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄（约） | 关键事件 |\n| :--- | :--- | :--- |\n| 约公元前164年 | 0岁 | 出生于汉中郡城固县（存疑）。 |\n| 约公元前140年 | 约24岁 | 在朝中担任“郎”官。 |\n| 公元前139年 | 约25岁 | 奉汉武帝之命，率领使团从长安出发，首次出使西域，欲联合大月氏夹击匈奴。 |\n| 约公元前139年-前129年 | 约25-35岁 | 在途中被匈奴俘虏，羁押于匈奴地约十年，并娶妻生子。 |\n| 约公元前128年 | 约36岁 | 逃脱匈奴控制，继续西行，经大宛、康居，抵达大月氏。 |\n| 约公元前127年-前126年 | 约37-38岁 | 在大月氏及大夏等地考察，未能达成军事联盟。 |\n| 公元前126年 | 约38岁 | 返回途中再次被匈奴扣押，趁匈奴内乱逃回长安。出发时百余人，归来仅余两人。被封为太中大夫。 |\n| 公元前123年 | 约41岁 | 随大将军卫青出击匈奴，因知水草地理，助军队补给，被封为“博望侯”。 |\n| 公元前121年 | 约43岁 | 因配合李广作战失期，当斩，赎为庶人。 |\n| 公元前119年 | 约45岁 | 再次被拜为中郎将，率领庞大使团第二次出使西域，主要目标是联络乌孙。 |\n| 公元前115年 | 约49岁 | 从乌孙返回长安，乌孙派使者数十人随行答谢。被任命为大行，负责外交事务。 |\n| 公元前114年 | 约50岁 | 在长安病逝。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n张骞的出使直接改变了汉朝的对外战略视野。他带回的详尽西域情报，使汉武帝得以制定并实施“断匈奴右臂”的战略，通过经营西域来牵制和削弱匈奴。他的成功促使汉朝在河西走廊设置武威、张掖、酒泉、敦煌四郡，并开始在西域驻军、屯田，将汉朝的政治、军事影响力首次实质性地投射到帕米尔高原以西，开启了中原王朝经略西域的序幕。\n\n### 对后世的影响\n1.  **开辟丝绸之路**：张骞的“凿空”之旅，正式打通了中原与西域乃至更远西方的交通干线，为后世繁荣千年的“丝绸之路”奠定了基础。\n2.  **促进东西方文明交流**：他带回了葡萄、苜蓿、石榴、胡麻等物产，以及西域的音乐、舞蹈；同时，中国的丝绸、冶铁、凿井技术也经此路西传，极大地促进了东西方物质与文化的交流。\n3.  **拓展地理与文化视野**：他的见闻记录（被司马迁载入《史记·大宛列传》）首次为中国人提供了关于中亚、西亚乃至地中海地区的相对准确的知识，打破了地理认知的局限。\n4.  **树立外交与探险精神典范**：其“持汉节不失”的忠诚、不畏艰险的勇气和坚韧不拔的意志，成为后世外交使节与探险家的楷模。\n\n### 历史评价\n1.  **司马迁（西汉史学家）**：“《禹本纪》言：‘河出昆仑……’今自张骞使大夏之后也，穷河源，恶睹本纪所谓昆仑者乎？……至《禹本纪》、《山海经》所有怪物，余不敢言之也。”（肯定其亲身考察纠正了古籍的虚妄记载）\n2.  **班固（东汉史学家）**：“张骞凿空，其后使往者皆称博望侯，以为质于外国，外国由是信之。”（指出其信誉为后续外交活动奠定了基础）\n3.  **后世普遍评价**：被誉为“丝绸之路的开拓者”、“第一个睁开眼睛看世界的中国人”，其历史功绩在于以个人非凡的探险，开启了国家层面的对外交流新时代。\n\n---\n\n## 人教版教材知识点\n### 初中阶段\n- **时代背景**：**西汉**强盛，**汉武帝**时期国力达到顶峰，积极反击**匈奴**。\n- **关键事件**：**张骞出使西域**。分为两次：**第一次（公元前139年）** 目的是联络**大月氏**夹击匈奴，未达成直接目的但带回宝贵信息；**第二次（公元前119年）** 目的是联络**乌孙**，并派副使访问中亚诸国，获得成功。\n- **核心贡献**：为**丝绸之路**的开辟奠定了基础，促进了中原与**西域**的经济文化交流。\n- **代表成果/影响**：西域的**葡萄、石榴、苜蓿、胡麻**等传入中原；中原的**丝绸、凿井、冶铁技术**西传。汉朝设立**西域都护府**（公元前60年，张骞死后）标志着西域正式归属中央政权。\n- **常见易混点/对比点**：区分张骞出使西域的**直接目的**（军事联盟）和**客观效果**（开辟商路、文化交流）。对比**班超**经营西域（东汉）与张骞的“凿空”之功。\n\n### 高中阶段\n- **时代背景**：**汉匈战争**是贯穿西汉前期的重大边疆问题，从和亲到武力反击的战略转变。\n- **关键事件**：**“凿空”之旅**。深入分析其被俘、逃脱、坚持完成使命的过程，体现其个人品质与历史机遇的结合。\n- **核心贡献**：**地理发现与信息传递**。其行程记录（见于《史记·大宛列传》）是研究古代中亚史的珍贵史料。**战略价值**：其情报直接服务于汉朝“**断匈奴右臂**”的长期战略。\n- **代表思想/影响**：**文明交流的双向性与物质性**。不仅是商品交换，也是技术、物种、艺术、思想的传播。**国家行为与个人探险**的关系：张骞的个人行动如何被国家力量放大并制度化。\n- **常见易混点/对比点**：对比**陆上丝绸之路**与后来的**海上丝绸之路**。分析“**朝贡体系**”与“**丝绸之路贸易**”在性质上的异同。评价张骞时，需注意其**历史局限性**（如未能达成军事同盟），但更要强调其**开创性贡献**。\n\n---\n\n## 初高中阶段考点\n### 初中阶段\n1.  张骞出使西域的**时间**：第一次**公元前139年**，第二次**公元前119年**。\n2.  出使的**主要目的**：联络**大月氏**，夹击**匈奴**。\n3.  张骞出使的**历史意义**：促进了汉朝与西域的相互了解与往来，为**丝绸之路**的开通奠定了基础。\n4.  丝绸之路的**路线**：从长安出发，经**河西走廊**、今**新疆**地区，运往**中亚**、**西亚**，最终转运到**欧洲**（大秦）。\n5.  通过丝绸之路传入中原的物种：**葡萄、石榴、苜蓿、核桃（胡桃）、胡萝卜**等。\n6.  公元前60年，西汉政府设立**西域都护府**，总管西域事务，标志着今**新疆地区**开始隶属中央政府管辖。\n7.  张骞身上体现的精神：**不畏艰险、勇于开拓、忠于使命**。\n8.  （易混点）张骞是**西汉**人，班超是**东汉**人，两人都与西域有关，但时代不同。\n\n### 高中阶段\n1.  张骞出使西域的**历史背景**：汉初对匈奴**和亲**政策的失败；汉武帝**反击匈奴**的战略需要。\n2.  **“凿空”** 的含义：指张骞首次打通中原通往西域的道路，具有**探险和开拓**性质。\n3.  张骞出使的**直接成果**与**长远影响**辨析：直接军事目的未达成，但获得了西域地理、政治、物产信息，开启了官方交往。\n4.  丝绸之路开通的**多维影响**：**经济**（贸易往来）、**文化**（宗教、艺术传播）、**物种**（农作物交流）、**技术**（冶铁、凿井西传）。\n5.  张骞通西域与**汉朝边疆政策**的关系：是汉朝“**断匈奴右臂**”战略的关键环节，后发展为设置**河西四郡**、经营西域。\n6.  从**文明史观**角度评价张骞：他是**东西方文明交流的先行者**，其旅程标志着**丝绸之路**从民间零星往来进入官方主导的新阶段。\n7.  （存疑/说法一不）关于张骞**出生年份**、首次出使时的**确切年龄**、在匈奴地**具体生活细节**等，史料记载模糊，需知其不确定性。\n8.  （对比点）张骞通西域与**甘英出使大秦**（东汉）的异同：目的、路线、结果及历史条件的差异。"};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {

};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）

  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
