eaflet@1.9.4/dist/images/marker-icon.png", "color": "#e74c3c"}}}, "textbookPoints": "### 语文（课文/词作）\n- **《短歌行》（其一）**：乐府旧题；主旨常解为“求贤若渴、及时建功”；名句“对酒当歌，人生几何”“山不厌高，海不厌深”“周公吐哺，天下归心”。\n- **《观沧海》**（《步出夏门行》之一）：借景抒怀，气象雄浑；以宏阔的海天意象承载政治抱负；名句“日月之行，若出其中；星汉灿烂，若出其里”。\n- **建安风骨**：语言质朴、气势沉雄，常以战争与时代动荡为背景，体现现实关怀与英雄气概。\n\n### 历史（史实/人物定位）\n- **东汉末年政局**：迎汉献帝都许，掌握朝政，以“挟天子以令诸侯”取得政治主动权。\n- **统一北方的关键战役**：官渡之战击败袁绍主力，奠定北方统一基础；北征乌桓平定北部威胁。\n- **制度与治理**：推行屯田制、整饬吏治、唯才是举，强化财政与军粮供给，为曹魏政权奠基。\n- **赤壁之战与格局**：赤壁败北后，短期内无法统一全国，三国鼎立格局由此形成。", "examPoints": "### 常见语文考点\n- 古典诗歌鉴赏：意象（海、日月、星汉）、情景关系、气象与格局、用典（“周公吐哺”）与主旨把握。\n- 文学史：建安文学与建安风骨的特点；曹操与建安诗风代表性。\n\n### 常见历史考点\n- 东汉末年割据与中央权力：曹操“奉天子以令不臣”的政治策略及影响。\n- 官渡、赤壁的历史意义：对势力格局的决定性作用。\n- 经济与军事制度：屯田制的背景、内容与作用。", "markdown": "# 曹操\n\n## 人物档案\n\n### 基本信息\n- **姓名**：曹操\n- **别名/外文名**：魏武帝、曹孟德、阿瞒\n- **时代**：东汉末年\n- **出生**：公元155年，沛国谯县（今安徽省亳州市）\n- **去世**：公元220年，洛阳（今河南省洛阳市）\n- **享年**：六十六岁（虚岁，周岁六十五岁）\n- **主要身份**：政治家、军事家、文学家\n- **历史地位**：三国时期曹魏政权的奠基者，建安文学的领袖。\n- **主要成就**：统一中国北方；实行屯田制，恢复北方经济；开创建安文风，推动文学发展。\n\n### 生平概述\n曹操生于东汉桓帝时期，成长于天下大乱的汉末。他早年举孝廉入仕，在镇压黄巾起义中崭露头角。后“挟天子以令诸侯”，逐步击败袁绍、袁术、吕布等割据势力，统一了中国北方。他推行屯田、兴修水利、唯才是举，奠定了曹魏立国的基础。同时，他雅好诗文，其作品慷慨悲凉，是建安风骨的代表。晚年进位魏王，为儿子曹丕代汉建魏铺平了道路。\n\n---\n\n## 人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：沛国谯县\n- **时间**：公元155年\n- **停留时间**：少年时期\n- **地点**：沛国谯县（今安徽省亳州市）\n- **事件**：出生于官宦家庭，父曹嵩为宦官曹腾养子。\n- **意义**：其家族背景为其早期仕途提供了基础，也常成为政敌攻击的由头。\n\n### 📍 重要地点：洛阳\n- **时间**：约公元174年 - 188年\n- **停留时间**：断续数年\n- **地点**：洛阳（今河南省洛阳市）\n- **事件**：年二十，举孝廉，为郎，任洛阳北部尉。造五色棒，棒杀蹇硕叔父，不避权贵。后历任顿丘令、议郎等职。\n- **意义**：初入政坛，展现了不畏强权的执法风格，赢得了声誉。\n\n### 📍 重要地点：兖州\n- **时间**：公元192年 - 195年\n- **停留时间**：约3年\n- **地点**：兖州（古州名，东汉末年治所昌邑县，今山东省巨野县南）\n- **事件**：领兖州牧，收编青州黄巾军精锐，组建“青州兵”。在与吕布、张邈的争夺中巩固了根据地。\n- **意义**：获得了第一块稳固的地盘和重要的军事力量，成为逐鹿中原的起点。\n\n### 📍 重要地点：许县\n- **时间**：公元196年 - 220年\n- **停留时间**：24年（作为政治中心）\n- **地点**：许县（今河南省许昌市）\n- **事件**：迎汉献帝都许，“挟天子以令诸侯”。在此发布《置屯田令》，推行屯田。官渡之战的大本营。\n- **意义**：取得了政治上的绝对主动权，建立了霸业的政治与经济中心。\n\n### 📍 重要地点：官渡\n- **时间**：公元200年\n- **停留时间**：数月\n- **地点**：官渡（今河南省中牟县东北）\n- **事件**：以少胜多，击败袁绍主力，取得官渡之战的决定性胜利。\n- **意义**：扭转了与袁绍的战略劣势，为统一北方奠定了最关键的基础。\n\n### 📍 重要地点：邺城\n- **时间**：公元204年 - 220年\n- **停留时间**：16年（作为实际统治中心）\n- **地点**：邺城（今河北省临漳县西南）\n- **事件**：攻克袁氏大本营邺城，自领冀州牧。在此营建宫殿，开设**玄武池**训练水军。其子曹植于此写下《登台赋》。\n- **意义**：取代许县成为曹操新的权力中心，是其“霸府”所在地，也是**建安文学**的重要活动中心。\n\n### 📍 重要地点：柳城\n- **时间**：公元207年\n- **停留时间**：短暂\n- **地点**：柳城（今辽宁省朝阳市西南）\n- **事件**：北征乌桓，于白狼山斩杀乌桓单于蹋顿，基本肃清袁氏残余势力。\n- **意义**：彻底解除了北方的威胁，统一了中国北方。归途中创作名篇《步出夏门行》组诗（含《观沧海》），一般认为创作于北征乌桓途中或之后。\n\n### 📍 重要地点：赤壁\n- **时间**：公元208年\n- **停留时间**：数月\n- **地点**：赤壁（一般认为在今湖北省赤壁市西北）\n- **事件**：率大军南征荆州，与孙刘联军对峙于赤壁，遭火攻大败。\n- **意义**：**赤壁之战**的失败，使其短期内统一全国的计划破灭，奠定了三国鼎立的格局。\n\n### 📍 重要地点：汉中\n- **时间**：公元215年、219年\n- **停留时间**：断续数月\n- **地点**：汉中（今陕西省汉中市）\n- **事件**：公元215年征张鲁，取汉中。公元219年，与刘备相拒于汉中，战事不利，最终撤出。\n- **意义**：得而失汉中，标志着对刘备战略进攻的结束，转为战略防御。\n\n### 🔴 去世地：洛阳\n- **时间**：公元220年\n- **停留时间**：晚年常居\n- **地点**：洛阳（今河南省洛阳市）\n- **事件**：病逝于洛阳，临终前作《遗令》。\n- **意义**：一代枭雄落幕。其子曹丕随即代汉称帝，追尊曹操为**魏武帝**。\n- **名篇名句**：《蒿里行》：“白骨露于野，千里无鸡鸣。”；《短歌行》：“对酒当歌，人生几何！”；《步出夏门行·龟虽寿》：“老骥伏枥，志在千里。”\n\n---\n\n## 地点坐标\n| 现称 | 纬度 | 经度 |\n| --- | --- | --- |\n| 安徽省亳州市 | 33.8693 | 115.7793 |\n| 河南省洛阳市 | 34.6197 | 112.4540 |\n| 山东省巨野县 | 35.3933 | 116.0894 |\n| 河南省许昌市 | 34.0358 | 113.8527 |\n| 河南省中牟县 | 34.7400 | 114.0200 |\n| 河北省临漳县 | 36.3000 | 114.5500 |\n| 辽宁省朝阳市 | 41.5500 | 120.4000 |\n| 湖北省赤壁市 | 29.7500 | 113.8500 |\n| 陕西省汉中市 | 33.0676 | 107.0238 |\n\n---\n\n## 人教版教材知识点\n\n### 语文（课文/词作）\n- **《短歌行》（其一）**：乐府旧题；主旨常解为“求贤若渴、及时建功”；名句“对酒当歌，人生几何”“山不厌高，海不厌深”“周公吐哺，天下归心”。\n- **《观沧海》**（《步出夏门行》之一）：借景抒怀，气象雄浑；以宏阔的海天意象承载政治抱负；名句“日月之行，若出其中；星汉灿烂，若出其里”。\n- **建安风骨**：语言质朴、气势沉雄，常以战争与时代动荡为背景，体现现实关怀与英雄气概。\n\n### 历史（史实/人物定位）\n- **东汉末年政局**：迎汉献帝都许，掌握朝政，以“挟天子以令诸侯”取得政治主动权。\n- **统一北方的关键战役**：官渡之战击败袁绍主力，奠定北方统一基础；北征乌桓平定北部威胁。\n- **制度与治理**：推行屯田制、整饬吏治、唯才是举，强化财政与军粮供给，为曹魏政权奠基。\n- **赤壁之战与格局**：赤壁败北后，短期内无法统一全国，三国鼎立格局由此形成。\n\n## 初高中阶段考点\n\n### 常见语文考点\n- 古典诗歌鉴赏：意象（海、日月、星汉）、情景关系、气象与格局、用典（“周公吐哺”）与主旨把握。\n- 文学史：建安文学与建安风骨的特点；曹操与建安诗风代表性。\n\n### 常见历史考点\n- 东汉末年割据与中央权力：曹操“奉天子以令不臣”的政治策略及影响。\n- 官渡、赤壁的历史意义：对势力格局的决定性作用。\n- 经济与军事制度：屯田制的背景、内容与作用。\n"};

const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {
  if (!text) return null;
  const raw = String(text);
  const match = raw.match(/(\d{1,4})\s*年/);
  if (!match) return null;
  const y = parseInt(match[1], 10);
  if (!Number.isFinite(y)) return null;
  if (raw.includes('公元前') || raw.trim().startsWith('前')) return -y;
  return y;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-extrabold text-gray-900">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const renderMdBlock = (text) => {
  const s = String(text || '').trim();
  if (!s) return null;
  const LF = String.fromCharCode(10);
  const CR = String.fromCharCode(13);
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}`, 'g');
  const lines = s.split(splitRe);
  const out = [];
  let listBuf = [];
  const flushList = () => {
    if (!listBuf.length) return;
    const items = listBuf;
    listBuf = [];
    out.push(
      <ul key={`ul-${out.length}`} className="list-disc pl-5 space-y-1">
        {items.map((it, i) => (
          <li key={i} className="text-sm leading-relaxed">{renderInline(it)}</li>
        ))}
      </ul>
    );
  };
  for (let i = 0; i < lines.length; i++) {
    const t = String(lines[i] || '').trim();
    if (!t) {
      flushList();
      out.push(<div key={`sp-${i}`} className="h-2" />);
      continue;
    }
    const h1 = t.match(/^#{1,2}\s+(.*)$/);
    if (h1) {
      flushList();
      out.push(<div key={`h-${i}`} className="text-sm font-semibold">{renderInline(h1[1])}</div>);
      continue;
    }
    const li = t.match(/^(?:[-•]\s+)(.*)$/);
    if (li) {
      listBuf.push(li[1]);
      continue;
    }
    flushList();
    out.push(<div key={`p-${i}`} className="text-sm leading-relaxed">{renderInline(t)}</div>);
  }
  flushList();
  return <div className="space-y-1">{out}</div>;
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

    const toUrl = (u) => String(u || '').trim();
    const tryUrls = [];
    if (typeof window.MAP_STORY_AI_ENDPOINT === 'string' && window.MAP_STORY_AI_ENDPOINT.trim()) {
      tryUrls.push(toUrl(window.MAP_STORY_AI_ENDPOINT).replace(/\/+$/, '') + '/api/ai/proxy');
    }
    if (typeof window.MAP_STORY_API_BASE === 'string' && window.MAP_STORY_API_BASE.trim()) {
      tryUrls.push(toUrl(window.MAP_STORY_API_BASE).replace(/\/+$/, '') + '/api/ai/proxy');
    }
    if (window.location && window.location.protocol !== 'file:') {
      tryUrls.push('/api/ai/proxy');
    }
    tryUrls.push('http://localhost:8765/api/ai/proxy');
    let lastErr = null;
    for (const url of tryUrls) {
      try {
        const resp = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages, temperature: 0.2 })
        });
        const text = await resp.text();
        if (!resp.ok) {
          throw new Error(text || `HTTP ${resp.status}`);
        }
        return JSON.parse(text);
      } catch (e) {
        lastErr = e;
      }
    }
    throw lastErr || new Error('request_failed');

            }
          }, 30);
        }}
        className="fixed bottom-6 right-6 z-[1200] flex items-center gap-2 px-4 py-2 rounded-full bg-[#c0392b] text-white shadow-lg border border-white/20 hover:bg-[#a93226]"
      >
        <span className="inline-flex h-2 w-2 rounded-full bg-emerald-300"></span>
        <span className="text-sm font-semibold">{data.person?.name ? `跟${data.person.name}对话` : '与历史对话'}</span>
        {!chatOpen ? (
          <span className="text-[10px] px-1.5 py-0.5 rounded bg-white/15 border border-white/20">NEW</span>
        ) : null}
      </button>
      <footer className="text-center text-gray-400 text-[10px] py-8 border-t border-gray-200">
        <p>
          built by cuicheng (
          <a className="underline hover:text-gray-600" href="mailto:cuizicheng.1024@gmail.com">cuizicheng.1024@gmail.com</a>
          )
        </p>
      </footer>
    </div>
  );
};
