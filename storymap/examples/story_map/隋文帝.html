*：**“开皇之治”** 的成就；晚年**猜忌苛察**、**废杨勇立杨广**的失误及其后果。\n\n---", "examPoints": "### 初中阶段考点\n1.  隋朝建立的时间（**581年**）、建立者（**杨坚**）、都城（**长安**）。\n2.  隋朝统一全国的时间（**589年**）、标志（灭陈）。\n3.  **隋文帝**的主要统治措施：发展经济、编订**户籍**、统一**钱币**和**度量衡**。\n4.  **三省六部制**和**科举制**（分科考试）的初步创立。\n5.  “**开皇之治**”局面的出现。\n\n### 高中阶段考点\n1.  隋文帝加强中央集权的措施：确立**三省六部制**、地方实行**州县两级制**、改革**府兵制**。\n2.  经济举措：继续推行**均田制**与**租调力役制**；进行“**大索貌阅**”和“**输籍定样**”。\n3.  法律建设：制定《**开皇律**》，其特点（刑罚简要、条文清晰）及历史地位。\n4.  隋文帝统治的评价：积极方面（统一、制度创建、开皇之治）；消极方面（晚年猜忌、**废立太子**埋下隐患）。\n5.  隋文帝与**关陇集团**的关系（存疑/说法不一，但教材多强调其出身背景）。\n6.  隋朝各项制度对**唐朝**的直接影响（如三省六部、均田、租庸调、科举、法律等）。", "markdown": "# 隋文帝 杨坚 生平传记与足迹\n\n## 一、人物档案\n\n### 基本信息\n- **姓名**：杨坚（原名普六茹坚，小字那罗延）\n- **时代**：南北朝末期至隋朝\n- **出生**：西魏大统七年（公元541年）生于冯翊般若寺（今陕西省渭南市大荔县）\n- **去世**：隋仁寿四年（公元604年）卒于仁寿宫（今陕西省宝鸡市麟游县）\n- **享年**：64岁\n- **主要身份**：政治家、军事家、战略家、改革家、隋朝开国皇帝\n- **历史地位**：结束了自西晋末年以来近300年的分裂割据局面，统一全国，开创“开皇之治”，其制度建设影响后世千余年。\n- **主要成就**：统一南北、建立三省六部制、推行科举制雏形、制定《开皇律》、实行均田制、改革府兵制、开凿广通渠。\n\n### 生平概述\n杨坚出身关陇贵族，父杨忠为西魏、北周名将。他承袭父爵，因长女为北周宣帝皇后而逐渐掌握朝政。公元581年，杨坚代周建隋，定都大兴城（今西安）。随后，他励精图治，于公元589年南下灭陈，统一全国，结束了数百年的分裂。在位期间，他推行一系列政治、经济、军事改革，轻徭薄赋，提倡节俭，使社会繁荣，国力强盛，史称“开皇之治”。然而，其晚年多疑苛察，废易太子，为隋朝的迅速覆亡埋下了隐患。\n\n---\n\n## 二、人生足迹地图说明\n- 🗺️ **行程概览**：以关中地区为核心，足迹遍及北中国，并最终统一全国。\n- ⏱️ **时间跨度**：公元541年 - 公元604年，共64年。\n- 📍 **地理范围**：主要活动于今陕西、河南、湖北、江苏、山西等地。\n- 🌟 **重要节点数量**：核心地点6个。\n\n---\n\n## 三、人生历程与重要地点（按时间顺序）\n\n### 🟢 出生地：冯翊般若寺\n- **公元纪年**：公元541年\n- **停留时间**：出生地，幼年短暂居留。\n- **位置**：冯翊（古称，今陕西省渭南市大荔县）\n- **事迹**：传说其母吕氏在般若寺中生下杨坚，有尼姑智仙称其有异相，将其带至别馆抚养。\n- **意义**：赋予其出生以神秘色彩，为其日后崛起增添舆论资本。\n\n### 📍 重要地点：长安（北周都城，隋称大兴城）\n- **公元纪年**：公元541年 - 公元604年（主要生活与执政中心）\n- **停留时间**：绝大部分人生阶段。\n- **位置**：古称长安/大兴城（今陕西省西安市）\n- **事迹**：袭爵随国公；长女为北周太子妃；北周末年入宫辅政，总揽大权；公元581年在此代周称帝，建立隋朝；以此为都，指挥全国统一战争；推行各项改革，缔造“开皇之治”。\n- **意义**：其政治生涯的核心舞台，隋朝的统治中枢，所有重大决策的发出地。\n- **名篇名句**：无（隋文帝非文学家，无传世名篇）。\n\n### 📍 重要地点：建康（陈朝都城）\n- **公元纪年**：公元589年\n- **停留时间**：短暂，灭陈后巡视。\n- **位置**：古称建康（今江苏省南京市）\n- **事迹**：公元589年，隋军攻破建康，俘获陈后主，灭亡陈朝。杨坚随后南巡至此。\n- **意义**：标志其完成统一大业，终结了自西晋末年以来近300年的南北分裂局面。\n- **名篇名句**：无。\n\n### 📍 重要地点：并州（今太原）\n- **公元纪年**：北周至隋初\n- **停留时间**：多次往返，镇守或巡幸。\n- **位置**：古称并州（今山西省太原市）\n- **事迹**：北周时期曾在此地任职或参与军事行动；建隋后，此地是防御北方突厥的重要军事重镇。\n- **意义**：其早期积累军功和政治资本的重要地区，也是隋朝北方的战略屏障。\n\n### 📍 重要地点：岐州（仁寿宫所在地）\n- **公元纪年**：公元602年 - 公元604年\n- **停留时间**：晚年多次居留，最终在此去世。\n- **位置**：古称岐州（今陕西省宝鸡市麟游县）\n- **事迹**：在此修建避暑离宫仁寿宫；晚年在此休养；在此废黜太子杨勇，改立杨广；于此病逝。\n- **意义**：其晚年政治决策（尤其是废立太子）的关键地点，也是其生命终结之地。\n\n### 🔴 去世地：仁寿宫\n- **公元纪年**：公元604年\n- **停留时间**：生命最后阶段。\n- **位置**：古称仁寿宫（今陕西省宝鸡市麟游县）\n- **经过**：仁寿四年（604年），杨坚在仁寿宫病重，据《隋书》等史料记载，其在病榻上发觉太子杨广无礼，欲召回废太子杨勇，但为时已晚。随后宫中发生变故，杨坚去世，死因成谜（有病逝与被弑两说）。\n- **意义**：其生命的终点，也是隋朝国运由盛转衰的转折点。\n- **名篇名句**：无。\n\n---\n\n## 四、生平时间线\n\n| 年份 | 年龄 | 关键事件 |\n| :--- | :--- | :--- |\n| 公元541年 | 0岁 | 生于冯翊般若寺。 |\n| 公元568年 | 27岁 | 父亲杨忠去世，袭爵随国公。 |\n| 公元573年 | 32岁 | 长女杨丽华被北周武帝聘为皇太子妃。 |\n| 公元578年 | 37岁 | 北周武帝去世，宣帝即位，杨坚女为皇后，杨坚晋升上柱国、大司马。 |\n| 公元580年 | 39岁 | 北周宣帝病逝，杨坚入宫辅政，总揽朝政大权，平定三方叛乱。 |\n| 公元581年 | 40岁 | 代周称帝，国号“隋”，改元开皇，定都大兴城（长安）。 |\n| 公元582年 | 41岁 | 下诏营建新都大兴城；颁布《开皇律》。 |\n| 公元583年 | 42岁 | 废除郡级建制，改为州、县两级制；击败突厥。 |\n| 公元587年 | 46岁 | 灭后梁。 |\n| 公元589年 | 48岁 | 命晋王杨广率军灭陈，统一全国。 |\n| 公元590年 | 49岁 | 推行“大索貌阅”与“输籍定样”，整顿户籍。 |\n| 公元600年 | 59岁 | 废黜太子杨勇，改立晋王杨广为太子。 |\n| 公元601年 - 604年 | 60-64岁 | 晚年崇信佛教，多次巡幸仁寿宫。 |\n| 公元604年 | 64岁 | 崩于仁寿宫，庙号高祖，谥号文皇帝。 |\n\n---\n\n## 五、历史影响\n\n### 对当时的影响\n隋文帝结束了数百年的分裂，实现了中国历史上又一次大一统。他创立的三省六部制、科举制（雏形）、《开皇律》、均田制等一系列制度，奠定了此后中国封建王朝中央政府的基本架构和法律、经济基础，迅速恢复并发展了社会经济，开创了富庶的“开皇之治”。\n\n### 对后世的影响\n1.  **政治制度**：确立的**三省六部制**成为此后中央官制的核心，一直沿用至清末。\n2.  **选官制度**：开创的**分科考试**选拔官员的方式，为唐朝完善并最终形成**科举制**奠定了基础，深刻影响了后世一千多年的社会阶层流动。\n3.  **法律典范**：制定的《开皇律》体系完备，成为唐律的直接蓝本，并远播东亚。\n4.  **经济模式**：推行的**均田制**和**租庸调制**（雏形）为唐朝继承和发展，保障了国家财政与社会稳定。\n\n### 历史评价\n1.  **《隋书·高祖纪》**：“（高祖）躬节俭，平徭赋，仓廪实，法令行，君子咸乐其生，小人各安其业，强无陵弱，众不暴寡，人物殷阜，朝野欢娱。二十年间，天下无事，区宇之内晏如也。”\n2.  **明代思想家王夫之**：“隋文之待威也，固以古大臣之任望之；威之不能终其志者，非隋文之过也。”（肯定其用人及制度建设）\n3.  **现代史学家钱穆**：“隋文帝是一个有作为的皇帝，他统一了中国，并进行了一系列重要的改革。”\n4.  **争议点**：其晚年性情猜忌，刑法严苛，以及废立太子的决策失误，被认为是隋朝二世而亡的重要诱因。\n\n---\n\n## 人教版教材知识点\n\n### 初中阶段\n- **时代背景**：南北朝后期，北方**北周**政权逐渐强大。\n- **关键事件**：**581年**，杨坚夺取北周政权，建立**隋朝**，定都* const calculateDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
};
const extractYear = (text) => {
  if (!text) return null;
  const match = String(text).match(/(\d{3,4})\s*年/);
  return match ? parseInt(match[1], 10) : null;
};

const renderInline = (text) => {
  const raw = String(text || '');
  // 支持 Markdown 的 **加粗**。如果上游文本被截断导致 ** 不成对，兜底移除残留的 **，避免页面出现星号。
  const parts = raw.split(/(\*\*.*?\*\*)/g).filter(Boolean);
  return parts.map((p, idx) => {
    const m = p.match(/^\*\*(.+?)\*\*$/);
    if (m) {
      return <strong key={idx} className="font-semibold text-gray-800">{m[1]}</strong>;
    }
    return <span key={idx}>{p.replaceAll('**', '')}</span>;
  });
};

const safeTruncateMdBold = (text, maxLen) => {
  const s = String(text || '');
  if (!maxLen || maxLen <= 0) return s;
  let out = '';
  let visible = 0;
  let inBold = false;
  for (let i = 0; i < s.length; i++) {
    const ch = s[i];
    if (ch === '*' && s[i + 1] === '*') {
      out += '**';
      inBold = !inBold;
      i += 1;
      continue;
    }
    out += ch;
    visible += 1;
    if (visible >= maxLen) {
      out = out.trimEnd() + '…';
      break;
    }
  }
  if (inBold) out += '**';
  return out;
};

const renderTextbookPoints = (raw, options) => {
  // 兼容两种换行输入：
  // 1) 真实换行：LF / CRLF / CR
  // 2) 字面量换行：反斜杠 + n（可能出现 1 个或多个反斜杠）
  // 说明：这段 JS 位于 Python 三引号字符串里，为避免 Python 对转义序列做预解析，
  // 这里用 charCode 构造换行/反斜杠字符，再用正则 split 一次性切分。
  const LF = String.fromCharCode(10); // line feed
  const CR = String.fromCharCode(13); // carriage return
  const BS = String.fromCharCode(92); // backslash

  // 用 RegExp 构造器 split：匹配 CRLF / CR / LF / (一个或多个反斜杠 + n)
  const BS_RE = BS + BS;
  const splitRe = new RegExp(`${CR}${LF}|${CR}|${LF}|${BS_RE}+n`, 'g');

  const lines = String(raw || '').split(splitRe);
  const isStageHeading = (t) => /^(#{3,4}\s*)?(初中阶段|高中阶段)(考点)?\s*$/.test(String(t || '').trim());
  const expanded = Boolean(options && options.expanded);
  if (expanded) {
    return lines.map((line, idx) => {
      const rawLine = String(line || '');
      const leadingSpaces = rawLine.match(/^\s*/)[0].length;
      const t = rawLine.trim();
      if (!t) return <div key={idx} className="h-2" />;
      if (isStageHeading(t)) return null;
      if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

      const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
      const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

      if (t.startsWith('### ')) {
        const heading = t.replace(/^###\s*/, '');
        return (
          <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
            {renderInline(heading)}
          </h3>
        );
      }

      if (t.startsWith('#### ')) {
        const heading = t.replace(/^####\s*/, '');
        return (
          <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
            {renderInline(heading)}
          </h4>
        );
      }

      if (t.startsWith('- ')) {
        const body = t.slice(2).trim();
        const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
            <div>{renderInline(body)}</div>
          </div>
        );
      }

      const ordered = t.match(/^(\d+)\.\s+(.*)$/);
      if (ordered) {
        return (
          <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
            <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
            <div>{renderInline(ordered[2])}</div>
          </div>
        );
      }

      return (
        <p key={idx} className="text-sm leading-relaxed text-gray-700">
          {renderInline(t)}
        </p>
      );
    });
  }

  const kept = [];
  let sectionBulletCount = 0;
  let totalBulletCount = 0;
  const maxTotalBullets = 12;
  const maxBulletsPerSection = 4;
  const maxLineLen = 64;
  for (const line of lines) {
    const rawLine = String(line || '');
    const t = rawLine.trim();
    if (!t) {
      kept.push(rawLine);
      continue;
    }
    if (isStageHeading(t)) {
      continue;
    }
    if (/^-{3,}$/.test(t)) {
      kept.push('---');
      continue;
    }
    if (t.startsWith('### ') || t.startsWith('#### ')) {
      sectionBulletCount = 0;
      kept.push(rawLine);
      continue;
    }
    const isBullet = t.startsWith('- ') || /^\d+\.\s+/.test(t);
    if (isBullet) {
      totalBulletCount += 1;
      sectionBulletCount += 1;
      if (totalBulletCount > maxTotalBullets || sectionBulletCount > maxBulletsPerSection) {
        continue;
      }
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
      continue;
    }
    if (totalBulletCount < maxTotalBullets) {
      const normalized = safeTruncateMdBold(rawLine.replace(/\s+$/g, '').trim(), maxLineLen);
      kept.push(normalized);
    }
  }

  return kept.map((line, idx) => {
    const rawLine = String(line || '');
    const leadingSpaces = rawLine.match(/^\s*/)[0].length;
    const t = rawLine.trim();
    if (!t) return <div key={idx} className="h-2" />;
    if (/^-{3,}$/.test(t)) return <hr key={idx} className="my-3 border-[#c8b496]/50" />;

    // Markdown 列表层级：0-1 空格为一级，2-3 空格为二级，4+ 空格为三级
    const level = leadingSpaces >= 4 ? 3 : (leadingSpaces >= 2 ? 2 : 1);
    const indentClass = level === 1 ? 'ml-0' : (level === 2 ? 'ml-4' : 'ml-8');

    if (t.startsWith('### ')) {
      const heading = t.replace(/^###\s*/, '');
      return (
        <h3 key={idx} className="mt-2 text-base font-bold text-[#7c2d12]">
          {renderInline(heading)}
        </h3>
      );
    }

    if (t.startsWith('#### ')) {
      const heading = t.replace(/^####\s*/, '');
      return (
        <h4 key={idx} className="mt-2 text-sm font-semibold text-gray-700">
          {renderInline(heading)}
        </h4>
      );
    }

    if (t.startsWith('- ')) {
      const body = t.slice(2).trim();
      const bullet = level === 1 ? '•' : (level === 2 ? '◦' : '▪');
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-[#c0392b]">{bullet}</span>
          <div>{renderInline(body)}</div>
        </div>
      );
    }

    const ordered = t.match(/^(\d+)\.\s+(.*)$/);
    if (ordered) {
      return (
        <div key={idx} className={`flex ${indentClass} gap-2 text-sm leading-relaxed text-gray-700`}>
          <span className="mt-[2px] text-gray-500">{ordered[1]}.</span>
          <div>{renderInline(ordered[2])}</div>
        </div>
      );
    }

    return (
      <p key={idx} className="text-sm leading-relaxed text-gray-700">
        {renderInline(t)}
      </p>
    );
  });
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
const downloadText = (filename, content, type) => {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
};
const buildGeoJSON = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const features = locations.map(loc => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [loc.lng, loc.lat] },
    properties: {
      person: person.name || '',
      name: loc.name || '',
      type: loc.type || '',
      time: loc.time || '',
      modernName: loc.modernName || '',
      ancientName: loc.ancientName || ''
    }
  }));
  if (locations.length > 1) {
    features.push({
      type: 'Feature',
      geometry: {
        type: 'LineString',
        coordinates: locations.map(loc => [loc.lng, loc.lat])
      },
      properties: { person: person.name || '', name: '轨迹' }
    });
  }
  return { type: 'FeatureCollection', features };
};
const csvEscape = (value) => `"${String(value || '').replace(/"/g, '""')}"`;
const buildCSV = (payload) => {
  const person = payload.person || {};
  const locations = payload.locations || [];
  const header = ['person','name','lat','lng','type','time','modernName','ancientName'];
  const rows = locations.map(loc => [
    person.name || '',
    loc.name || '',
    loc.lat || '',
    loc.lng || '',
    loc.type || '',
    loc.time || '',
    loc.modernName || '',
    loc.ancientName || ''
  ]);
  return [header.join(','), ...rows.map(r => r.map(csvEscape).join(','))].join('\n');
};
const setupExports = () => {
  document.querySelectorAll('[data-export]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const type = btn.getAttribute('data-export');
      const payload = window.__EXPORT_DATA__ || {};
      if (type === 'geojson') {
        const geo = buildGeoJSON(payload);
        downloadText(`${payload.person?.name || 'map'}.geojson`, JSON.stringify(geo, null, 2), 'application/json');
      } else if (type === 'csv') {
        const csv = buildCSV(payload);
        downloadText(`${payload.person?.name || 'map'}.csv`, csv, 'text/csv');
      } else if (type === 'markdown') {
        const md = payload.markdown || '';
        if (!md) {
          alert('Markdown 导出不可用');
          return;
        }
        downloadText(`${payload.person?.name || 'map'}.md`, md, 'text/markdown');
      } else if (type === 'share') {
        const link = location.href;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(link);
        } else {
          prompt('复制链接', link);
        }
      }
    });
  });
};
setTimeout(setupExports, 0);
</script>
